 and video", "E": "presenting an almost unlimited amount of merchandise"}, "answer": "C", "explain": "The correct answer is C: touching the product"}, {"q": "Sales executives at Keiron Air Conditioners use phone directories to call customers and convince them to buy their air conditioners. Which form of direct marketing is used here?", "options": {"A": "telemarketing", "B": "kiosk marketing", "C": "direct-response television marketing", "D": "direct-mail marketing", "E": "catalog marketing"}, "answer": "A", "explain": "The correct answer is A: telemarketing"}, {"q": "Which of the following is an advantage of a well-designed and targeted telemarketing plan?", "options": {"A": "exemption from the National Do Not Call Registry", "B": "ability to portray wider merchandise", "C": "interactive infomercials via phone", "D": "coordination with nearby kiosks", "E": "purchasing convenience for customers"}, "answer": "E", "explain": "The correct answer is E: purchasing convenience for customers"}, {"q": "Geller Insurance calls qualified prospects to sell insurance. Which of the following forms of marketing is evident from this example?", "options": {"A": "kiosk marketing", "B": "direct-response television marketing", "C": "telemarketing", "D": "direct-mail marketing", "E": "catalog marketing"}, "answer": "C", "explain": "The correct answer is C: telemarketing"}, {"q": "By using ________ to contact potential customers, marketers sell directly to consumers.", "options": {"A": "multi-level marketing", "B": "undercover marketing", "C": "ambush marketing", "D": "outbound telephone marketing", "E": "affinity marketing"}, "answer": "D", "explain": "The correct answer is D: outbound telephone marketing"}, {"q": "How has do-not-call legislation helped direct marketers?", "options": {"A": "Direct marketers have developed kiosks as an alternative to telemarketing.", "B": "Marketers are compensated by the Federal Trade Commission for lost sales caused by the laws.", "C": "Telemarketers have developed opt-in calling systems that target consumers who have chosen to be contacted and therefore are less invasive.", "D": "Direct marketers have outsourced their activities to firms that are exempt from such laws.", "E": "Telemarketers are allowed to call customers for a small fee."}, "answer": "C", "explain": "The correct answer is C: Telemarketers have developed opt-in calling systems that target consumers who have chosen to be contacted and therefore are less invasive."}, {"q": "Neal Murphy sells his company's unique products on television programs. He hosts a 30-minute show in which he demonstrates and explains the advantages of the product. At the end of the show, a toll-free number is displayed on the screen that can be used by viewers to place their orders for the product. Which of the following forms of advertising is evident here?", "options": {"A": "podcast marketing", "B": "telemarketing", "C": "kiosk marketing", "D": "direct-response television advertising", "E": "interactive television marketing"}, "answer": "D", "explain": "The correct answer is D: direct-response television advertising"}, {"q": "Donello Equipment hosts infomercials on television and at the same time allows its viewers to interact with its advertisements. Viewers can request more details and order via their Internet-ready smart televisions. Which of the following forms of marketing is evident here?", "options": {"A": "telemarketing", "B": "podcast marketing", "C": "kiosk marketing", "D": "catalog marketing", "E": "interactive television"}, "answer": "E", "explain": "The correct answer is E: interactive television"}, {"q": "What is the most likely reason that direct-response television marketing has increased in recent years?", "options": {"A": "increases in global demand", "B": "advances in technology", "C": "shifts in demographics", "D": "changes in FTC legislation", "E": "uses of social media"}, "answer": "B", "explain": "The correct answer is B: advances in technology"}, {"q": "Using interactive TV can allow consumers to perform all the following tasks during a company's ad EXCEPT ________.", "options": {"A": "identify a nearby location at which the product is available", "B": "see what other sizes or colors are available", "C": "send product information to another device", "D": "order the product", "E": "access additional product information"}, "answer": "A", "explain": "The correct answer is A: identify a nearby location at which the product is available"}, {"q": "Green Gardens is a click-and-mortar company that sells gardening and landscaping goods and equipment. When customers are unable to find a product they need on the shelves of their local Green Gardens store, customers order the product online with the help of the in-store ordering machine. Which of the following best describes the ordering machine?", "options": {"A": "kiosk", "B": "podcast", "C": "digital catalog", "D": "online networks", "E": "tablet"}, "answer": "A", "explain": "The correct answer is A: kiosk"}, {"q": "Music Mogul has arrangements with several stores and retail chains to place their DVDs and digital music machines in prime spots such as near billing counters and at store entrances. Consumers can buy DVDs by depositing payment or they can buy music online via the touch-screen interface on the machine. Which form of marketing is illustrated in this scenario?", "options": {"A": "direct-response television advertising", "B": "podcast marketing", "C": "telemarketing", "D": "kiosk marketing", "E": "interactive television"}, "answer": "D", "explain": "The correct answer is D: kiosk marketing"}, {"q": "Charlie Putnam received an e-mail promoting a new financial services institution that offers surprisingly low mortgage rates. The e-mail simply asked customers to provide their address, date of birth, social security number, and current mortgage information in order to receive a free loan quote. Suspicious of the offer, Charlie researched the company and discovered that the e-mail was a fraud. This is an example of ________.", "options": {"A": "adware", "B": "spamdexing", "C": "viral marketing", "D": "cyberbullying", "E": "phishing"}, "answer": "E", "explain": "The correct answer is E: phishing"}, {"q": "Josh received an e-mail stating that he had won a lottery of $500,000 from Lottors Corporation. The e-mail asked Josh to send his bank account details and social security number to transfer cash directly to his account. Josh did not remember buying any lottery tickets, and so was apprehensive about providing his bank details without verification. Which of the following is illustrated from this scenario?", "options": {"A": "viral marketing", "B": "adware", "C": "telemarketing", "D": "cyberbullying", "E": "phishing"}, "answer": "E", "explain": "The correct answer is E: phishing"}, {"q": "According to the \"Privacy Promise to American Consumers\" program, DMA members need to comply with which of the following consumer privacy rules?", "options": {"A": "include the advertising option icon to let consumers know why they are being targeted", "B": "agree to notify customers when any personal information is rented, sold, or exchanged with others", "C": "educate consumers on the Can Spam legislation", "D": "make sure that consumers are adhering to the Children's Online Privacy Protection Act", "E": "offer to register all customers in the National Do Not Call Registry"}, "answer": "B", "explain": "The correct answer is B: agree to notify customers when any personal information is rented, sold, or exchanged with others"}, {"q": "Refer to the scenario below to answer the following question.<br><br>The Treble Clef sells music books, musical instruments, and novelty gifts of a musical nature. In recent years, owner Gary Zahn has served as the local representative of several musical instrument manufacturers, providing a contact person for three local schools. He sends a sample of a manufacturer's products to schools that request a demonstration or presentation. \"If we don't have it, we can definitely get it for you,\" Gary tells all Treble Clef visitors and customers. Most walk-ins are particularly interested in a specific piece of sheet music from a particular era or just browsing among the hundreds of music knick-knacks in the store. Gary spends most of his time making presentations to beginners at the local schools and making biweekly visits to the schools to deliver instruments, make minor repairs, or pick up instruments to ship to the manufacturer for more complicated repairs. After establishing a loyal customer base, Gary was convinced that a Treble Clef Web site could benefit a variety of customers. He began with a simple Web site that provided information about the store and the types of gifts and services available. The site received so much response that Gary added a question-and-answer option. Questions poured in, ranging from \"Where can I get sheet music for 'Hello, Dolly'?\" to \"Do you carry clarinet reeds?\" to \"My saxophone needs two new pads. When will you be at Elmhurst School to repair it?\" The Web site is now able to accept credit card orders, and gifts can even be wrapped and shipped for no extra charge. \"This Web site idea was fantastic!\" Gary admitted. \"It allows us to be so responsive. And our novelties sales have doubled!\"<br><br>Gary sends samples of sheet music to schools for demonstration or presentation. Which of the following types of marketing is being illustrated from this statement?", "options": {"A": "direct-mail marketing", "B": "viral marketing", "C": "kiosk marketing", "D": "direct-response television marketing", "E": "telemarketing"}, "answer": "A", "explain": "The correct answer is A: direct-mail marketing"}, {"q": "Refer to the scenario below to answer the following question.<br><br>The Treble Clef sells music books, musical instruments, and novelty gifts of a musical nature. In recent years, owner Gary Zahn has served as the local representative of sever Treble Clef sells music books, musical instruments, and novelty gifts of a musical nature. In recent years, owner Gary Zahn has served as the local representative of several musical instrument manufacturers, providing a contact person for three local schools. He sends a sample of a manufacturer's products to schools that request a demonstration or presentation. \"If we don't have it, we can definitely get it for you,\" Gary tells all Treble Clef visitors and customers. Most walk-ins are particularly interested in a specific piece of sheet music from a particular era or just browsing among the hundreds of music knick-knacks in the store. Gary spends most of his time making presentations to beginners at the local schools and making biweekly visits to the schools to deliver instruments, make minor repairs, or pick up instruments to ship to the manufacturer for more complicated repairs. After establishing a loyal customer base, Gary was convinced that a Treble Clef Web site could benefit a variety of customers. He began with a simple Web site that provided information about the store and the types of gifts and services available. The site received so much response that Gary added a question-and-answer option. Questions poured in, ranging from \"Where can I get sheet music for 'Hello, Dolly'?\" to \"Do you carry clarinet reeds?\" to \"My saxophone needs two new pads. When will you be at Elmhurst School to repair it?\" The Web site is now able to accept credit card orders, and gifts can even be wrapped and shipped for no extra charge. \"This Web site idea was fantastic!\" Gary admitted. \"It allows us to be so responsive. And our novelties sales have doubled!\"<br><br>Gary wants to expand the reach of his business. An effective approach to reaching the most likely potential customers would be ________ marketing. The message will include a link to Treble Clef's Web Site.", "options": {"A": "mobile", "B": "viral", "C": "e-mail", "D": "kiosk", "E": "catalog"}, "answer": "C", "explain": "The correct answer is C: e-mail"}], "flashcards": [{"section": "Digital Marketing Basics", "term": "Digital Marketing", "def": "The use of technology-intensive platforms such as the internet, mobile networks and devices, and social media to engage directly with carefully targeted individual consumers, communities, and businesses.", "example": "A brand running targeted Instagram ads based on a user's browsing history."}, {"section": "Digital Marketing Basics", "term": "Benefits of Digital Marketing", "def": "Buyers gain convenience, price competition, brand engagement, and immediacy; sellers gain relationship-building tools, low-cost reach, flexibility, access to new audiences, and real-time marketing opportunities.", "example": "A small business reaches customers worldwide through a website and social media without opening physical stores."}, {"section": "Campaign Research", "term": "Digital Consumer Personas", "def": "Detailed, nuanced, and tangible representations of the prototypical consumers a digital campaign targets.", "example": "A marketing team creates a persona named \"Busy Mom Maria\" to guide ad messaging and channel choices."}, {"section": "Campaign Research", "term": "Omni-Channel Navigation Behavior", "def": "The consumer's use of multiple marketing channels, both digital and nondigital, across different stages of the buying decision process.", "example": "A shopper researches a product on their phone, reads reviews on a laptop, then buys in-store."}, {"section": "Campaign Research", "term": "Experimentation in Digital Marketing", "def": "Online and mobile media let marketers easily test different approaches across customer groups and measure results, such as through A/B testing.", "example": "Netflix tests two different homepage thumbnail designs to see which gets more clicks."}, {"section": "Digital Channels", "term": "Online Marketing Tools", "def": "Marketing websites, branded community websites, online advertising (display and search-related ads), email marketing, online video marketing, and blogs.", "example": "A company posts tutorial videos on YouTube as part of its online video marketing."}, {"section": "Digital Channels", "term": "Viral Marketing", "def": "The digital version of word-of-mouth marketing, where content is so engaging that customers seek it out and pass it along to others.", "example": "A funny branded video gets shared widely across social media without paid promotion."}, {"section": "Digital Channels", "term": "Social Media Marketing", "def": "Marketing through online social networks, offering targeting, interactivity, immediacy, cost-effectiveness, and social sharing, but also challenges since brands don't fully control the conversation.", "example": "A brand responds quickly to customer complaints on social media to manage its reputation."}, {"section": "Digital Channels", "term": "Mobile Marketing", "def": "Marketing messages, promotions, and content delivered to on-the-go consumers via smartphones, tablets, and other mobile devices.", "example": "A retailer sends a push notification with a discount when a customer is near one of its stores."}, {"section": "Omni-Channel Strategy", "term": "Omni-Channel Marketing Strategy", "def": "Creating a seamless cross-channel buying experience that integrates in-store, online, and mobile shopping, requiring alignment of business model, organizational incentives, and marketing mix.", "example": "A customer orders online and can return the item at any physical store location."}, {"section": "Public Policy", "term": "Public Policy Issues in Digital Marketing", "def": "Concerns include irritation, unfairness to vulnerable buyers, deception, fraud, and consumer privacy regarding how much personal data marketers collect and use.", "example": "Consumers worry about how much personal data social media platforms collect and sell to advertisers."}, {"section": "Public Policy", "term": "Data Privacy Regulations (GDPR & COPPA)", "def": "The General Data Protection Regulation (GDPR) governs data privacy in the EU; the Children's Online Privacy Protection Act (COPPA) restricts data collection from children online.", "example": "A website requires parental consent before collecting data from users under 13, in compliance with COPPA."}]}, "ch18": {"title": "Chapter 18 \u2014 Creating Competitive Advantage", "questions": [{"q": "Kodak's film business didn't lose out to direct competitor Fujifilm; it lost out to Sony, Canon, and other digital camera makers, along with a host of digital image developers and online image sharing services. This is an example of ________.", "options": {"A": "marketing myopia", "B": "a blue ocean strategy", "C": "competitor myopia", "D": "competitor backlinking", "E": "self-competition"}, "answer": "C", "explain": "The correct answer is C: competitor myopia"}, {"q": "Fosters and Mason House, two major coffee brands, competed neck and neck based on their product attributes and price promotions. They were soon blindsided by the arrival of Starcoffeez, which focused more on the coffee experience rather than the coffee. This resulted in major losses for the two companies. This is an example of ________.", "options": {"A": "perfect competition", "B": "self-competition", "C": "competitor backlinking", "D": "competitor myopia", "E": "marketing myopia"}, "answer": "D", "explain": "The correct answer is D: competitor myopia"}, {"q": "From a(n) ________ point of view, Pepsi might see its competition as Coca-Cola, Dr Pepper, 7UP, and the makers of other soft drink brands. From a(n) ________ point of view, however, the customer really wants \"thirst quenching.\"", "options": {"A": "industry; competitive", "B": "market; industry", "C": "industry; market", "D": "company's; consumer's", "E": "market; consumer"}, "answer": "C", "explain": "The correct answer is C: industry; market"}, {"q": "Nintendo, producer of the Wii video game console, might define its competitors as other makers of physically interactive video games. But from a(n) ________ point of view, it would include all firms making physically interactive recreational products.", "options": {"A": "interdependent", "B": "niche", "C": "market", "D": "segment", "E": "industry"}, "answer": "C", "explain": "The correct answer is C: market"}, {"q": "From a market point of view, Universal Pictures film studio might see its competition as ________.", "options": {"A": "Paramount Pictures", "B": "Warner Bros. Pictures", "C": "Broadway", "D": "Walt Disney Pictures", "E": "20th Century Fox"}, "answer": "C", "explain": "The correct answer is C: Broadway"}, {"q": "From an industry point of view, Universal Pictures film studio might see its competition as ________.", "options": {"A": "Tomorrowland", "B": "West End theatre", "C": "HarperCollins", "D": "Summerfest", "E": "Columbia Pictures"}, "answer": "E", "explain": "The correct answer is E: Columbia Pictures"}, {"q": "What is the LEAST relevant question to ask when assessing a firm's main competitor?", "options": {"A": "What are the competitor's objectives?", "B": "What are the competitor's weaknesses?", "C": "What are the competitor's strengths?", "D": "What are the competitor's locations?", "E": "What is the competitor's strategy?"}, "answer": "D", "explain": "The correct answer is D: What are the competitor's locations?"}, {"q": "A company that pursues ________ will react much more strongly to a competitor's cost reducing manufacturing breakthrough than to the same competitor's advertising increase.", "options": {"A": "customer intimacy", "B": "product leadership", "C": "a middle-of-the-roaders strategy", "D": "low-cost leadership", "E": "product differentiation"}, "answer": "D", "explain": "The correct answer is D: low-cost leadership"}, {"q": "In the audio equipment industry, Philips and Sony belong to the same ________.", "options": {"A": "control group", "B": "strategic group", "C": "target group", "D": "focus group", "E": "experimental group"}, "answer": "B", "explain": "The correct answer is B: strategic group"}, {"q": "Country Kitchen and Perkins are both a chain of family restaurants featuring diner-like menus with reasonably priced items. These companies are in the same ________.", "options": {"A": "control group", "B": "target group", "C": "strategic group", "D": "focus group", "E": "experimental group"}, "answer": "C", "explain": "The correct answer is C: strategic group"}, {"q": "Companies use secondary data, personal experience, and word of mouth to ________.", "options": {"A": "learn about their competitors' strengths and weaknesses", "B": "select competitors to attack or avoid", "C": "identify competitors' target locations and market share", "D": "estimate competitors' sales projections", "E": "identify competitors' target customers and strategies"}, "answer": "A", "explain": "The correct answer is A: learn about their competitors' strengths and weaknesses"}, {"q": "A market research firm conducts a survey of soft-drink consumers to assess Pepsi's and Coke's strengths and weaknesses in attributes valued by both company's target customers. The market research firm is using a(n) ________.", "options": {"A": "global marketing strategy", "B": "blue ocean strategy", "C": "customer value analysis", "D": "customer lifetime value estimation", "E": "competitive marketing strategy"}, "answer": "C", "explain": "The correct answer is C: customer value analysis"}, {"q": "If a company's offer delivers greater value by exceeding the competitor's offer on important attributes, the company can charge a higher price and ________, or it can charge the same price and ________.", "options": {"A": "lose profits; gain higher profits", "B": "earn lower profits; gain higher profits", "C": "earn higher profits; lose profits", "D": "lose profits; gain more market share", "E": "earn higher profits; gain more market share"}, "answer": "E", "explain": "The correct answer is E: earn higher profits; gain more market share"}, {"q": "Most companies will compete with ________ rather than ________.", "options": {"A": "close competitors; distant competitors", "B": "market challengers; market nichers", "C": "benchmarkers; distant competitors", "D": "distant competitors; close competitors", "E": "market challengers; market followers"}, "answer": "A", "explain": "The correct answer is A: close competitors; distant competitors"}, {"q": "A company's close competitors are ________.", "options": {"A": "considered \"bad\" competitors", "B": "a serious threat and hence, must be attacked rather than ignored", "C": "the sole focus of successful companies", "D": "typically ignored as they seldom pose any threat", "E": "those that most resemble the company's operations"}, "answer": "E", "explain": "The correct answer is E: those that most resemble the company's operations"}, {"q": "Which of the following are examples of close competitors?", "options": {"A": "Pizza Hut and Burger King", "B": "McDonald's and Taco Bell", "C": "Taco Bell and T.G.I. Friday's", "D": "McDonald's and Burger King", "E": "Applebee's and Subway"}, "answer": "D", "explain": "The correct answer is D: McDonald's and Burger King"}, {"q": "What is most likely a strategic benefit of the existence of competitors?", "options": {"A": "Competitors decrease the total demand.", "B": "Competitors help legitimize new technologies.", "C": "Competitors seldom lead to product differentiation.", "D": "Competitors exclusively serve more-attractive segments.", "E": "Competitors fracture the target market."}, "answer": "B", "explain": "The correct answer is B: Competitors help legitimize new technologies."}, {"q": "An industry often contains \"good\" and \"bad\" competitors. Good competitors ________.", "options": {"A": "ensure minimum competition between firms", "B": "break the rules of fair competition", "C": "play by the rules of the industry", "D": "share their marketing strategies with other firms", "E": "typically dominate the market"}, "answer": "C", "explain": "The correct answer is C: play by the rules of the industry"}, {"q": "Most competitors in the music download industry see Apple's iTunes Music Store as a ________ because it created a closed system with mass appeal.", "options": {"A": "marginal competitor", "B": "good competitor", "C": "weak competitor", "D": "distant competitor", "E": "bad competitor"}, "answer": "E", "explain": "The correct answer is E: bad competitor"}, {"q": "An example of a company exhibiting a blue ocean strategy is ________.", "options": {"A": "a Starbucks opening in the same vicinity of an independent coffee house", "B": "Nike's brand image of the \"swoosh\"", "C": "the first digital tablet iPad released by Apple", "D": "Amazon's online shopping convenience", "E": "Whirlpool's full line of medium-priced, energy-saving appliances"}, "answer": "C", "explain": "The correct answer is C: the first digital tablet iPad released by Apple"}, {"q": "Which of the following is the first step taken in the competitive intelligence system?", "options": {"A": "check, interpret, and organize gathered information", "B": "identify the vital types of competitive information needed", "C": "respond to inquiries from managers about competitors", "D": "collect published data and information from the field", "E": "create a new brand image and marketing concept for the firm"}, "answer": "B", "explain": "The correct answer is B: identify the vital types of competitive information needed"}, {"q": "Refer to the scenario below to answer the following question.<br><br>Essential-Beauty is a rapidly growing firm that manufactures women's makeup, perfumes, and nail-care products. The company has established itself as a high-end cosmetic product brand available at most national drug stores. In the past, almost all of the advertising for Essential-Beauty has been in women's fashion magazines. The firm is now launching a new line of skin care products, ranging from facial cleansers to body lotion. These products are designed to be marketed to a broader audience, so the marketing team is exploring the effectiveness of different promotional mixes.<br><br>Essential-Beauty considers one of its most important competitors to be Look-Lovely, another marketer of high-end makeup and skin care products sold in drug stores. Based on this, it is most accurate to say that Look-Lovely and Essential-Beauty are both ________.", "options": {"A": "distant competitors", "B": "market followers", "C": "overall cost leaders", "D": "in the same strategic group", "E": "niche marketers"}, "answer": "D", "explain": "The correct answer is D: in the same strategic group"}, {"q": "Refer to the scenario below to answer the following question.<br><br>Essential-Beauty is a rapidly growing firm that manufactures women's makeup, perfumes, and nail-care products. The company has established itself as a high-end cosmetic product brand available at most national drug stores. In the past, almost all of the advertising for Essential-Beauty has been in women's fashion magazines. The firm is now launching a new line of skin care products, ranging from facial cleansers to body lotion. These products are designed to be marketed to a broader audience, so the marketing team is exploring the effectiveness of different promotional mixes.<br><br>Essential-Beauty e-mailed a survey to a group of its most frequent, loyal customers. The survey asked what makeup and skin care characteristics were most important to them. The company's marketing staff then ranked the performance of Essential-Beauty products in each of these categories. Essentials was conducting a(n) ________.", "options": {"A": "entrepreneurial marketing strategy", "B": "intrepreneurial marketing strategy", "C": "customer value analysis", "D": "customer value proposition", "E": "customer lifetime value survey"}, "answer": "C", "explain": "The correct answer is C: customer value analysis"}, {"q": "A competitor analysis requires the assessment of all of the following EXCEPT the competitors' ________.", "options": {"A": "reaction patterns", "B": "objectives", "C": "strategies", "D": "strengths and weaknesses", "E": "organizational hierarchy"}, "answer": "E", "explain": "The correct answer is E: organizational hierarchy"}, {"q": "Which of the following statements is true of the approaches to marketing strategy?", "options": {"A": "Formulated marketing encourages more marketing initiative and \"intrepreneurship\" at the local level.", "B": "Within a company, a single strategy exclusively applies to all different businesses and products.", "C": "Formulated marketing seldom involves developing formal marketing strategies and adhering to them closely.", "D": "As small companies achieve success, they inevitably move away from more-formulated marketing.", "E": "Intrepreneurial marketing applies to companies that sometimes lose their marketing creativity and passion that they had at the start."}, "answer": "E", "explain": "The correct answer is E: Intrepreneurial marketing applies to companies that sometimes lose their marketing creativity and passion that they had at the start."}, {"q": "When Gary Hirshberg started the Stonyfield Farm yogurt company, he stated that his company could do better with less advertising, less marketing research, and more guerrilla marketing. He came up with innovative marketing ideas to promote his products such as having sales personnel dress up as large yogurt cartons to distribute free yogurt samples. Which of the following marketing strategies was being implemented by Hirshberg?", "options": {"A": "formulated marketing", "B": "undercover marketing", "C": "entrepreneurial marketing", "D": "intrepreneurial marketing", "E": "ambush marketing"}, "answer": "C", "explain": "The correct answer is C: entrepreneurial marketing"}, {"q": "Dell produces and delivers PCs of competitive quality at lower costs. The company constantly aims to achieve low production and distribution costs to win a large market share. Dell utilizes a(n) ________ strategy very effectively.", "options": {"A": "market segmentation", "B": "overall cost leadership", "C": "differentiation", "D": "focus", "E": "blue ocean"}, "answer": "B", "explain": "The correct answer is B: overall cost leadership"}, {"q": "Porsche is a German automobile manufacturer that competes against BMW and Audi, but only in the sports car and SUV segments of the automobile market. Porsche utilizes a(n) ________ strategy.", "options": {"A": "market segmentation", "B": "middle-of-the-roaders", "C": "focus", "D": "blue ocean", "E": "overall cost leadership"}, "answer": "C", "explain": "The correct answer is C: focus"}, {"q": "Sears and Holiday Inn encountered difficult times because they did not stand out as the lowest in cost, highest in perceived value, or best in service of their primary target market segment. Both companies are ________.", "options": {"A": "laggards", "B": "jack-of-all-trades", "C": "red oceans", "D": "niches", "E": "middle-of the roaders"}, "answer": "E", "explain": "The correct answer is E: middle-of the roaders"}, {"q": "Walmart, Costco, and Southwest Airlines serve customers who want reliable, good-quality products or services that are also reasonable and easily available. These companies are all known for pursuing a value discipline known as ________.", "options": {"A": "customer intimacy", "B": "product differentiation", "C": "product leadership", "D": "operational excellence", "E": "focus"}, "answer": "D", "explain": "The correct answer is D: operational excellence"}, {"q": "American Express will do almost anything to build long-term customer loyalty and to capture customer lifetime value. Which of the following competitive marketing strategies is being pursued by American Express?", "options": {"A": "consumer capitalism", "B": "product differentiation", "C": "customer equity", "D": "customer intimacy", "E": "product leadership"}, "answer": "D", "explain": "The correct answer is D: customer intimacy"}, {"q": "Samsung and Apple actively generate new ideas, relentlessly pursue new solutions, and quickly work to get new products to market. They serve customers who want state-of-the-art products and services, regardless of the costs in terms of price or inconvenience. Which of the following value disciplines is illustrated from this example?", "options": {"A": "product binning", "B": "operational excellence", "C": "product leadership", "D": "product activation", "E": "customer intimacy"}, "answer": "C", "explain": "The correct answer is C: product leadership"}, {"q": "Fifty percent of the market is in the hands of Company A, 30 percent is in the hands of Company B, 15 percent is in the hands of Company C, and the remaining 5 percent is in the hands of Company D. Based on these hypothetical numbers, Company B is the market ________.", "options": {"A": "leader", "B": "challenger", "C": "follower", "D": "maven", "E": "nicher"}, "answer": "B", "explain": "The correct answer is B: challenger"}, {"q": "Fifty percent of the market is in the hands of Company A, 30 percent is in the hands of Company B, 15 percent is in the hands of Company C, and the remaining 5 percent is in the hands of Company D. Based on these hypothetical numbers, Company D is the market ________.", "options": {"A": "challenger", "B": "follower", "C": "nicher", "D": "maven", "E": "leader"}, "answer": "C", "explain": "The correct answer is C: nicher"}, {"q": "Which of the following are market challenger strategies?", "options": {"A": "follow closely and follow at a distance", "B": "multiple niching and quality service", "C": "expand market share and follow closely", "D": "full frontal attack and indirect attack", "E": "expand total market and protect market share"}, "answer": "D", "explain": "The correct answer is D: full frontal attack and indirect attack"}, {"q": "To remain number one, leading firms can take any of three actions. First, they can find ways to expand total demand. Second, they can protect their current market share through good defensive and offensive actions. Third, they can ________.", "options": {"A": "shut down current company locations and reopen in highly populated areas", "B": "evaluate current employees and reduce costs through downsizing", "C": "try to expand their market share further, even if market size remains constant", "D": "run smaller companies out of business, causing them to sell out to larger firms", "E": "focus exclusively on divestment"}, "answer": "C", "explain": "The correct answer is C: try to expand their market share further, even if market size remains constant"}, {"q": "The market leader normally gains the most when ________.", "options": {"A": "it achieves expanded market share", "B": "its personal communication channels expand", "C": "its total market diminishes", "D": "the major global competitors enter the market", "E": "the niche marketing efforts by other firms expand"}, "answer": "A", "explain": "The correct answer is A: it achieves expanded market share"}, {"q": "Marketers can expand markets by discovering and promoting ________.", "options": {"A": "new uses of the product", "B": "subliminal points of interest", "C": "green technologies", "D": "the deficiencies of competitors", "E": "subtle advantages of the product"}, "answer": "A", "explain": "The correct answer is A: new uses of the product"}, {"q": "Lovelies is the leading workout and fitness center for women. The regional chain of gyms has traditionally catered to women age 40 and older who are interested in strength and cardiovascular training. Lovelies has recently begun promotions to bring younger women into its gyms. This is an example of how the market leader ________.", "options": {"A": "increases competition", "B": "changes its product line", "C": "competes with mature products", "D": "develops new users", "E": "develops new rules"}, "answer": "D", "explain": "The correct answer is D: develops new users"}, {"q": "A market challenger that matches the competitor's product, advertising, price, and distribution efforts is most likely ________.", "options": {"A": "implementing a blue ocean strategy", "B": "pursuing an indirect attack", "C": "creating multiple niches", "D": "launching a full frontal attack", "E": "exiting from the current market"}, "answer": "D", "explain": "The correct answer is D: launching a full frontal attack"}, {"q": "Which of the following conditions would enable higher market share to produce higher profits?", "options": {"A": "when production volume remains unaltered as market share increases", "B": "when unit costs increase as market share increases", "C": "when unit costs drop as market share increases", "D": "when production volume drops as market share increases", "E": "when the company fails to break even"}, "answer": "C", "explain": "The correct answer is C: when unit costs drop as market share increases"}, {"q": "Cozy Country Market entered the candle business with a unique product: a line of candles made from soy that produces less smoke and lasts up to twice as long as other candles. The firm sold this unique product exclusively to a few niches. The candles were priced at twice the cost charged for normal candles. The product was also sold online and in unconventional outlets not dominated by market leaders. In this case, Cozy Country Market was using a(n) ________ against the market leaders.", "options": {"A": "indirect attack", "B": "guerrilla attack", "C": "pre-emptive attack", "D": "frontal attack", "E": "counter offensive attack"}, "answer": "A", "explain": "The correct answer is A: indirect attack"}, {"q": "Which of the following statements is most likely true of market follower strategies?", "options": {"A": "Market followers have the resources to expand the market by developing new users, new uses, and more usage of its products.", "B": "Market followers must expand internationally first to ensure distribution effectiveness, cost savings, and quality control.", "C": "Market followers benefit from pursuing subsegments of target markets due to their limited resources.", "D": "Market followers must keep manufacturing costs and prices low or product quality and services high.", "E": "Market followers should conduct indirect attacks on competitor's weaknesses to gain market share quickly and inexpensively."}, "answer": "D", "explain": "The correct answer is D: Market followers must keep manufacturing costs and prices low or product quality and services high."}, {"q": "Market niching is profitable because the company ________.", "options": {"A": "knows the needs of the target customer segment better than other firms that casually attempt to sell to the same segment", "B": "can achieve economies of scale much faster by selling the same product to the global market", "C": "copies or improves on the leader's products and programs, usually with much less investment", "D": "bears the cost of developing new products and markets, expanding distribution, and educating the market", "E": "either keeps its manufacturing costs and prices low or its product quality and services high"}, "answer": "A", "explain": "The correct answer is A: knows the needs of the target customer segment better than other firms that casually attempt to sell to the same segment"}, {"q": "Whereas the mass marketer achieves ________, the nicher achieves ________.", "options": {"A": "high volume; low margins", "B": "low volume; high margins", "C": "low margins; low volume", "D": "high volume; high margins", "E": "high margins; high volume"}, "answer": "A", "explain": "The correct answer is A: high volume; low margins"}, {"q": "Computer mouse and interface device maker AdvTechPRO is only a fraction the size of software giant Terminal Time Software Inc. AdvTechPRO manufactures every variation of computer mouse imaginable (for left-handed people, wireless mice, shaped like actual mice, LED mice, etc.). Through skillful ________, the firm dominates the PC mouse market, with Terminal Time Software as its runner up.", "options": {"A": "vertical integration", "B": "centralization techniques", "C": "brand imaging", "D": "benchmarking", "E": "niching"}, "answer": "E", "explain": "The correct answer is E: niching"}, {"q": "Which of the following is most critical for successful niching?", "options": {"A": "catering to global markets", "B": "follow-up", "C": "mass appeal of one idea", "D": "specialization", "E": "buzz marketing"}, "answer": "D", "explain": "The correct answer is D: specialization"}, {"q": "A company can become so ________ centered that it loses its even more important focus on maintaining profitable ________ relationships.", "options": {"A": "market; customer", "B": "customer; competitor", "C": "competitor; product", "D": "competitor; customer", "E": "market; competitor"}, "answer": "D", "explain": "The correct answer is D: competitor; customer"}, {"q": "Greener-grass Inc. is a lawn care company providing landscaping and lawn maintenance services to customers in and around Kansas City. The marketing team at Greener-grass carefully tracks the moves of competing companies, watching for shifting strategies and new promotions. The marketing team is also in constant touch with customers, using surveys and other feedback methods to find out what kind of services customers value the most. Greener-grass is most accurately described as having a ________ orientation.", "options": {"A": "customer", "B": "leadership", "C": "product", "D": "market", "E": "competitor"}, "answer": "D", "explain": "The correct answer is D: market"}, {"q": "Which of the following is a positive aspect of a competitor-centered company?", "options": {"A": "It carries out its own customer relationship strategy.", "B": "It concentrates its resources on delivering superior value to target customers.", "C": "It ends up seeking innovative ways to create more value for customers.", "D": "It bases its own moves on competitors' moves.", "E": "It searches out competitors' weaknesses."}, "answer": "E", "explain": "The correct answer is E: It searches out competitors' weaknesses."}, {"q": "Which of the following is a negative aspect of a competitor-centered company?", "options": {"A": "It may end up simply matching industry practices.", "B": "It fails to identify competitors' weaknesses.", "C": "It becomes stable and unreactive.", "D": "It fails to develop a fighter orientation.", "E": "It fails to notice weaknesses in its own position."}, "answer": "A", "explain": "The correct answer is A: It may end up simply matching industry practices."}]}, "ch19": {"title": "Chapter 19 \u2014 The Global Marketplace", "questions": [{"q": "Which of the following would a defender of globalization most likely use as an example to argue that concerns of Americanization are overblown and that globalization is indeed a two-way street?", "options": {"A": "the growing popularity of coffee in China since the introduction of Starbucks", "B": "the initial failure of Disneyland Paris", "C": "the anti-globalization protests aimed at KFC", "D": "the growing number of IKEA furniture stores in the United States", "E": "the view of McDonald's being a domestic brand in China"}, "answer": "D", "explain": "The correct answer is D: the growing number of IKEA furniture stores in the United States"}, {"q": "Which of the following does NOT characterize international trade in the past 30 years?", "options": {"A": "The number of multinational corporations has more than doubled.", "B": "Half the largest economies in the world are corporations.", "C": "Home markets are just as rich in opportunity as foreign markets.", "D": "Trade value of products and services grew even during the recession.", "E": "U.S. companies have long been successful at international marketing."}, "answer": "C", "explain": "The correct answer is C: Home markets are just as rich in opportunity as foreign markets."}, {"q": "Which of the following is most likely to be the consequence of increased growth of global trade?", "options": {"A": "Home markets become richer in opportunities.", "B": "Industries become safe from foreign competition.", "C": "Domestic companies increase their chances to dominate their home markets.", "D": "Foreign firms expand aggressively into new international markets.", "E": "Global competition is curbed."}, "answer": "D", "explain": "The correct answer is D: Foreign firms expand aggressively into new international markets."}, {"q": "Firms that decide against international expansion to play it safe ________.", "options": {"A": "gain a competitive edge against imports in their home markets", "B": "risk losing their home markets", "C": "increase their chances of entering other markets", "D": "protect themselves from competition at home", "E": "successfully shield themselves from foreign competition"}, "answer": "B", "explain": "The correct answer is B: risk losing their home markets"}, {"q": "Which of the following is a risk associated with international trade?", "options": {"A": "technological obsolescence", "B": "lack of trade barriers", "C": "currency stagnation", "D": "market monopolization", "E": "highly unstable governments"}, "answer": "E", "explain": "The correct answer is E: highly unstable governments"}, {"q": "Which question should most likely be answered by all companies due to the rapid move toward globalization?", "options": {"A": "Where should we produce or source our products?", "B": "How should we fulfill our environmental obligations?", "C": "How should we eliminate domestic competition?", "D": "Should we diversify in a new business area in the home country?", "E": "Which medium of advertising should we use in our home country?"}, "answer": "A", "explain": "The correct answer is A: Where should we produce or source our products?"}, {"q": "Which of the following is a nontariff trade barrier?", "options": {"A": "quota", "B": "exchange premium", "C": "restrictive product standards", "D": "boycott", "E": "strike"}, "answer": "C", "explain": "The correct answer is C: restrictive product standards"}, {"q": "Which of the following was a result of the Uruguay Round of global WTO trade talks?", "options": {"A": "It minimized the international protection of copyrights, patents, and trademarks.", "B": "It established the EU to reduce trade barriers and increase cooperation among its members.", "C": "It increased the world's remaining merchandise tariffs by 30 percent.", "D": "It established the NATO for purposes of collective security.", "E": "It extended the WTO to cover trade in agriculture and a wide range of services."}, "answer": "E", "explain": "The correct answer is E: It extended the WTO to cover trade in agriculture and a wide range of services."}, {"q": "Growing Green, a U.S. company that markets organic and environmentally friendly gardening and landscaping supplies and equipment, wants to expand the business internationally. Growing Green managers are currently examining the rules imposed by the WTO and the agreements made by NAFTA and the EU. In which stage of the international marketing process is Growing Green?", "options": {"A": "deciding how to enter the market", "B": "deciding on the global pricing strategies", "C": "looking at the global marketing environment", "D": "deciding on the global marketing program", "E": "deciding which markets to enter"}, "answer": "C", "explain": "The correct answer is C: looking at the global marketing environment"}, {"q": "Foreign businesses in India appear to receive unusually close scrutiny and special regulations, aimed at protecting the local businesses. This is an example of a(n) ________.", "options": {"A": "quota", "B": "nontariff trade barrier", "C": "tariff", "D": "exchange control", "E": "boycott"}, "answer": "B", "explain": "The correct answer is B: nontariff trade barrier"}, {"q": "Which of the following is an example of an economic community?", "options": {"A": "BRIC", "B": "NAFTA", "C": "WTO", "D": "GATT", "E": "NATO"}, "answer": "B", "explain": "The correct answer is B: NAFTA"}, {"q": "Which of the following is a problem caused by a policy of the EU?", "options": {"A": "Barriers to the free flow of products, services, finances, and labor decreased.", "B": "The EU represents one of the world's largest single markets.", "C": "Economic powers stepped in to prop up weaker economies.", "D": "Adopting a common currency decreased currency risk.", "E": "Policies on trade with nonmember nations were developed."}, "answer": "C", "explain": "The correct answer is C: Economic powers stepped in to prop up weaker economies."}, {"q": "Trusted Wholesalers is a company that purchases products produced in Mexico and sells them to companies based in the United States and Canada. Management at Trusted Wholesalers would most likely be interested in becoming experts in the policies developed by ________.", "options": {"A": "NAFTA", "B": "the EU", "C": "the BRIC countries", "D": "CAFTA-DR", "E": "APTA"}, "answer": "A", "explain": "The correct answer is A: NAFTA"}, {"q": "Trusted Wholesalers is a company that currently purchases products made in Mexico and sells them to companies based in the United States and Canada. Trusted Wholesalers is considering whether to also purchase products produced in Costa Rica and the Dominican Republic. To make their decision, members of management at Trusted Wholesalers will most likely evaluate the agreements made by ________.", "options": {"A": "MCAN", "B": "CAFTA-DR", "C": "UNASUR", "D": "NAFTA", "E": "the EU"}, "answer": "B", "explain": "The correct answer is B: CAFTA-DR"}, {"q": "Which of the following is an example of a raw material exporting economy?", "options": {"A": "the United Kingdom", "B": "Brazil", "C": "Sweden", "D": "Russia", "E": "Chile"}, "answer": "E", "explain": "The correct answer is E: Chile"}, {"q": "Coffee, tea, cotton, and tobacco are the main exports of Uganda. It is most likely that Uganda has a(n) ________ economy.", "options": {"A": "subsistence", "B": "industrializing", "C": "raw material exporting", "D": "merchandise exporting", "E": "marketing"}, "answer": "C", "explain": "The correct answer is C: raw material exporting"}, {"q": "BRIC countries are examples of ________ economies.", "options": {"A": "industrial", "B": "industrializing", "C": "totalitarian", "D": "raw material exporting", "E": "subsistence"}, "answer": "B", "explain": "The correct answer is B: industrializing"}, {"q": "Which of the following characterizes emerging economies?", "options": {"A": "They consume most of their output and barter the rest for simple goods and services.", "B": "These countries are the best markets for large equipment, tools and supplies, and trucks.", "C": "They trade goods among themselves and also export them to other types of economies for raw materials and semifinished goods.", "D": "Most African countries fall into this category.", "E": "Industrialization typically creates a new rich class and a growing middle class, both demanding new types of imported goods."}, "answer": "E", "explain": "The correct answer is E: Industrialization typically creates a new rich class and a growing middle class, both demanding new types of imported goods."}, {"q": "Industrializing economies are also known as ________ economies.", "options": {"A": "totalitarian", "B": "emerging", "C": "raw material exporting", "D": "subsistence", "E": "capitalist"}, "answer": "B", "explain": "The correct answer is B: emerging"}, {"q": "India needs more imports of raw materials such as textiles, steel, and heavy machinery and fewer imports of finished textiles, paper products, and automobiles. In the context of industrial structures, India is most likely a(n) ________ economy.", "options": {"A": "industrializing", "B": "subsistence", "C": "raw material exporting", "D": "totalitarian", "E": "agrarian"}, "answer": "A", "explain": "The correct answer is A: industrializing"}, {"q": "Which of the following is an example of an industrial economy?", "options": {"A": "India", "B": "China", "C": "Vietnam", "D": "Japan", "E": "North Korea"}, "answer": "D", "explain": "The correct answer is D: Japan"}, {"q": "Countries with ________ economies consist mostly of households with very low family incomes.", "options": {"A": "industrial", "B": "emerging", "C": "raw material exporting", "D": "subsistence", "E": "industrializing"}, "answer": "D", "explain": "The correct answer is D: subsistence"}, {"q": "Foreign businesses in India appear to receive unusually close scrutiny and must meet special regulations, aimed at protecting local businesses. This includes nontariff trade barriers. This reflects that a country's ________ should be carefully considered before doing business in that country.", "options": {"A": "natural resources", "B": "income distribution", "C": "industrial structure", "D": "political-legal environment", "E": "cultural norms"}, "answer": "D", "explain": "The correct answer is D: political-legal environment"}, {"q": "If Azerbaijan imported wheat from Romania in exchange for crude oil, and Vietnam exchanged rice for Philippine fertilizer and coconuts then these scenarios would be examples of ________.", "options": {"A": "compensation", "B": "cash transaction", "C": "barter", "D": "blocked currency", "E": "buyback"}, "answer": "C", "explain": "The correct answer is C: barter"}, {"q": "Nike inadvertently offended Chinese officials when it ran an ad featuring LeBron James crushing a number of revered Chinese figures in a kung fu-themed television ad. As a result, Nike has to release a formal apology. This is an example of the impact of ________ on marketing strategy.", "options": {"A": "income distribution", "B": "political stability", "C": "monetary regulations", "D": "culture", "E": "level of industrialization"}, "answer": "D", "explain": "The correct answer is D: culture"}, {"q": "Which of the following is the LEAST critical decision a company should make before going abroad?", "options": {"A": "How many foreign nationals should the company employ?", "B": "Do the company's managers have the necessary international experience?", "C": "Can the company offer competitively attractive products?", "D": "Can the company adapt to other countries' business cultures?", "E": "Can the company learn to understand buyer behavior of consumers in other countries?"}, "answer": "A", "explain": "The correct answer is A: How many foreign nationals should the company employ?"}, {"q": "Demographic characteristics, geographic characteristics, economic factors, sociocultural factors, and political and legal factors all help a company ________.", "options": {"A": "evaluate its value delivery network", "B": "determine a country's income distribution", "C": "evaluate its marketing objectives", "D": "determine a country's degree of globalization", "E": "determine a market's potential"}, "answer": "E", "explain": "The correct answer is E: determine a market's potential"}, {"q": "Which of the following is a demographic factor that a company should consider before deciding to enter into a new country?", "options": {"A": "transportation structure", "B": "languages", "C": "natural resources", "D": "political stability", "E": "education"}, "answer": "E", "explain": "The correct answer is E: education"}, {"q": "Which of the following is a sociocultural factor that a company should consider before deciding to enter into a new country?", "options": {"A": "population density (urban vs. rural)", "B": "income distribution", "C": "education", "D": "political stability", "E": "consumer lifestyles, beliefs, and values"}, "answer": "E", "explain": "The correct answer is E: consumer lifestyles, beliefs, and values"}, {"q": "Which of the following is a geographic factor that a company should consider before deciding to enter into a new country?", "options": {"A": "government bureaucracy", "B": "GDP size and growth", "C": "business norms and approaches", "D": "population size", "E": "climate"}, "answer": "E", "explain": "The correct answer is E: climate"}, {"q": "Which of the following is a political and legal factor that a company should consider before deciding to enter into a new country?", "options": {"A": "transportation structure", "B": "industrial infrastructure", "C": "population size and growth", "D": "monetary and trade regulations", "E": "business norms and approaches"}, "answer": "D", "explain": "The correct answer is D: monetary and trade regulations"}, {"q": "Which of the following is an economic factor that a company should consider before deciding to enter into a new country?", "options": {"A": "political stability", "B": "cultural and social norms", "C": "climate", "D": "population size and growth", "E": "natural resources"}, "answer": "E", "explain": "The correct answer is E: natural resources"}, {"q": "Members of management at Growing Green, a company that markets organic and environmentally friendly gardening and landscaping supplies and equipment, are evaluating the benefits and disadvantages of indirect exporting, direct exporting, and licensing. In which stage of the international marketing process is Growing Green?", "options": {"A": "deciding which markets to enter", "B": "deciding on the global marketing program", "C": "deciding how to enter the market", "D": "deciding on the global advertising strategy", "E": "deciding on the global marketing organization"}, "answer": "C", "explain": "The correct answer is C: deciding how to enter the market"}, {"q": "Which of the following characterizes indirect exporting?", "options": {"A": "It requires more investment than joint venturing.", "B": "It involves less risk and investment than other entry methods.", "C": "It involves joining with foreign companies to produce or market products or services.", "D": "It requires an overseas marketing organization or network.", "E": "The potential returns are greater than direct exporting."}, "answer": "B", "explain": "The correct answer is B: It involves less risk and investment than other entry methods."}, {"q": "Think Ink is a growing company that sells a variety of inks for home and business printers. Management at Think Ink has decided to open a sales branch overseas to handle sales and distribution abroad. Think Ink is engaging in ________.", "options": {"A": "direct exporting", "B": "management contracting", "C": "joint ownership", "D": "indirect exporting", "E": "licensing"}, "answer": "A", "explain": "The correct answer is A: direct exporting"}, {"q": "In Japan, Budweiser beer flows from Kirin breweries, and Moringa Milk Company produces Sunkist fruit juice. These are examples of ________.", "options": {"A": "joint venturing", "B": "contract manufacturing", "C": "management contracting", "D": "licensing", "E": "directly investment"}, "answer": "D", "explain": "The correct answer is D: licensing"}, {"q": "Sears opened up department stores in Mexico and Spain, where it found qualified local manufacturers to produce many of the products it sells. This type of joint venture is known as ________.", "options": {"A": "contract manufacturing", "B": "licensing", "C": "joint ownership", "D": "management contracting", "E": "indirect exporting"}, "answer": "A", "explain": "The correct answer is A: contract manufacturing"}, {"q": "Which of the following is true of contract manufacturing?", "options": {"A": "It leads to an increase in potential profits on manufacturing.", "B": "It provides a chance to start faster but with more risks.", "C": "It is the simplest way to enter a foreign market.", "D": "It involves decreased control over the manufacturing process.", "E": "It involves entering a foreign market by exporting surplus products."}, "answer": "D", "explain": "The correct answer is D: It involves decreased control over the manufacturing process."}, {"q": "Hilton helps others run their hotels by providing the management know-how. This type of joint venture is known as ________.", "options": {"A": "contract manufacturing", "B": "joint ownership", "C": "management contracting", "D": "licensing", "E": "direct investment"}, "answer": "C", "explain": "The correct answer is C: management contracting"}, {"q": "Campbell Soup recently joined forces with Hong Kong-based Swire Pacific to form an entity called Campbell Swire to better distribute the company's soups in China. This is an example of ________.", "options": {"A": "licensing", "B": "indirect exporting", "C": "joint ownership", "D": "contract manufacturing", "E": "management contracting"}, "answer": "C", "explain": "The correct answer is C: joint ownership"}, {"q": "Lower costs in the form of cheaper labor or raw materials, foreign government investment incentives, freight savings, and the opportunity to improve the company image are the factors that would most likely lead a company to enter a foreign market using the market entry strategy of ________.", "options": {"A": "management contracting", "B": "licensing", "C": "direct investment", "D": "direct exporting", "E": "indirect exporting"}, "answer": "C", "explain": "The correct answer is C: direct investment"}, {"q": "Heineken beer is sold successfully in the same form around the world. Which of the following product strategies is illustrated in this example?", "options": {"A": "product adaptation", "B": "communication adaptation", "C": "product augmentation", "D": "straight product extension", "E": "product invention"}, "answer": "D", "explain": "The correct answer is D: straight product extension"}, {"q": "Kraft has adapted its popular Oreo cookie to the unique tastes of consumers all around the world, whether it's mango-and-orange flavored Oreos in the Asia Pacific region, green tea Oreos in China, a chocolate and peanut variety in Indonesia, or banana and dulce de leche in Argentina. This is an example of ________.", "options": {"A": "communication adaptation", "B": "straight product extension", "C": "product adaptation", "D": "product augmentation", "E": "product invention"}, "answer": "C", "explain": "The correct answer is C: product adaptation"}, {"q": "________ involves changing the product to meet local requirements, conditions, or wants.", "options": {"A": "Communication adaptation", "B": "Standard global marketing", "C": "Product adaptation", "D": "Straight product extension", "E": "Product invention"}, "answer": "C", "explain": "The correct answer is C: Product adaptation"}, {"q": "Vidal Sassoon shampoos contain different amounts of scent according to the country in which they are sold. This is an example of ________.", "options": {"A": "straight product extension", "B": "product adaptation", "C": "standardized global marketing", "D": "product invention", "E": "communication adaptation"}, "answer": "B", "explain": "The correct answer is B: product adaptation"}, {"q": "________ consists of creating something new to meet the needs of consumers in a given country.", "options": {"A": "Product adaptation", "B": "Joint venturing", "C": "Product invention", "D": "Straight product extension", "E": "Communication adaptation"}, "answer": "C", "explain": "The correct answer is C: Product invention"}, {"q": "GigaTalk, a U.S. based computer manufacturing company, found that Japanese commuters had difficulty using standard laptops on crowded rush-hour trains because while standing, commuters cannot use their laptops. So GigaTalk created a standing computer. This computer includes a touch screen and small keyboard that can be used while standing or on the move. This is an example of ________.", "options": {"A": "communication adaptation", "B": "dual adaptation", "C": "straight product extension", "D": "product adaptation", "E": "standardized global marketing"}, "answer": "D", "explain": "The correct answer is D: product adaptation"}, {"q": "Kellogg ads in the United States promote the taste and nutrition of Kellogg's cereals versus competitors' brands. In France, where consumers drink little milk and eat little for breakfast, Kellogg's ads must convince consumers that cereals are a tasty and healthful breakfast. Which marketing strategy is being followed by Kellogg?", "options": {"A": "communication adaptation", "B": "product invention", "C": "straight communication extension", "D": "product adaptation", "E": "straight product extension"}, "answer": "A", "explain": "The correct answer is A: communication adaptation"}, {"q": "In Chinese, the KFC slogan \"finger-lickin' good\" came out as \"eat your fingers off.\" And Motorola's Hello-moto ringtone sounded like \"Hello, Fatty\" in India. Which of the following strategies can be used to avoid such mistakes?", "options": {"A": "straight product extension", "B": "standardized global marketing", "C": "product adaptation", "D": "communication extension", "E": "communication adaptation"}, "answer": "E", "explain": "The correct answer is E: communication adaptation"}, {"q": "Assume that a Gucci handbag sells for $60 in Italy and $240 in the United States because Gucci must add the cost of transportation, tariffs, importer margin, wholesaler margin, and retailer margin to its factory price. This information indicates that Gucci faces a ________ problem.", "options": {"A": "licensing", "B": "tariff", "C": "dumping", "D": "product adaptation", "E": "price escalation"}, "answer": "E", "explain": "The correct answer is E: price escalation"}, {"q": "Refer to the scenario below to answer the following question.<br><br>Selman & Saks, a maker of men's and women's razors and electric hair trimmers, had little reason to become involved in the global arena. But after acquiring Wellman Enterprises, whose largest division engages in a licensing agreement with a German firm to produce women's hosiery, managers at Selman & Saks wondered whether a company-wide global focus would be more profitable after all. Managers at Selman & Saks studied Wellman's licensing agreement in great detail. Even after seeing the benefits Wellman achieved with the licensing agreement, managers decided that Selman & Saks would target the French market merely via exporting. With the assistance of a domestic export department, Selman & Saks razors and hair trimmers entered France. For six months, sales were mediocre. But after that, sales suffered. Opinions varied among numerous managers as to the cause of the failure. \"Who knows the local market better than people who live there?\" was a comment heard throughout Selman & Saks. \"Maybe we needed an alliance with a French firm, or a licensing agreement, before racing to get there.\"<br><br>If Selman & Saks allowed a French company to produce and market razors and trimmers carrying the company's brand in exchange for a royalty, Selman & Saks would be using the market entry strategy of ________.", "options": {"A": "licensing", "B": "franchising", "C": "contract manufacturing", "D": "joint ownership", "E": "exporting"}, "answer": "A", "explain": "The correct answer is A: licensing"}, {"q": "Refer to the scenario below to answer the following question.<br><br>Selman & Saks, a maker of men's and women's razors and electric hair trimmers, had little reason to become involved in the global arena. But after acquiring Wellman Enterprises, whose largest division engages in a licensing agreement with a German firm to produce women's hosiery, managers at Selman & Saks wondered whether a company-wide global focus would be more profitable after all. Managers at Selman & Saks studied Wellman's licensing agreement in great detail. Even after seeing the benefits Wellman achieved with the licensing agreement, managers decided that Selman & Saks would target the French market merely via exporting. With the assistance of a domestic export department, Selman & Saks razors and hair trimmers entered France. For six months, sales were mediocre. But after that, sales suffered. Opinions varied among numerous managers as to the cause of the failure. \"Who knows the local market better than people who live there?\" was a comment heard throughout Selman & Saks. \"Maybe we needed an alliance with a French firm, or a licensing agreement, before racing to get there.\"<br><br>Selman & Saks offered the same razors and trimmers in France as in the United States. Selman & Saks is an example of a ________.", "options": {"A": "straight product extension", "B": "product invention", "C": "standardized global marketing plan", "D": "communication adaptation", "E": "product adaptation"}, "answer": "A", "explain": "The correct answer is A: straight product extension"}]}, "ch20": {"title": "Chapter 20 \u2014 Sustainable Marketing", "questions": [{"q": "The marketing concept is a philosophy of ________.", "options": {"A": "customer value and mutual gain", "B": "serving short term interests over long term gains", "C": "sales and profit maximization", "D": "serving the company's interests over the consumers'", "E": "promotion value and company gain"}, "answer": "A", "explain": "The correct answer is A: customer value and mutual gain"}, {"q": "McDonald's marketing strategy during the last ten years has added healthy food options to its menu, phased out traditional artery-clogging trans fats, launched a major multifaceted education campaign, and addressed environmental issues. McDonald's current marketing strategy best exemplifies the ________.", "options": {"A": "sustainable marketing concept", "B": "strategic planning concept", "C": "consumer business concept", "D": "direct marketing concept", "E": "mercantilism concept"}, "answer": "A", "explain": "The correct answer is A: sustainable marketing concept"}, {"q": "The BeautyShop, a manufacturer of skin care products, uses only plant-based materials for its cosmetic products. It supports several environmental protection movements and movements defending human rights. This accounts for the company's efforts to build good will and corporate social responsibility. This exemplifies the ________ concept.", "options": {"A": "consumerism", "B": "sustainable marketing", "C": "direct marketing", "D": "strategic planning", "E": "consumer business"}, "answer": "B", "explain": "The correct answer is B: sustainable marketing"}, {"q": "Cybertron Inc. was accused of deceptive pricing. Which of the following explains what most likely occurred?", "options": {"A": "Cybertron advertised a large price reduction from a phony high retail list price.", "B": "Cybertron refused to advertise sale prices in the local paper.", "C": "Cybertron misrepresented a product's features in an ad.", "D": "Cybertron sold only defective products at the advertised price.", "E": "Cybertron used misleading labeling."}, "answer": "A", "explain": "The correct answer is A: Cybertron advertised a large price reduction from a phony high retail list price."}, {"q": "Hart's Department Store was accused of deceptive promotion. Which of the following best explains what might have happened?", "options": {"A": "Hart's refused to advertise sale prices in the local paper.", "B": "Hart's advertised a large price reduction from a phony high retail list price.", "C": "Hart's used misleading labeling on certain products.", "D": "Hart's exaggerated its package contents through subtle design.", "E": "Hart's advertised a bargain price on an out-of-stock product."}, "answer": "E", "explain": "The correct answer is E: Hart's advertised a bargain price on an out-of-stock product."}, {"q": "A federal agency ordered a fast food chain to stop running ads with false claims that its fried chicken is compatible with certain weight loss programs. Which agency had the authority to issue this order?", "options": {"A": "the American Marketing Association", "B": "the Consumer Product Safety Commission", "C": "the Food and Drug Administration", "D": "the Federal Trade Commission", "E": "the Environmental Protection Agency"}, "answer": "D", "explain": "The correct answer is D: the Federal Trade Commission"}, {"q": "Which of the following advertising situations would LEAST likely be considered \"puffery\"?", "options": {"A": "children immediately growing into attractive adults as a result of drinking milk", "B": "instantly toned thighs and legs as a result of using the Thigh Master for only 15 minutes", "C": "Mr. Clean coming to a housewife's rescue", "D": "a retired couple drinking a vitamin and protein shake and then going bicycling", "E": "a sleepy mom who wakes up to a gray day, drinks a cup of coffee, and then looks out her window to see golden sunshine, beautiful flowers blooming, songbirds singing, and a rainbow on the horizon"}, "answer": "D", "explain": "The correct answer is D: a retired couple drinking a vitamin and protein shake and then going bicycling"}, {"q": "In which of the following scenarios would high-pressure selling tactics typically be most advantageous for marketers?", "options": {"A": "selling situations with dissatisfied customers", "B": "selling situations with long-time customers", "C": "selling situations with a company's most highly valued customers", "D": "selling situations with new customers with a high likelihood of becoming repeat customers", "E": "selling situations with one-time customers"}, "answer": "E", "explain": "The correct answer is E: selling situations with one-time customers"}, {"q": "The success of the Tom Dennis Ford dealership has been built largely on return customers and word-of-mouth recommendations. The majority of sales are made to customers who previously purchased a vehicle at the dealership or who know someone who had a positive experience of purchasing a vehicle there. The sales force at the Tom Dennis Ford dealership most likely knows that using high-pressure selling is ineffective if the dealership wants to ________.", "options": {"A": "achieve short-term gains", "B": "move last year's models", "C": "maintain a database of local customers", "D": "build long-term customer relationships", "E": "obey local and federal law"}, "answer": "D", "explain": "The correct answer is D: build long-term customer relationships"}, {"q": "Recently, a class-action lawsuit was brought against BigBurger, a fast food chain, charging that its food has contributed to the nationwide obesity epidemic. The suit was eventually dismissed, but many critics continue to point out the health dangers of typical \"fast food\" menu items. These critics are most likely concerned that the fast food industry has used ________.", "options": {"A": "deceptive pricing", "B": "harmful products", "C": "deceptive promotions", "D": "deceptive packaging", "E": "high-pressure selling"}, "answer": "B", "explain": "The correct answer is B: harmful products"}, {"q": "Trendy Teens manufactures fashionable clothing and accessories for the tween and teen female markets. New merchandise with a very different look is rolled out each season and heavily promoted as the \"must-have\" style in a variety of media. This information indicates that Trendy Teens is most likely to be criticized for ________.", "options": {"A": "perceived obsolescence", "B": "shoddy products", "C": "high-pressure selling", "D": "deceptive promotions", "E": "poor service to disadvantaged consumers"}, "answer": "A", "explain": "The correct answer is A: perceived obsolescence"}, {"q": "How do marketers respond to charges of planned obsolescence?", "options": {"A": "The product will eventually wear out anyway.", "B": "Most consumers are materialistic.", "C": "Consumers dislike constant style changes.", "D": "It promotes the all-American value of consumerism.", "E": "Consumers get tired of old goods."}, "answer": "E", "explain": "The correct answer is E: Consumers get tired of old goods."}, {"q": "The following quote best describes ________. \"The marvels of modern technology include the development of a soda can which, when discarded, will last forever, and a car, which when properly cared for, will rust out in two or three years.\"", "options": {"A": "planned obsolescence", "B": "deceptive packaging", "C": "deceptive promotions", "D": "product failure", "E": "excessive markups"}, "answer": "A", "explain": "The correct answer is A: planned obsolescence"}, {"q": "Critics say marketing benefits ________ more than ________.", "options": {"A": "exporters; importers", "B": "stores; manufacturers", "C": "industry; consumers", "D": "consumers; manufacturers", "E": "independent sellers; chain stores"}, "answer": "C", "explain": "The correct answer is C: industry; consumers"}, {"q": "Marketers are most effective when they appeal to ________ rather than when they ________.", "options": {"A": "the mass market; appeal to market segments", "B": "emotions; appeal to actual needs", "C": "short-term needs; focus on long-term needs", "D": "teenagers; target older people", "E": "existing wants; attempt to create new ones"}, "answer": "E", "explain": "The correct answer is E: existing wants; attempt to create new ones"}, {"q": "It is most accurate to say that the recession of 2008/2009 has resulted in ________.", "options": {"A": "an overselling of private goods", "B": "a decline in conspicuous spending", "C": "a disbelief in the American dream", "D": "an increase in materialism", "E": "the elimination of false wants"}, "answer": "B", "explain": "The correct answer is B: a decline in conspicuous spending"}, {"q": "Which of the following is one of the social costs associated with cars?", "options": {"A": "new highways", "B": "cleaner roads", "C": "new automobile models", "D": "water pollution", "E": "traffic congestion"}, "answer": "E", "explain": "The correct answer is E: traffic congestion"}, {"q": "TerraPass is a company that offers consumers the opportunity to buy carbon offsets, which are contributions to projects that combat global warming by reducing carbon emissions. TerraPass offers contribution packages for driving, flying, and home energy use. Through TerraPass, consumers can pay some of the ________ costs of their private goods and services.", "options": {"A": "health", "B": "promotional", "C": "safety", "D": "social", "E": "distribution"}, "answer": "D", "explain": "The correct answer is D: social"}, {"q": "Which of the following is an example of cultural pollution?", "options": {"A": "street signs in cities", "B": "gasoline shortages", "C": "billboards marring beautiful scenery", "D": "congestion tolls", "E": "overpasses in suburban areas"}, "answer": "C", "explain": "The correct answer is C: billboards marring beautiful scenery"}, {"q": "Karl Harris, a marketing critic, is concerned about the pervasiveness of marketing. He points out that advertising messages are everywhere, from Web sites and e-mails to unwanted direct mail and catalogs to television commercials and product tie-ins to billboards and store signage. Karl is concerned about ________.", "options": {"A": "false wants and too much materialism", "B": "cultural pollution", "C": "high packaging costs", "D": "deceptive practices", "E": "the balance between private goods and social goods"}, "answer": "B", "explain": "The correct answer is B: cultural pollution"}, {"q": "Critics argue that large marketing companies use patents and heavy promotion spending to ________.", "options": {"A": "bear the social costs of their operations", "B": "offset cultural pollution", "C": "acquire smaller companies", "D": "achieve economies of scale", "E": "bar new companies from entering an industry"}, "answer": "E", "explain": "The correct answer is E: bar new companies from entering an industry"}, {"q": "How are acquisitions good for society?", "options": {"A": "Acquisitions eliminate barriers to entry.", "B": "An acquiring company may improve the efficiency of an acquired company.", "C": "Acquisitions require little government oversight.", "D": "The acquisition may result in higher costs, leading to higher prices for consumers.", "E": "An industry may become less competitive after an acquisition."}, "answer": "B", "explain": "The correct answer is B: An acquiring company may improve the efficiency of an acquired company."}, {"q": "Which of the following is a traditional sellers' right?", "optio
