<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Principles of Marketing — Study Guide</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card2: #273449;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --good: #4ade80;
    --bad: #f87171;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }
  header { text-align: center; margin-bottom: 16px; }
  header h1 { font-size: 1.5rem; margin: 0 0 4px; }
  header p { color: var(--muted); margin: 0; font-size: 0.9rem; }

  .chapter-bar, .mode-bar {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 12px;
  }
  .chip {
    padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer; font-size: 0.85rem;
  }
  .chip.active { background: var(--accent); color: #0f172a; border-color: var(--accent); font-weight: 600; }
  .chip.disabled { opacity: 0.4; cursor: not-allowed; }
  .chip.mode { font-weight: 600; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; margin-bottom: 16px;
  }
  .sticky { position: sticky; top: 8px; z-index: 5; }

  .progress-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
  .progress-track { flex: 1; height: 8px; border-radius: 99px; background: var(--card2); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .2s; }
  .score-pill {
    background: var(--card2); border-radius: 999px; padding: 4px 12px; font-size: 0.85rem; white-space: nowrap;
  }

  .nav-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  button.nav {
    flex: 1; min-width: 140px; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card2); color: var(--text); cursor: pointer; font-size: 0.9rem;
  }
  button.nav.primary { background: var(--accent); color: #0f172a; font-weight: 600; border-color: var(--accent); }
  button.nav:hover { filter: brightness(1.1); }

  .qnum { color: var(--accent); font-weight: 700; margin-right: 6px; }
  .qtext { font-weight: 600; margin-bottom: 10px; }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    text-align: left; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card2); color: var(--text); cursor: pointer; font-size: 0.92rem;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); }
  .opt:disabled { cursor: default; }
  .opt.correct { background: rgba(74, 222, 128, 0.15); border-color: var(--good); color: var(--good); }
  .opt.incorrect { background: rgba(248, 113, 113, 0.15); border-color: var(--bad); color: var(--bad); }

  .explain {
    margin-top: 10px; padding: 10px 12px; border-radius: 10px; font-size: 0.88rem; display: none;
  }
  .explain.show { display: block; }
  .explain.right { background: rgba(74, 222, 128, 0.1); border: 1px solid var(--good); }
  .explain.wrong { background: rgba(248, 113, 113, 0.1); border: 1px solid var(--bad); }

  .review-list { display: flex; flex-direction: column; gap: 6px; }
  .review-item { font-size: 0.88rem; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .review-item .q { font-weight: 600; }
  .review-item .a { color: var(--muted); }
  .review-item .y { color: var(--good); }

  .placeholder { text-align: center; color: var(--muted); padding: 40px 20px; }

  .flash-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .flash-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; margin-top: 16px;
  }
  .flash-card { perspective: 1000px; height: 220px; cursor: pointer; }
  .flash-inner {
    position: relative; width: 100%; height: 100%; transition: transform .5s;
    transform-style: preserve-3d;
  }
  .flash-card.flipped .flash-inner { transform: rotateY(180deg); }
  .flash-face {
    position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px;
    border: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column;
    background: var(--card2); overflow-y: auto;
  }
  .flash-front { justify-content: center; align-items: center; text-align: center; }
  .flash-back { transform: rotateY(180deg); background: #1a2942; }
  .flash-section { color: var(--accent); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .flash-term { font-size: 1.1rem; font-weight: 700; }
  .flash-hint { color: var(--muted); font-size: 0.78rem; margin-top: 10px; }
  .flash-def { font-size: 0.88rem; margin-bottom: 8px; }
  .flash-example { font-size: 0.82rem; color: var(--muted); font-style: italic; }

  footer { text-align: center; color: var(--muted); font-size: 0.78rem; margin-top: 30px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Principles of Marketing — Study Guide</h1>
    <p>Kotler, 19th Edition · Quiz &amp; Flashcards</p>
  </header>
  <div id="chapterBar" class="chapter-bar"></div>
  <div id="modeBar" class="mode-bar"></div>
  <div id="app"></div>
  <footer>Made for personal exam prep. No live exam questions are included.</footer>
</div>

<script>
const studyData = {"ch11": {"title": "Chapter 11 \u2014 Pricing: Strategies", "questions": [{"q": "Midnight Magic, a perfume manufacturing company, plans to release a new fragrance during the holiday season at $99 per bottle. The company intends to bring the price down to $49 within six months of its release to attract buyers who couldn't afford the initial price. Which pricing strategy is Midnight Magic using?", "options": {"A": "market-penetration pricing", "B": "cost-plus pricing", "C": "market-skimming pricing", "D": "competitive pricing", "E": "product-line pricing"}, "answer": "C", "explain": "Starting high and lowering the price over time to skim off less price-sensitive buyers first is the textbook definition of market-skimming pricing."}, {"q": "Which of the following is true of price skimming?", "options": {"A": "It is effective in situations in which competitors are able to undercut prices easily.", "B": "It involves underpricing products so that companies make larger sales.", "C": "It can be profitably used when the product's quality and image support its price.", "D": "It is ineffective in situations in which competitors are unable to enter the market easily.", "E": "It leads to a situation in which the company completes more, though less profitable, sales."}, "answer": "C", "explain": "Skimming only works if the product's perceived quality and image justify the high price; otherwise buyers won't pay it."}, {"q": "A market-penetration pricing policy should LEAST likely be used for a new product when ________.", "options": {"A": "production and distribution costs fall as sales volume increases", "B": "the market is highly price sensitive", "C": "there are few or no competitors in the market", "D": "a high price helps keep out the competition", "E": "the product's quality and image support a high price"}, "answer": "E", "explain": "If quality/image support a high price, skimming (not penetration) is the better fit, so this is the condition LEAST suited to penetration pricing."}, {"q": "Which of the following is true of market-penetration pricing?", "options": {"A": "It is best used in conjunction with a market-skimming pricing strategy.", "B": "It involves setting a high price for a new product to appeal to the elite in society.", "C": "It results in the company making fewer and less profitable sales.", "D": "It should be used when the product's quality and image support a high price.", "E": "It results in drawing in large numbers of buyers quickly, winning a large market share."}, "answer": "E", "explain": "Penetration pricing sets a low initial price specifically to attract many buyers fast and capture a large market share."}, {"q": "In a bid to attract more customers in a market that has several competitors, Barrymore's Bakery slashed the prices of all its products by 50 percent. Managers reasoned that lower prices would draw in even more customers, making up for the reduction in price several times over. Which pricing strategy are they using?", "options": {"A": "market-penetration pricing", "B": "market-skimming pricing", "C": "by-product pricing", "D": "captive-product pricing", "E": "cash discount pricing"}, "answer": "A", "explain": "Cutting price to drive volume and offset the lower margin with many more sales is classic market-penetration pricing."}, {"q": "Whizz Corp. wishes to introduce a new hybrid car into mature markets in developed countries with the goal of gaining mass-market share quickly. Which pricing strategy would help the firm meet its goal?", "options": {"A": "captive-product pricing", "B": "market-skimming pricing", "C": "market-penetration pricing", "D": "market-segmentation pricing", "E": "cost-plus pricing"}, "answer": "C", "explain": "Gaining mass-market share quickly is the goal penetration pricing is designed for."}, {"q": "Electrowhip, a company that manufactures blenders and electric whisks, has decided to use a market-penetration pricing strategy. Which of the following, if true, proves their decision to be a wise one?", "options": {"A": "Electrowhip does not operate in a price sensitive market.", "B": "Electrowhip's products are intended to appeal to the elite in society.", "C": "Electrowhip sells products whose image and quality support high prices.", "D": "Electrowhip operates in a market with many competitors.", "E": "Electrowhip's competitors utilize social media for marketing their products."}, "answer": "D", "explain": "A low entry price helps a company gain a foothold and discourage rivals when many competitors are already vying for the same buyers."}, {"q": "Champion, Inc. is a manufacturer of lunch boxes, school bags, and school stationery. Charles Payton, the CEO, hopes to sell the products at a low price to penetrate the market quickly. Which of the following best supports a market-penetration strategy for Champion?", "options": {"A": "The quality of the products supports high initial prices.", "B": "The market for the products is highly price sensitive.", "C": "The cost of producing a smaller volume is negligible.", "D": "It is very difficult for competitors to enter the market.", "E": "Production costs increase as sales volume increases."}, "answer": "B", "explain": "Penetration pricing works best when buyers are highly price sensitive and a low price will meaningfully drive demand."}, {"q": "Tone Zone plans to introduce four mp3 player models over the next year, ranging from basic players at $99 per unit to more sophisticated players at $399 per unit, with more features costing more. What pricing strategy is Tone Zone using?", "options": {"A": "by-product pricing", "B": "optional product pricing", "C": "product line pricing", "D": "product bundle pricing", "E": "captive product pricing"}, "answer": "C", "explain": "Setting price steps across a range of related models based on features is product line pricing."}, {"q": "Which of the following is true of product line pricing?", "options": {"A": "The price steps take cost differences between products in the line into account.", "B": "The pricing strategy involves overpricing products so that they appeal to the elite.", "C": "The price steps do not account for the prices of similar products from competitors.", "D": "The customer's perception of the value of different features is considered irrelevant.", "E": "The pricing strategy cannot be used by companies in developed countries."}, "answer": "A", "explain": "Product line pricing sets price steps based on cost differences, customer-perceived value, and competitors' prices."}, {"q": "Which of the following companies uses product line pricing?", "options": {"A": "Mobile Point, which launched a range of cell phone models, each priced according to its features", "B": "Penguin's Parlor, which offers customers a 20-percent discount on their birthdays and certain holidays", "C": "Panizza, whose combo meals are priced lower than the individual components sold together", "D": "Green Thumb, which gives away free watering cans with the purchase of certain potted plants", "E": "Photo Genie, which sells inexpensive cameras that run only on their own expensive batteries"}, "answer": "A", "explain": "Pricing a range of related models by their features is the hallmark of product line pricing."}, {"q": "Which of the following is true of optional-product pricing?", "options": {"A": "It is used to price a company's main product.", "B": "It involves setting geographically-specific prices.", "C": "It involves pricing products that can be added to the base product.", "D": "It involves capitalizing on low value by-products.", "E": "It is used to price products that must be used with the company's main product."}, "answer": "C", "explain": "Optional-product pricing covers accessories or add-ons sold alongside the main product."}, {"q": "Multiprint, a printer manufacturing firm, sells ink cartridges for each of its specific models. Only Multiprint cartridges are compatible with Multiprint printers, and no two models share the same specifications. What type of pricing does Multiprint use?", "options": {"A": "captive product pricing", "B": "product bundle pricing", "C": "product line pricing", "D": "optional product pricing", "E": "by-product pricing"}, "answer": "A", "explain": "Pricing required companion items that only work with the main product is captive-product pricing."}, {"q": "Which of the following product mix pricing strategies did Polaroid use when it set the general price range of its cameras low and the markup on its film high?", "options": {"A": "by-product pricing", "B": "customer-segmented pricing", "C": "product bundling pricing", "D": "captive product pricing", "E": "product-segmented pricing"}, "answer": "D", "explain": "Low price on the main product (camera) with high markup on the required companion item (film) is captive-product pricing."}, {"q": "Which of the following companies uses captive product pricing?", "options": {"A": "Photo Genie, which sells inexpensive cameras that run only on their own expensive batteries", "B": "Sportsprint, which prices sports equipment according to customer evaluations", "C": "Penguin's Parlor, which offers customers a 20-percent discount on their birthdays", "D": "Tune Zone, which launched a range of mp3 player models, each priced according to its features", "E": "Burger Den, whose combo meals are priced lower than its individual components sold together"}, "answer": "A", "explain": "A cheap main product that requires expensive proprietary refills/batteries is the classic captive-product setup."}, {"q": "When amusement parks charge customers for admission and later for food and beverages, they are following a ________ pricing strategy.", "options": {"A": "product line", "B": "two-part", "C": "skimming", "D": "penetration", "E": "by-product"}, "answer": "B", "explain": "Splitting price into a fixed entry fee plus variable charges for use is two-part pricing."}, {"q": "Cellpoint uses two-part pricing for its long-distance call charges. Because this is a service, the price is broken into a fixed fee plus a(n) ________ usage rate.", "options": {"A": "fixed", "B": "standard", "C": "optional", "D": "variable", "E": "market"}, "answer": "D", "explain": "Two-part pricing for services combines a fixed fee with a variable rate tied to actual usage."}, {"q": "Which of the following is true of product bundle pricing?", "options": {"A": "It results in companies making fewer, though more profitable, sales.", "B": "It promotes the sale of products consumers might not otherwise buy.", "C": "It involves pricing the main product low and setting high markups on the supplies.", "D": "It is used to set prices across an entire product range based on customer evaluations.", "E": "It forces customers to buy product parts that are only compatible with the main product."}, "answer": "B", "explain": "Bundling combines products at a reduced total price, which can prompt customers to buy items they wouldn't have purchased separately."}, {"q": "Which of the following companies uses product bundle pricing?", "options": {"A": "Green Thumb, which gives away free watering cans with the purchase of certain potted plants", "B": "Panizza, whose combo meals are priced lower than its individual components sold together", "C": "Tune Zone, which launched a range of mp3 player models, each priced according to its features", "D": "Photo Genie, which sells inexpensive cameras that run only on their own, expensive, batteries", "E": "Penguin's Parlor, which offers customers a 20 percent discount on their birthdays"}, "answer": "B", "explain": "Combo meals priced below the sum of their individual items is a textbook example of product bundle pricing."}, {"q": "Charles Payton decides to offer customers a special \"letter writing\" kit comprising letter paper, matching envelopes, and pens, priced at $5, even though the combined price of the individual items is $8. Which pricing strategy is he using?", "options": {"A": "optional product pricing", "B": "captive product pricing", "C": "dynamic pricing", "D": "product bundle pricing", "E": "by-product pricing"}, "answer": "D", "explain": "Combining several items into one package at a price below their separate total is product bundle pricing."}, {"q": "Leicestershire Renovations has a history of problems with customers who do not pay their bills on time. The firm wants to improve its cash situation, reduce bad debts, and reduce credit-collection costs. Which form of pricing would most likely help the firm achieve its goal?", "options": {"A": "zone pricing", "B": "quantity discounts", "C": "product bundling", "D": "cash discounts", "E": "by-product pricing"}, "answer": "D", "explain": "Cash discounts reward customers for paying their bills promptly, which directly improves cash flow and reduces collection costs."}, {"q": "The discount offered by Glamor Gifts to customers who bought Valentine-themed merchandise the week following Valentine's Day is an example of a ________.", "options": {"A": "cash discount", "B": "functional discount", "C": "time-based discount", "D": "seasonal discount", "E": "trade discount"}, "answer": "D", "explain": "A discount for buying out-of-season merchandise is a seasonal discount."}, {"q": "In return for participating in Honda advertising and sales support programs, Honda dealerships are rewarded with payments or price reductions, which are known as ________.", "options": {"A": "functional allowances", "B": "promotional allowances", "C": "seasonal discounts", "D": "trade-in allowances", "E": "cash discounts"}, "answer": "B", "explain": "Payments to dealers for participating in advertising/promotion programs are promotional allowances."}, {"q": "The New Age Gallery has three admission prices for students, adults, and seniors, even though all three groups are entitled to the same services. This form of pricing is called ________ pricing.", "options": {"A": "psychological", "B": "by-product", "C": "customer-segment", "D": "captive product", "E": "product form"}, "answer": "C", "explain": "Charging different groups of customers different prices for the same service is customer-segment pricing."}, {"q": "Sparkling Valley, a luxury resort, prices cottages facing the lake higher than cottages that do not, even though the cottages and services offered are identical in every other aspect. This form of pricing is called ________ pricing.", "options": {"A": "time-based", "B": "by-product", "C": "seasonal", "D": "location-based", "E": "captive product"}, "answer": "D", "explain": "Charging more for a more desirable location within the same property is location-based pricing."}, {"q": "When theaters vary seat prices due to audience preferences for seats in coveted rows, they use ________ pricing.", "options": {"A": "captive product", "B": "time-based", "C": "location-based", "D": "product line", "E": "customer-segment"}, "answer": "C", "explain": "Pricing seats differently based on their location within the venue is location-based pricing."}, {"q": "Segmented pricing is only effective when ________.", "options": {"A": "the cost of segmenting does not exceed the revenue obtained from the price difference", "B": "the segments show similar degrees of demand", "C": "the segmented prices do not reflect real differences in customers' perceived value", "D": "companies make their services and products accessible exclusively to wealthy patrons", "E": "the customers of different socio-economic classes are treated according to their rank"}, "answer": "A", "explain": "Segmenting only pays off if the extra revenue it generates exceeds the cost of administering different prices."}, {"q": "Which of the following is a price adjustment strategy that considers how a customer's perception of a product is influenced by its price?", "options": {"A": "by-product pricing", "B": "international pricing", "C": "psychological pricing", "D": "captive product pricing", "E": "promotional pricing"}, "answer": "C", "explain": "Psychological pricing leans on the idea that price itself signals quality and shapes perception."}, {"q": "Consumers are less likely to use price to judge the quality of a product when they ________.", "options": {"A": "are shopping for luxury items", "B": "cannot physically examine the product", "C": "have never tried the product before", "D": "have experience with the product", "E": "have little knowledge of the brand"}, "answer": "D", "explain": "Once buyers have direct experience with a product, they rely on that experience rather than price as a quality signal."}, {"q": "La Belle released a cut glass bottle of perfume at $299 per item, even though its major competitor prices its signature scent at $99. La Belle reasons that customers in search of luxury goods will prefer its product because they are likelier to believe that high price indicates superior quality. What price adjustment strategy is evident in its reasoning?", "options": {"A": "captive product pricing", "B": "psychological pricing", "C": "location-based pricing", "D": "time-based pricing", "E": "seasonal pricing"}, "answer": "B", "explain": "Relying on price itself to signal superior quality to buyers is psychological pricing."}, {"q": "A supermarket places its store brand of blackberry jam priced at $5 per jar in the fruit preserves aisle, alongside a better-known brand priced at $8 apiece, reasoning that customers will choose the store brand once they see the price difference. What price adjustment strategy is evident in the supermarket's reasoning?", "options": {"A": "by-product pricing", "B": "seasonal pricing", "C": "psychological pricing", "D": "product bundle pricing", "E": "captive product pricing"}, "answer": "C", "explain": "Placing a lower price next to a reference price to shape the buyer's perception of value is psychological pricing."}, {"q": "Hearth & Home, a store which sells household products, has announced a one-week sale on its new carpet line. This is an example of ________.", "options": {"A": "promotional pricing", "B": "seasonal pricing", "C": "product bundle pricing", "D": "time-based pricing", "E": "by-product pricing"}, "answer": "A", "explain": "A short-term price cut meant to spur quick sales is promotional pricing."}, {"q": "Which of the following is an adverse effect of using promotional pricing?", "options": {"A": "It erodes the value of competing brands in the eyes of customers.", "B": "It gives pricing secrets away to competitors.", "C": "It creates \"deal-immune\" customers if used often.", "D": "It delays the company's focus on short-term strategies.", "E": "It makes shopping stressful if used by multiple stores simultaneously."}, "answer": "C", "explain": "Overusing promotions trains customers to wait for deals and stop buying at full price, i.e., they become deal-immune."}, {"q": "If Detroit DLX charges the same price for the delivery of its product to customers located in the states near the Great Lakes, but a different price to customers elsewhere, the company is using ________.", "options": {"A": "psychological pricing", "B": "uniform-delivered pricing", "C": "reference pricing", "D": "promotional pricing", "E": "zone pricing"}, "answer": "E", "explain": "Charging one price within a defined geographic zone and a different price in another zone is zone pricing."}, {"q": "Motorzone offers replacement parts for old Volkswagen Beetles. The company calculates shipping charges based on shipping parts from Boston, even though some parts actually ship from St. Louis. Motorzone most likely practices ________ pricing.", "options": {"A": "freight-absorption", "B": "basing-point", "C": "uniform-delivered", "D": "FOB-origin", "E": "zone"}, "answer": "B", "explain": "Charging freight as if shipped from a designated city, regardless of actual origin, is basing-point pricing."}, {"q": "________ is a pricing strategy in which the company sets up two or more clearly identified geographic regions within which all customers pay the same total price.", "options": {"A": "FOB-origin pricing", "B": "Freight-absorption pricing", "C": "Basing-point pricing", "D": "Zone pricing", "E": "Uniform-delivered pricing"}, "answer": "D", "explain": "Defining geographic zones where everyone inside a zone pays the same price is zone pricing."}, {"q": "In which of the following geographic pricing strategies would customers located close to the company pay the same amount as customers in distant locations?", "options": {"A": "FOB-origin pricing", "B": "uniform-delivered pricing", "C": "reference pricing", "D": "zone pricing", "E": "location-based pricing"}, "answer": "B", "explain": "Uniform-delivered pricing charges the same delivered price to every customer regardless of distance."}, {"q": "Freight-absorption pricing is used for ________.", "options": {"A": "generating quick profits to offset input costs", "B": "penetrating international markets", "C": "maintaining quality service records", "D": "generating customer buzz about new products", "E": "holding on to increasingly competitive markets"}, "answer": "E", "explain": "Sellers absorb part of the freight cost to stay competitive and retain business in tough markets."}, {"q": "Big Mike's Health Food Store sells nutritional energy foods, and the price varies according to individual customer accounts and situations, with long-time customers receiving discounts. This strategy is an example of ________.", "options": {"A": "promotional pricing", "B": "seasonal pricing", "C": "penetration pricing", "D": "time-based pricing", "E": "dynamic pricing"}, "answer": "E", "explain": "Continually adjusting prices to fit individual customers and situations is dynamic (and personalized) pricing."}, {"q": "Which of the following is true of the bottom of the pyramid?", "options": {"A": "It comprises people who have easy access to the basic amenities of life.", "B": "It is a market segment that has insignificant purchasing power.", "C": "It consists of people who have easy access to luxury goods.", "D": "It is a market segment that has been tapped into and depleted.", "E": "It is considered a source of fresh growth opportunities."}, "answer": "E", "explain": "Despite lower individual purchasing power, the sheer size of the bottom-of-the-pyramid segment makes it a real growth opportunity."}, {"q": "Which of the following is true of price changes?", "options": {"A": "Changes in price do not affect a brand's image.", "B": "A drop in price can adversely affect how consumers view the brand.", "C": "Excess capacity is a factor that causes increases in price.", "D": "Over-demand leads to companies initiating price cuts.", "E": "Customer reaction to price changes is not as important as competitor reaction."}, "answer": "B", "explain": "Cutting price can signal lower quality to consumers and damage how they perceive the brand."}, {"q": "Competitors are most likely to react to a price change when ________.", "options": {"A": "a large number of competitors are involved", "B": "the product is uniform", "C": "buyers are not well informed about price differences", "D": "the products are not uniform", "E": "the buyers are not well informed about product features"}, "answer": "B", "explain": "When products are largely undifferentiated (uniform), buyers shop heavily on price, so competitors must react quickly to price moves."}, {"q": "When a competitor cuts its price, a company should ________ if it believes it will not lose much market share or would lose too much profit by cutting its own prices.", "options": {"A": "maintain its current prices and profit margin", "B": "increase its production costs to improve the quality of the product", "C": "reduce its marketing costs", "D": "increase its marketing budget to raise the perceived value of the product", "E": "reduce its production costs"}, "answer": "A", "explain": "If the share loss would be small and matching the cut would hurt profit more, holding price and margin steady is the rational response."}, {"q": "When faced with a competitor who has cut its product's price, which of the following is the most cost-effective way for a company to maintain its own price but raise the perceived value of its offer?", "options": {"A": "by introducing a higher-priced premium brand", "B": "by improving the quality of the product", "C": "by altering the company's marketing communications", "D": "by bundling the offer with add-ons", "E": "by distributing the product through less costly channels"}, "answer": "C", "explain": "Adjusting marketing communications to emphasize value is far cheaper than actually changing the product, and it still raises perceived value."}, {"q": "In response to price cuts from competitors, a cereal company with several more expensive and higher quality cereals introduced a lower-priced option to its product line. This is an example of which response to a competitor's price cut?", "options": {"A": "improving product quality", "B": "raising the perceived value of a product", "C": "using high-low pricing", "D": "launching a \"fighter brand\"", "E": "accepting a reduced market share"}, "answer": "D", "explain": "Introducing a new lower-priced item specifically to compete on price while protecting the existing premium lines is launching a fighter brand."}, {"q": "Which of the following is true of public policies and pricing?", "options": {"A": "The government imposes no limits on intrastate pricing issues.", "B": "Companies have free rein when it comes to setting prices.", "C": "The Robinson-Patman Act governs interstate commerce.", "D": "The Clayton Act encourages the formation of monopolies.", "E": "The Sherman Act governs intrastate commerce."}, "answer": "C", "explain": "The Robinson-Patman Act addresses unfair price discrimination specifically in interstate commerce."}, {"q": "A number of top fashion-modeling agencies would most likely be charged with ________ for jointly determining what commissions they charge for models.", "options": {"A": "prestige pricing", "B": "dynamic pricing", "C": "competitive pricing", "D": "price fixing", "E": "price bundling"}, "answer": "D", "explain": "Competitors agreeing together on prices/commissions instead of setting them independently is price fixing."}, {"q": "Federal legislation on price fixing requires that sellers set their prices ________.", "options": {"A": "to achieve a specific profit margin", "B": "without the intention of cutting into competitors' profits", "C": "consistently throughout a region", "D": "based on their fixed and variable costs", "E": "without communication from competitors"}, "answer": "E", "explain": "Price-fixing law requires that each seller set prices independently, without coordinating with competitors."}, {"q": "If a large retailer sold numerous items below cost with the intention of punishing small competitors and gaining higher long-run profits by putting those competitors out of business, the retailer would be guilty of ________.", "options": {"A": "penetration pricing", "B": "price collusion", "C": "predatory pricing", "D": "competitive pricing", "E": "price fixing"}, "answer": "C", "explain": "Selling below cost specifically to drive competitors out of business is predatory pricing."}, {"q": "Savings for You, a discount retail chain, often cuts prices so deeply when entering a new market that it sells below cost, effectively pushing smaller companies with less purchasing power out of the market. Savings for You is most likely guilty of ________.", "options": {"A": "price fixing", "B": "market skimming", "C": "deceptive pricing", "D": "price collusion", "E": "predatory pricing"}, "answer": "E", "explain": "Deliberately selling below cost to force smaller competitors out of a market is predatory pricing."}], "flashcards": [{"section": "New Product Pricing", "term": "Market-Skimming Pricing", "def": "Setting a high initial price for a new product to \"skim\" revenue layer by layer from the market, then lowering it over time. Only works if quality and image support the price and buyers want it at that price.", "example": "A perfume brand launches at $99 then drops to $49 months later to reach buyers who couldn't afford the original price."}, {"section": "New Product Pricing", "term": "Market-Penetration Pricing", "def": "Setting a low initial price to attract a large number of buyers quickly and win a large market share.", "example": "Gillette prices its Fusion ProGlide starter pack low to build market share, then profits from high-margin refill blades."}, {"section": "Product Mix Pricing", "term": "Product Line Pricing", "def": "Setting price steps between products in a line based on cost differences, customer-perceived value of features, and competitors' prices.", "example": "An mp3 player brand prices basic models at $99 and feature-rich models at $399."}, {"section": "Product Mix Pricing", "term": "Optional-Product Pricing", "def": "Pricing optional or accessory products sold along with the main product.", "example": "A car buyer pays extra for upgraded sound systems or leather seats."}, {"section": "Product Mix Pricing", "term": "Captive-Product Pricing", "def": "Setting a low price on a main product but a high price on products that must be used along with it.", "example": "Polaroid priced its cameras low and made its profit on the film."}, {"section": "Product Mix Pricing", "term": "By-Product Pricing", "def": "Pricing low-value by-products to help make the main product's price more competitive.", "example": "Poultry processors sell chicken feet, a waste product domestically, as a delicacy in China."}, {"section": "Product Mix Pricing", "term": "Product Bundle Pricing", "def": "Combining several products together and offering the bundle at a reduced price.", "example": "A fast-food combo meal costs less than buying the burger, fries, and drink separately."}, {"section": "Price Adjustments", "term": "Discount and Allowance Pricing", "def": "Reducing list price to reward customer responses such as paying early, buying in volume, or promoting the product. Includes cash discounts, quantity discounts, functional discounts, seasonal discounts, trade-in allowances, and promotional allowances.", "example": "A company gives a 2% discount to customers who pay their invoice within 10 days."}, {"section": "Price Adjustments", "term": "Segmented Pricing", "def": "Selling a product at two or more prices, where the price difference is not based on cost differences, segmented by customer, product form, location, or time.", "example": "Movie theaters charge less for students and seniors than for general admission."}, {"section": "Price Adjustments", "term": "When Segmented Pricing Works", "def": "For segmented pricing to be effective, the market must be segmentable with different demand levels, the cost of segmenting can't exceed the extra revenue, and it must be legal.", "example": "Charging more for premium seating only works if enough customers actually value that seating differently."}, {"section": "Price Adjustments", "term": "Psychological Pricing", "def": "Pricing that considers the psychology of prices, not just economics; price itself signals something about the product, often anchored to a reference price the buyer carries in mind.", "example": "A perfume priced at $299 leads buyers to assume it must be higher quality than a $99 competitor."}, {"section": "Price Adjustments", "term": "Promotional Pricing", "def": "Temporarily pricing products below list price, sometimes below cost, to spur short-run sales, such as special-event pricing, limited-time offers, or cash rebates.", "example": "A home goods store runs a one-week sale on its new carpet line."}, {"section": "Price Adjustments", "term": "Geographical Pricing: FOB and Uniform-Delivered", "def": "FOB-origin pricing has the customer pay freight from the factory to their destination. Uniform-delivered pricing charges the same delivered price (including freight) to every customer regardless of location.", "example": "A company charging every customer nationwide the same shipping-included price is using uniform-delivered pricing."}, {"section": "Price Adjustments", "term": "Geographical Pricing: Zone and Basing-Point", "def": "Zone pricing sets up geographic zones where everyone within a zone pays the same price. Basing-point pricing charges freight as if shipped from a designated city, regardless of actual origin.", "example": "A company calculates shipping costs as if every order shipped from Boston, even when it actually ships from St. Louis."}, {"section": "Price Adjustments", "term": "Freight-Absorption Pricing", "def": "The seller absorbs all or part of the freight charges to get desired business, helping it stay competitive in tough markets.", "example": "A seller competing for a distant customer eats part of the shipping cost rather than losing the sale."}, {"section": "Price Adjustments", "term": "Dynamic and Personalized Pricing", "def": "Continually adjusting prices to fit the characteristics and needs of individual customers and situations.", "example": "A health food store gives long-time loyal customers individualized discounts."}, {"section": "Price Changes", "term": "Why Companies Cut Prices", "def": "Common reasons to cut price include excess production capacity and a desire to increase market share.", "example": "A surfboard maker drops prices and becomes the market leader through volume."}, {"section": "Price Changes", "term": "Why Companies Raise Prices", "def": "Common reasons to raise price include cost inflation, increased demand, and lack of supply.", "example": "Rising input costs push a manufacturer to raise its prices to protect margins."}, {"section": "Price Changes", "term": "Buyer Reactions to Price Changes", "def": "Buyers may interpret a price increase as the product being \"hot\" or as company greed; they may interpret a price cut as new models coming soon, poor sales, or quality issues.", "example": "Shoppers seeing a sudden deep discount on electronics might wonder if a newer model is about to replace it."}, {"section": "Price Changes", "term": "Responding to a Competitor's Price Cut", "def": "Options include reducing price to match, maintaining price but raising perceived value through communications, improving quality and raising price, or launching a lower-priced \"fighter brand.\"", "example": "Intel launched its cheaper Celeron processor as a fighter brand so its premium Pentium line could keep its higher price."}, {"section": "Public Policy", "term": "Price Fixing", "def": "Sellers illegally agreeing with competitors on the prices they will charge, rather than setting prices independently.", "example": "Modeling agencies jointly agreeing on the commissions they will all charge."}, {"section": "Public Policy", "term": "Predatory Pricing", "def": "Selling below cost with the intent to punish a competitor or gain higher long-term profits by driving competitors out of business.", "example": "A discount chain enters a new market and prices deeply below cost until smaller local competitors close."}, {"section": "Public Policy", "term": "Robinson-Patman Act", "def": "Prevents unfair price discrimination by requiring sellers to offer the same price terms to customers at a given level of trade, unless they can prove cost differences or differing product quality.", "example": "A manufacturer can't secretly give one retailer a better price than another retailer buying the same volume of the same product."}, {"section": "Public Policy", "term": "Retail Price Maintenance & Deceptive Pricing", "def": "Retail price maintenance (a manufacturer forcing a set retail price) is generally illegal. Deceptive pricing involves stating prices or savings that mislead consumers or aren't actually available.", "example": "A store advertising a fake \"was\" price next to a sale price to make the discount look bigger is deceptive pricing."}]}, "ch12": {"title": "Chapter 12 \u2014 Marketing Channels", "flashcards": [{"section": "Value Delivery Networks", "term": "Supply Chain vs. Demand Chain", "def": "A supply chain view sees the business as a sequence of make-and-sell activities; a demand chain view starts with customer needs and plans backward, putting the customer at the center.", "example": "Asking \"what do our customers need?\" before deciding what to produce, rather than asking what the factory can make and then trying to sell it."}, {"section": "Value Delivery Networks", "term": "Value Delivery Network", "def": "The network made up of the company, suppliers, distributors, and ultimately customers who partner with each other to improve the performance of the entire system.", "example": "An automaker's network of parts suppliers, dealers, and service centers all working together to deliver value to car buyers."}, {"section": "Channel Basics", "term": "Marketing (Distribution) Channel", "def": "A set of interdependent organizations that help make a product or service available for use or consumption by the consumer or business user.", "example": "A clothing brand selling through department stores, its own stores, and an online shop."}, {"section": "Channel Basics", "term": "How Channel Members Add Value", "def": "Channel members add value through eight functions: information, promotion, contact, matching, negotiation, physical distribution, financing, and risk taking.", "example": "A wholesaler gathering market research (information) and extending credit to retailers (financing)."}, {"section": "Channel Basics", "term": "Channel Levels", "def": "The number of intermediary layers a product passes through from producer to consumer. A direct channel has no intermediaries; indirect channels include one or more.", "example": "A farmer selling at a farmers market (direct) versus through a distributor and supermarket (indirect)."}, {"section": "Channel Basics", "term": "Channel Flows", "def": "The forward and backward movement of physical product, ownership, payment, information, and promotion among channel members.", "example": "A retailer sends payment backward to the manufacturer while product and promotional material move forward."}, {"section": "Channel Behavior", "term": "Channel Conflict", "def": "Disagreement among channel members over goals, roles, and rewards; horizontal conflict occurs between firms at the same level, vertical conflict between different levels.", "example": "A manufacturer selling directly online competes with its own retail partners, creating vertical conflict."}, {"section": "Channel Organization", "term": "Vertical Marketing System (VMS)", "def": "A distribution structure where producers, wholesalers, and retailers act as a unified system, through ownership (corporate VMS), contracts (contractual VMS), or one member's power (administered VMS).", "example": "Sherwin-Williams owning its own paint stores is a corporate VMS."}, {"section": "Channel Organization", "term": "Franchise Organization", "def": "A contractual VMS in which a franchisor links several stages of production and distribution to franchisees, who pay fees for the right to operate units under its system.", "example": "McDonald's licensing its brand and operating system to independent franchise owners."}, {"section": "Channel Organization", "term": "Horizontal Marketing System", "def": "An arrangement where two or more companies at the same level join together to pursue a new marketing opportunity.", "example": "A coffee chain partnering with a grocery chain to sell co-branded products in-store."}, {"section": "Channel Organization", "term": "Multichannel Distribution System", "def": "A single firm setting up two or more marketing channels to reach one or more customer segments.", "example": "A retailer selling through physical stores, a website, and a mobile app at the same time."}, {"section": "Channel Trends", "term": "Disintermediation", "def": "Producers or service providers cutting out marketing channel intermediaries, or new types of intermediaries displacing traditional ones.", "example": "A mattress brand selling directly to consumers online instead of through furniture stores."}, {"section": "Channel Design", "term": "Channel Design Decision Steps", "def": "Designing a channel involves analyzing consumer needs, setting channel objectives, identifying major channel alternatives, and evaluating those alternatives.", "example": "A startup researching whether its customers prefer to shop online or in physical stores before choosing distribution partners."}, {"section": "Channel Design", "term": "Intensive, Exclusive, and Selective Distribution", "def": "Intensive distribution stocks products in as many outlets as possible; exclusive distribution gives a limited number of dealers exclusive rights; selective distribution uses more than one but fewer than all willing intermediaries.", "example": "Soft drinks use intensive distribution, luxury cars often use exclusive distribution, and major appliances often use selective distribution."}, {"section": "Public Policy & Logistics", "term": "Public Policy in Distribution", "def": "Legal issues include exclusive dealing, exclusive territorial agreements, and tying agreements, which can be challenged if they substantially lessen competition.", "example": "A manufacturer requiring a dealer to carry only its products (exclusive dealing) could face antitrust scrutiny."}, {"section": "Public Policy & Logistics", "term": "Marketing Logistics (Physical Distribution)", "def": "Planning, implementing, and controlling the physical flow of materials, goods, and information from origin to consumption to meet customer needs at a profit.", "example": "Amazon coordinating warehouses and delivery trucks to get a package to a customer's door within two days."}, {"section": "Public Policy & Logistics", "term": "Supply Chain Management", "def": "Managing upstream and downstream value-added flows of materials, final goods, and information among suppliers, the company, resellers, and final consumers.", "example": "A car maker coordinating with steel suppliers, parts makers, and dealerships to keep production running smoothly."}, {"section": "Public Policy & Logistics", "term": "Major Logistics Functions", "def": "Warehousing, inventory management, transportation, and logistics information management are the major functions of an integrated logistics system.", "example": "A retailer using software to track inventory levels in real time across all its warehouses."}]}, "ch13": {"title": "Chapter 13 \u2014 Retailing and Wholesaling", "flashcards": [{"section": "Retailing Basics", "term": "Retailing", "def": "All activities involved in selling goods or services directly to final consumers for their personal, nonbusiness use.", "example": "A shopper buying jeans at a mall clothing store is engaging with retailing."}, {"section": "Retailing Basics", "term": "Shopper Marketing & Omni-Channel Retailing", "def": "Shopper marketing uses store and online environments to turn shoppers into buyers; omni-channel retailing creates a seamless, integrated shopping experience across all channels and devices.", "example": "A customer checks inventory on an app, picks up in-store, and returns the item by mail through the same retailer."}, {"section": "Retailer Types", "term": "Retailers by Amount of Service", "def": "Self-service retailers offer the lowest cost and fewest services; limited-service retailers offer more sales assistance at higher prices; full-service retailers assist customers throughout the shopping process at the highest prices.", "example": "A discount warehouse is self-service; a department store with personal shoppers is full-service."}, {"section": "Retailer Types", "term": "Retailers by Product Line", "def": "Specialty stores carry a narrow line with deep assortment, department stores carry several lines, supermarkets are large low-cost high-volume stores, convenience stores are small with limited lines but long hours, and superstores are even larger than supermarkets.", "example": "A running shoe store is a specialty store; a 24-hour gas station mart is a convenience store."}, {"section": "Retailer Types", "term": "Retailers by Relative Price", "def": "Discount stores sell standard merchandise at lower prices and margins; off-price retailers buy below regular wholesale prices; factory outlets are manufacturer-owned off-price stores; warehouse clubs sell a limited selection at deep discounts to members.", "example": "Costco is a warehouse club; a brand's own outlet store selling past-season items is a factory outlet."}, {"section": "Retail Organization", "term": "Retail Organizational Forms", "def": "A corporate chain is commonly owned and controlled outlets; a voluntary chain is independent retailers sponsored by a wholesaler; a retailer cooperative is independent retailers banding together; a franchise links producers or service organizations with independent retailers through contracts.", "example": "Ace Hardware operates as a retailer cooperative of independently owned stores."}, {"section": "Retail Organization", "term": "Non-Store Direct Retailing", "def": "Retailing that reaches consumers outside of stores, through direct mail, catalogs, telemarketing, direct-response television, and infomercials.", "example": "A skincare brand selling through a late-night infomercial with a call-in number."}, {"section": "Retailer Decisions", "term": "Retailer Marketing Decisions", "def": "Retailers make segmentation, targeting, and positioning decisions, then set product (assortment, services, atmosphere), price, promotion, and place decisions.", "example": "A boutique positions itself as a high-end, full-service shop in an upscale shopping center."}, {"section": "Retailer Decisions", "term": "EDLP vs. High-Low Pricing", "def": "Every Day Low Pricing (EDLP) charges a constant low price with few discounts; high-low pricing charges higher everyday prices but runs frequent sales and promotions.", "example": "Walmart is known for EDLP; many department stores rely on high-low pricing with frequent sale events."}, {"section": "Retail Trends", "term": "Retailing Trends", "def": "Major trends include economic uncertainty and disruption, retail convergence (different retailer types selling similar products), the rise of megaretailers, retail technology, green retailing, and global expansion.", "example": "Grocery stores, drugstores, and discount stores now all sell similar electronics, an example of retail convergence."}, {"section": "Wholesaling Basics", "term": "Wholesaling", "def": "All activities involved in selling goods and services to those buying for resale or business use, rather than to final consumers.", "example": "A food distributor selling bulk produce to restaurants and grocery stores."}, {"section": "Wholesaling Basics", "term": "Wholesaler Functions", "def": "Wholesalers add value through selling/promoting, buying and assortment building, bulk breaking, warehousing, transportation, financing, risk bearing, market information, and management services.", "example": "A wholesaler breaking down a large shipment into smaller case quantities for small retailers is performing bulk breaking."}, {"section": "Wholesaling Basics", "term": "Types of Wholesalers", "def": "Merchant wholesalers take title to goods (full- or limited-service); brokers bring buyers and sellers together without taking title; agents represent buyers or sellers long-term; manufacturers'/retailers' branches and offices are wholesaling units run by sellers or buyers themselves.", "example": "A broker who connects a buyer and seller without ever owning the goods is acting as a merchandise broker."}, {"section": "Wholesaling Decisions", "term": "Wholesaler Marketing Decisions", "def": "Like retailers, wholesalers decide on segmentation, targeting, and positioning, then optimize their mix of product assortment, price, promotion, and place.", "example": "A wholesaler chooses to specialize in serving only independent hardware stores instead of all retailers."}, {"section": "Wholesaling Trends", "term": "Trends in Wholesaling", "def": "Wholesalers face pressure for greater efficiency, are adding value-added services, adopting technology, and facing competition from large retailers and manufacturers that bypass them.", "example": "A wholesaler investing in data analytics tools to give retailers better demand forecasting."}]}, "ch14": {"title": "Chapter 14 \u2014 Integrated Marketing Communications", "flashcards": [{"section": "IMC Basics", "term": "Promotion Mix", "def": "The specific blend of promotion tools a company uses, including advertising, sales promotion, personal selling, and public relations, often coordinated with direct and digital marketing.", "example": "A product launch combining TV ads, in-store coupons, a sales team for retailers, and a press release."}, {"section": "IMC Basics", "term": "Integrated Marketing Communications (IMC)", "def": "Carefully integrating and coordinating a company's many communications channels to deliver a clear, consistent, and compelling message about the organization and its products.", "example": "A brand using the same tagline and visual style across its website, social media, ads, and packaging."}, {"section": "IMC Basics", "term": "Content Marketing & the New Comms Model", "def": "The new marketing communications model reflects a shift from traditional mass-media advertising toward engaging customers through content marketing across digital, mobile, and social channels.", "example": "A brand creating a YouTube series instead of relying solely on TV commercials."}, {"section": "Communication Process", "term": "Five A's of Customer Engagement", "def": "Marketers can target buyer-readiness stages of Awareness, Appeal, Ask, Act, and Advocacy when setting communication objectives.", "example": "A skincare brand runs awareness ads, retargeting ads (Appeal), shares reviews (Ask), offers a discount (Act), and rewards referrals (Advocacy)."}, {"section": "Communication Process", "term": "Steps in the Communication Process", "def": "Identify the target audience, determine communication objectives, design the message, choose channels, select a message source, and collect feedback.", "example": "A company picks a credible spokesperson its target audience will trust as its message source."}, {"section": "Communication Process", "term": "Message Appeals", "def": "Rational appeals relate to self-interest, emotional appeals try to stir up feelings, and moral appeals are directed at an audience's sense of what is right and proper.", "example": "A nonprofit ad about reducing waste appeals to viewers' sense of doing the right thing, a moral appeal."}, {"section": "Communication Process", "term": "Personal vs. Nonpersonal Channels", "def": "Personal channels involve direct communication between people; nonpersonal channels carry messages without personal contact or feedback, which includes word-of-mouth and buzz marketing.", "example": "A friend recommending a restaurant is personal communication; a billboard ad is nonpersonal."}, {"section": "Budgeting", "term": "Setting the Promotion Budget", "def": "Methods include the affordable method (spend whatever the company can spare), percentage-of-sales method, competitive-parity method (matching competitor spending), and objective-and-task method (build a budget from what objectives cost to achieve).", "example": "A company sets its ad budget at 5% of projected sales, an example of the percentage-of-sales method."}, {"section": "Strategy", "term": "Push vs. Pull Strategy", "def": "A push strategy uses the sales force and trade promotion to push a product through channels to consumers; a pull strategy uses advertising and consumer promotion to pull consumers into stores asking for the product.", "example": "A manufacturer offering retailers special discounts to stock its product is using a push strategy."}, {"section": "Strategy", "term": "Shaping the Promotion Mix", "def": "Companies weigh the nature of each tool, the type of product/market (consumer vs. business), and the product's stage in the buyer-readiness and life cycles to decide the mix.", "example": "B2B companies typically rely more on personal selling than consumer goods companies do."}, {"section": "Responsibility", "term": "Socially Responsible Marketing Communication", "def": "Advertising and promotion must avoid false or misleading claims, deceptive ads, and bait-and-switch tactics; personal selling must avoid deceptive or high-pressure practices.", "example": "A company avoiding bait-and-switch tactics, where an advertised cheap item is unavailable to push a pricier one."}]}, "ch15": {"title": "Chapter 15 \u2014 Advertising and Public Relations", "flashcards": [{"section": "Advertising Basics", "term": "Advertising", "def": "Any paid form of nonpersonal presentation and promotion of ideas, goods, or services by an identified sponsor.", "example": "A 30-second commercial for a car brand during a televised event."}, {"section": "Advertising Basics", "term": "Advertising Objectives", "def": "Informative advertising builds awareness and informs about a new product or feature; persuasive advertising builds brand preference; reminder advertising keeps a product top of mind.", "example": "A new app's launch ads explaining what it does are informative; later ads reminding people to reopen it are reminder advertising."}, {"section": "Advertising Strategy", "term": "Setting the Advertising Budget", "def": "Factors include the product's life-cycle stage, market share and consumer base, level of competition and clutter, and how differentiated the product is.", "example": "A new entrant in a crowded market often needs a bigger ad budget to cut through competitor clutter."}, {"section": "Advertising Strategy", "term": "Native Advertising & Brand Integration", "def": "Native advertising blends seamlessly into a platform's normal content; brand integration (branded entertainment) weaves brands directly into entertainment content.", "example": "A sponsored article on a news site styled to match the site's normal articles is native advertising."}, {"section": "Advertising Strategy", "term": "Creative Concept & Execution Styles", "def": "The creative concept is the big idea behind an ad's message; execution styles include slice of life, lifestyle, fantasy, mood/image, musical, personality symbol, technical expertise, scientific evidence, and testimonial/endorsement.", "example": "An ad showing a family enjoying breakfast together is using a slice-of-life execution style."}, {"section": "Media Decisions", "term": "Reach, Frequency, and Impact", "def": "Reach is the percentage of the target market exposed to a campaign; frequency is how many times an average person is exposed; impact is the qualitative value of an exposure through a given medium.", "example": "A TV campaign might reach 80% of target households an average of four times each."}, {"section": "Media Decisions", "term": "Major Media Types", "def": "Media planners choose among television, digital/online/social, newspapers, direct mail, magazines, radio, and outdoor, weighing each medium's advantages and limitations.", "example": "A local business chooses radio ads for cost-effective, geographically targeted reach."}, {"section": "Media Decisions", "term": "Media Timing", "def": "Advertisers schedule ads over the year to account for seasonality, and may use real-time, always-on advertising tied to current events or trends.", "example": "A retailer increases ad spend in November and December ahead of the holiday season."}, {"section": "Evaluation", "term": "Evaluating Advertising Effectiveness", "def": "Marketers measure communication effects (whether the ad communicates well) and sales/profit effects (the actual impact on revenue and ROI).", "example": "A brand surveys consumers to see if more people recall its slogan after a campaign, a communication-effect test."}, {"section": "Publi ckly to customer complaints on social media to manage its reputation."}, {"section": "Digital Channels", "term": "Mobile Marketing", "def": "Marketing messages, promotions, and content delivered to on-the-go consumers via smartphones, tablets, and other mobile devices.", "example": "A retailer sends a push notification with a discount when a customer is near one of its stores."}, {"section": "Omni-Channel Strategy", "term": "Omni-Channel Marketing Strategy", "def": "Creating a seamless cross-channel buying experience that integrates in-store, online, and mobile shopping, requiring alignment of business model, organizational incentives, and marketing mix.", "example": "A customer orders online and can return the item at any physical store location."}, {"section": "Public Policy", "term": "Public Policy Issues in Digital Marketing", "def": "Concerns include irritation, unfairness to vulnerable buyers, deception, fraud, and consumer privacy regarding how much personal data marketers collect and use.", "example": "Consumers worry about how much personal data social media platforms collect and sell to advertisers."}, {"section": "Public Policy", "term": "Data Privacy Regulations (GDPR & COPPA)", "def": "The General Data Protection Regulation (GDPR) governs data privacy in the EU; the Children's Online Privacy Protection Act (COPPA) restricts data collection from children online.", "example": "A website requires parental consent before collecting data from users under 13, in compliance with COPPA."}]}};

const chapterLabels = {
  ch11: "Chapter 11", ch12: "Chapter 12", ch13: "Chapter 13",
  ch14: "Chapter 14", ch15: "Chapter 15", ch16: "Chapter 16", ch17: "Chapter 17"
};

let currentChapter = "ch11";
let viewMode = "quiz";
let order = [];
let answered = [];
let flippedCards = new Set();

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildChapterBar() {
  const bar = document.getElementById("chapterBar");
  bar.innerHTML = "";
  Object.keys(chapterLabels).forEach(key => {
    const chip = document.createElement("div");
    const has = !!studyData[key];
    chip.className = "chip" + (key === currentChapter ? " active" : "") + (!has ? " disabled" : "");
    chip.textContent = chapterLabels[key];
    if (has) {
      chip.onclick = () => { currentChapter = key; startChapter(); };
    }
    bar.appendChild(chip);
  });
}

function buildModeBar() {
  const bar = document.getElementById("modeBar");
  bar.innerHTML = "";
  const data = studyData[currentChapter];
  const modes = [["quiz", "Quiz"], ["flashcards", "Flashcards"]];
  modes.forEach(([key, label]) => {
    const chip = document.createElement("div");
    const disabled = !data || (key === "quiz" && (!data.questions || data.questions.length === 0));
    chip.className = "chip mode" + (viewMode === key ? " active" : "") + (disabled ? " disabled" : "");
    chip.textContent = label;
    if (!disabled) {
      chip.onclick = () => { viewMode = key; render(); };
    }
    bar.appendChild(chip);
  });
}

function startChapter() {
  const data = studyData[currentChapter];
  if (data && data.questions && data.questions.length > 0) {
    viewMode = "quiz";
    order = data.questions.map((_, i) => i);
  } else {
    viewMode = "flashcards";
    order = [];
  }
  answered = [];
  flippedCards = new Set();
  render();
}

function render() {
  buildChapterBar();
  buildModeBar();
  const app = document.getElementById("app");
  const data = studyData[currentChapter];
  if (!data) {
    app.innerHTML = '<div class="card placeholder">Content for this chapter hasn\'t been added yet.</div>';
    return;
  }
  if (viewMode === "flashcards") {
    renderFlashcards();
  } else {
    renderQuiz();
  }
}

function renderQuiz() {
  const app = document.getElementById("app");
  const data = studyData[currentChapter];
  const total = data.questions.length;
  const answeredCount = answered.filter(a => a).length;
  const correctCount = answered.filter(a => a && a.correct).length;
  const pct = total ? Math.round((answeredCount / total) * 100) : 0;

  let html = '<div class="card sticky">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">';
  html += '<strong>' + data.title + '</strong>';
  html += '<span class="score-pill">Score: ' + correctCount + '/' + total + '</span>';
  html += '</div>';
  html += '<div class="progress-row"><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;"></div></div><span style="font-size:0.8rem;color:var(--muted);">' + answeredCount + '/' + total + '</span></div>';
  html += '<div class="nav-row">';
  html += '<button class="nav" id="restartBtn">Restart (same order)</button>';
  html += '<button class="nav primary" id="shuffleBtn">Shuffle &amp; restart</button>';
  html += '</div></div>';

  order.forEach((qIndex, pos) => {
    const q = data.questions[qIndex];
    const a = answered[qIndex];
    html += '<div class="card">';
    html += '<div class="qtext"><span class="qnum">' + (pos + 1) + '.</span>' + q.q + '</div>';
    html += '<div class="options">';
    Object.keys(q.options).forEach(letter => {
      let cls = "opt";
      if (a) {
        if (letter === q.answer) cls += " correct";
        else if (letter === a.chosen) cls += " incorrect";
      }
      html += '<button class="' + cls + '" data-qindex="' + qIndex + '" data-letter="' + letter + '"' + (a ? " disabled" : "") + '>' + letter + ') ' + q.options[letter] + '</button>';
    });
    html += '</div>';
    if (a) {
      const cls = a.correct ? "right" : "wrong";
      html += '<div class="explain show ' + cls + '"><strong>' + (a.correct ? "Correct! " : "Not quite. Correct answer: " + q.answer + ". ") + '</strong>' + q.explain + '</div>';
    }
    html += '</div>';
  });

  if (answeredCount === total && total > 0) {
    const missed = order.filter(qIndex => answered[qIndex] && !answered[qIndex].correct);
    html += '<div class="card"><strong>Missed Questions</strong><div class="review-list" style="margin-top:10px;">';
    if (missed.length === 0) {
      html += '<div class="review-item">Nice work — you got all of them right!</div>';
    } else {
      missed.forEach(qIndex => {
        const pos = order.indexOf(qIndex) + 1;
        html += '<div class="review-item"><span class="q">Q' + pos + ':</span> <span class="a">' + data.questions[qIndex].q.slice(0, 80) + '...</span></div>';
      });
    }
    html += '</div></div>';
  }

  app.innerHTML = html;

  app.querySelectorAll(".opt").forEach(btn => {
    btn.addEventListener("click", () => {
      const qIndex = parseInt(btn.dataset.qindex);
      const letter = btn.dataset.letter;
      const q = data.questions[qIndex];
      answered[qIndex] = { chosen: letter, correct: letter === q.answer };
      renderQuiz();
    });
  });
  document.getElementById("restartBtn").onclick = () => {
    order = data.questions.map((_, i) => i);
    answered = [];
    renderQuiz();
  };
  document.getElementById("shuffleBtn").onclick = () => {
    order = shuffle(data.questions.map((_, i) => i));
    answered = [];
    renderQuiz();
  };
}

function renderFlashcards() {
  const app = document.getElementById("app");
  const data = studyData[currentChapter];
  const cards = data.flashcards || [];

  let html = '<div class="card">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">';
  html += '<strong>' + data.title + ' — Flashcards</strong>';
  html += '<span class="score-pill">' + cards.length + ' cards</span>';
  html += '</div>';
  html += '<div class="flash-toolbar">';
  html += '<button class="nav" id="flipAllBtn">Flip all</button>';
  html += '<button class="nav" id="resetAllBtn">Reset all</button>';
  html += '</div></div>';

  html += '<div class="flash-grid">';
  cards.forEach((c, i) => {
    const flipped = flippedCards.has(i) ? " flipped" : "";
    html += '<div class="flash-card' + flipped + '" data-index="' + i + '">';
    html += '<div class="flash-inner">';
    html += '<div class="flash-face flash-front"><div><div class="flash-section">' + c.section + '</div><div class="flash-term">' + c.term + '</div><div class="flash-hint">Tap to flip</div></div></div>';
    html += '<div class="flash-face flash-back"><div class="flash-section">' + c.section + '</div><div class="flash-def">' + c.def + '</div>' + (c.example ? '<div class="flash-example">' + c.example + '</div>' : '') + '</div>';
    html += '</div></div>';
  });
  html += '</div>';

  app.innerHTML = html;

  app.querySelectorAll(".flash-card").forEach(el => {
    el.addEventListener("click", () => {
      const i = parseInt(el.dataset.index);
      if (flippedCards.has(i)) { flippedCards.delete(i); el.classList.remove("flipped"); }
      else { flippedCards.add(i); el.classList.add("flipped"); }
    });
  });
  document.getElementById("flipAllBtn").onclick = () => {
    cards.forEach((_, i) => flippedCards.add(i));
    renderFlashcards();
  };
  document.getElementById("resetAllBtn").onclick = () => {
    flippedCards.clear();
    renderFlashcards();
  };
}

startChapter();
</script>
</body>
</html>
