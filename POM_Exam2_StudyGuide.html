<!DOCTYPE html>
<html lang="en">
<head>

<title>Principles of Marketing — Study Guide</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card2: #273449;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --good: #4ade80;
    --bad: #f87171;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }
  header { text-align: center; margin-bottom: 16px; }
  header h1 { font-size: 1.5rem; margin: 0 0 4px; }
  header p { color: var(--muted); margin: 0; font-size: 0.9rem; }

  .chapter-bar, .mode-bar {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 12px;
  }
  .chip {
    padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer; font-size: 0.85rem;
  }
  .chip.active { background: var(--accent); color: #0f172a; border-color: var(--accent); font-weight: 600; }
  .chip.disabled { opacity: 0.4; cursor: not-allowed; }
  .chip.mode { font-weight: 600; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; margin-bottom: 16px;
  }
  .sticky { position: sticky; top: 8px; z-index: 5; }

  .progress-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
  .progress-track { flex: 1; height: 8px; border-radius: 99px; background: var(--card2); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .2s; }
  .score-pill {
    background: var(--card2); border-radius: 999px; padding: 4px 12px; font-size: 0.85rem; white-space: nowrap;
  }

  .nav-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  button.nav {
    flex: 1; min-width: 140px; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card2); color: var(--text); cursor: pointer; font-size: 0.9rem;
  }
  button.nav.primary { background: var(--accent); color: #0f172a; font-weight: 600; border-color: var(--accent); }
  button.nav:hover { filter: brightness(1.1); }

  .qnum { color: var(--accent); font-weight: 700; margin-right: 6px; }
  .qtext { font-weight: 600; margin-bottom: 10px; }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    text-align: left; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card2); color: var(--text); cursor: pointer; font-size: 0.92rem;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); }
  .opt:disabled { cursor: default; }
  .opt.correct { background: rgba(74, 222, 128, 0.15); border-color: var(--good); color: var(--good); }
  .opt.incorrect { background: rgba(248, 113, 113, 0.15); border-color: var(--bad); color: var(--bad); }

  .explain {
    margin-top: 10px; padding: 10px 12px; border-radius: 10px; font-size: 0.88rem; display: none;
  }
  .explain.show { display: block; }
  .explain.right { background: rgba(74, 222, 128, 0.1); border: 1px solid var(--good); }
  .explain.wrong { background: rgba(248, 113, 113, 0.1); border: 1px solid var(--bad); }

  .review-list { display: flex; flex-direction: column; gap: 6px; }
  .review-item { font-size: 0.88rem; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .review-item .q { font-weight: 600; }
  .review-item .a { color: var(--muted); }
  .review-item .y { color: var(--good); }

  .placeholder { text-align: center; color: var(--muted); padding: 40px 20px; }

  .flash-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .flash-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; margin-top: 16px;
  }
  .flash-card { perspective: 1000px; height: 220px; cursor: pointer; }
  .flash-inner {
    position: relative; width: 100%; height: 100%; transition: transform .5s;
    transform-style: preserve-3d;
  }
  .flash-card.flipped .flash-inner { transform: rotateY(180deg); }
  .flash-face {
    position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px;
    border: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column;
    background: var(--card2); overflow-y: auto;
  }
  .flash-front { justify-content: center; align-items: center; text-align: center; }
  .flash-back { transform: rotateY(180deg); background: #1a2942; }
  .flash-section { color: var(--accent); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .flash-term { font-size: 1.1rem; font-weight: 700; }
  .flash-hint { color: var(--muted); font-size: 0.78rem; margin-top: 10px; }
  .flash-def { font-size: 0.88rem; margin-bottom: 8px; }
  .flash-example { font-size: 0.82rem; color: var(--muted); font-style: italic; }

  footer { text-align: center; color: var(--muted); font-size: 0.78rem; margin-top: 30px; }

  .hidden { display: none !important; }
</style>
</head>

<script>
const studyData = {"ch12": {"title": "Chapter 12 \u2014 Marketing Channels", "questions": [{"q": "The term supply chain is considered limited because it ________.", "options": {"A": "suggests that planning starts with identifying the needs of target customers", "B": "takes a sense-and-respond view of the market", "C": "suggests that planning begins with raw materials and factory capacity", "D": "ignores the make-and-sell aspect of the market", "E": "takes a step-by-step, linear view of purchase-production-consumption activities"}, "answer": "C", "explain": "The correct answer is C: suggests that planning begins with raw materials and factory capacity"}, {"q": "The term demand chain is considered limited because it ________.", "options": {"A": "ignores the evolution of the global marketplace", "B": "advocates a make-and-sell view of the market that relies on a responsive supply network", "C": "overlooks the needs of target customers", "D": "suggests that planning starts with raw materials, productive inputs, and factory capacity", "E": "takes a step-by-step, linear view of purchase-production-consumption activities"}, "answer": "E", "explain": "The correct answer is E: takes a step-by-step, linear view of purchase-production-consumption activities"}, {"q": "________ play an important role in matching supply and demand by providing consumers with a broad assortment of products in small quantities.", "options": {"A": "Price consultants", "B": "Virtual banks", "C": "Upstream partners", "D": "Intermediaries", "E": "Uniform-delivery networks"}, "answer": "D", "explain": "The correct answer is D: Intermediaries"}, {"q": "Which of the following companies uses a direct marketing channel?", "options": {"A": "Holly Wreaths, a store that sells Christmas ornaments to customers via its online click-to-order catalogs", "B": "Fishhooks, a factory that manufactures fishing equipment that it ships to hobby stores worldwide", "C": "Showdown, a clothing store that stocks merchandise from different international brands", "D": "Germfight, a factory that manufactures dental products that it distributes only to select department stores", "E": "Apple Blossoms, a company that sells its cosmetics exclusively through Ray's Retail Store"}, "answer": "A", "explain": "The correct answer is A: Holly Wreaths, a store that sells Christmas ornaments to customers via its online click-to-order catalogs"}, {"q": "Lifebelt Insurance sells insurance only through its door-to-door salespeople. What type of marketing channel does Lifebelt use?", "options": {"A": "direct", "B": "multitiered", "C": "selective", "D": "inclusive", "E": "indirect"}, "answer": "A", "explain": "The correct answer is A: direct"}, {"q": "Plasticine Palace supplies its products exclusively to Arts & Crafts, a chain of stationery stores across the country. The chain then makes the plasticine available to end consumers. This is an example of ________.", "options": {"A": "an indirect marketing channel", "B": "extensive distribution", "C": "intensive distribution", "D": "a direct marketing channel", "E": "disintermediation"}, "answer": "A", "explain": "The correct answer is A: an indirect marketing channel"}, {"q": "Which of the following is an example of an indirect marketing channel?", "options": {"A": "Farmer Brown, who delivers fresh milk from his dairy to customers every morning", "B": "Lifebelt Insurance, which sells life insurance through its door-to-door salespeople", "C": "Rhonda's Rental, which rents cars to people for the day", "D": "June Bride, which sells bridal gowns via its click-to-order online catalogs", "E": "Wine & Dine, which sells its picnic baskets to select novelty stores across the country"}, "answer": "E", "explain": "The correct answer is E: Wine & Dine, which sells its picnic baskets to select novelty stores across the country"}, {"q": "Which of the following is an indirect business marketing channel?", "options": {"A": "producer to retailer to business distributor", "B": "producer to wholesaler to retailer to end consumer", "C": "producer to retailer", "D": "producer to business distributor to business customer", "E": "producer to end-consumer to business distributor"}, "answer": "D", "explain": "The correct answer is D: producer to business distributor to business customer"}, {"q": "Refer to the scenario below to answer the following question.<br><br>Giant Beanstalks is a company based in Maryland that processes and cans vegetables. It has contracts with several large farms in Riverdale, 80 miles away from the factory, that agree to sell their produce to Giant Beanstalks. The company's products are available to the public only through Greenleaf, a grocery chain with 38 stores in the country.<br><br>Which of the following is Giant Beanstalks' upstream partner?", "options": {"A": "the trucks that carry Giant Beanstalks' products to Greenleaf", "B": "the logistics division of Giant Beanstalk", "C": "the farmers of Riverdale", "D": "the end-consumers who buy the canned vegetables from Greenleaf", "E": "the management of Greenleaf"}, "answer": "C", "explain": "The correct answer is C: the farmers of Riverdale"}, {"q": "Which of the following is true of channel members?", "options": {"A": "They play specialized roles in the channel.", "B": "They act independent of each other.", "C": "They are not accountable to other channel members.", "D": "They play generalized and interchangeable roles in the distribution process.", "E": "Their competence and cooperation don't affect the company's image or profits."}, "answer": "A", "explain": "The correct answer is A: They play specialized roles in the channel."}, {"q": "Managers at the Imperial Hotel-Chicago complained that the chain's overall image was hurt because Imperial Hotel-Dallas was overcharging guests and providing poor service. The Imperial Hotel was experiencing ________ conflict.", "options": {"A": "vertical", "B": "equilateral", "C": "horizontal", "D": "communal", "E": "multitiered"}, "answer": "C", "explain": "The correct answer is C: horizontal"}, {"q": "The management of two Panizza restaurants has an ongoing disagreement over the discount rate given to students from the local high school. This is an example of ________ conflict.", "options": {"A": "intensive", "B": "exclusive", "C": "selective", "D": "vertical", "E": "horizontal"}, "answer": "E", "explain": "The correct answer is E: horizontal"}, {"q": "When KFC came into conflict with its franchisees over the brand's Unthink KFC repositioning, which emphasized grilled chicken over its traditional Kentucky fried chicken, KFC experienced ________ conflict.", "options": {"A": "equilateral", "B": "communal", "C": "vertical", "D": "horizontal", "E": "multitiered"}, "answer": "C", "explain": "The correct answer is C: vertical"}, {"q": "Stylize, Inc. opened an online store that triggered disagreements between headquarters and the firm's exclusive dealers. This type of a disagreement is known as a(n) ________ conflict.", "options": {"A": "horizontal", "B": "selective", "C": "multitiered", "D": "vertical", "E": "indirect"}, "answer": "D", "explain": "The correct answer is D: vertical"}, {"q": "A(n) ________ consists of one or more independent producers, wholesalers, and retailers, each seeking to maximize its own profits, sometimes even at the expense of the system as a whole.", "options": {"A": "product platform", "B": "multitiered supply chain", "C": "intrinsic market matrix", "D": "resource bank", "E": "conventional distribution channel"}, "answer": "E", "explain": "The correct answer is E: conventional distribution channel"}, {"q": "Which of the following is true of vertical marketing systems?", "options": {"A": "Channel members work independently with no cooperation from other members.", "B": "Channel members have no control over each other.", "C": "Channel conflict is governed by informal mechanisms.", "D": "The system is dominated by the consumer.", "E": "Producers, wholesalers, and retailers act as a unified system."}, "answer": "E", "explain": "The correct answer is E: Producers, wholesalers, and retailers act as a unified system."}, {"q": "Ford and its network of independent franchised dealers is an example of a ________.", "options": {"A": "manufacturer-and-service-sponsored joint venture", "B": "manufacturer-sponsored retailer franchise system", "C": "service-firm-sponsored equity strategic alliance", "D": "service-firm-sponsored retailer franchise system", "E": "manufacturer-sponsored wholesaler franchise system"}, "answer": "B", "explain": "The correct answer is B: manufacturer-sponsored retailer franchise system"}, {"q": "Fire Up makes fireproof clothing material and it licenses select stores around the world to use its material to make finished products with the Fire Up logo. Which of the following type of franchising is evident here?", "options": {"A": "service-firm-sponsored retailer franchise system", "B": "manufacturer-sponsored wholesaler franchise system", "C": "manufacturer-sponsored retailer franchise system", "D": "manufacturer-and-service-sponsored joint venture", "E": "service-firm-sponsored equity strategic alliance"}, "answer": "B", "explain": "The correct answer is B: manufacturer-sponsored wholesaler franchise system"}, {"q": "Which of the following is most likely a manufacturer-sponsored retailer franchise system?", "options": {"A": "licensed bottlers that bottle and sell soft drinks to retailers", "B": "international fast food chains like McDonald's and Pizza Hut", "C": "Starbucks outlets operating within Target stores", "D": "Toyota and its network of independent franchised dealers", "E": "hotel chains like the Ritz Carlton and Shangri-La"}, "answer": "D", "explain": "The correct answer is D: Toyota and its network of independent franchised dealers"}, {"q": "Atlas Imports and Exports sells products directly to consumers via the Atlas Web site, and through local retailers as well. Which of the following is evident here?", "options": {"A": "administered vertical marketing system", "B": "horizontal marketing system", "C": "corporate vertical marketing system", "D": "multichannel distribution system", "E": "conventional distribution channel"}, "answer": "D", "explain": "The correct answer is D: multichannel distribution system"}, {"q": "Movie Giants offers DVD rentals through its Web site. It also offers DVD rentals via Star City stores. This is an example of a(n)________ distribution system.", "options": {"A": "multichannel", "B": "conventional", "C": "extensive", "D": "inclusive", "E": "intensive"}, "answer": "A", "explain": "The correct answer is A: multichannel"}, {"q": "Which of the following is an advantage of adding new channels in a multichannel distribution system?", "options": {"A": "minimizing mass customization of products", "B": "limiting market complexity", "C": "expanding sales and market coverage", "D": "reducing control over the system", "E": "decreasing marketing needs and costs"}, "answer": "C", "explain": "The correct answer is C: expanding sales and market coverage"}, {"q": "The Bookworm began delivering books directly to customers through mail instead of selling through brick-and-mortar companies. This is an example of ________.", "options": {"A": "franchising", "B": "indirect marketing", "C": "exclusive distribution", "D": "intensive distribution", "E": "disintermediation"}, "answer": "E", "explain": "The correct answer is E: disintermediation"}, {"q": "Which of the following is true of changes in the organization of distribution channels?", "options": {"A": "Advances in technology have decreased the number of channels available to entrepreneurial firms.", "B": "Companies have fewer channel-options today than they did in the past due to economic problems.", "C": "To remain competitive, product and service producers must use fewer marketing channels.", "D": "The growth of the Internet threatens many brick-and-mortar companies with disintermediation.", "E": "Developing new channels seldom causes conflict with a company's established channels."}, "answer": "D", "explain": "The correct answer is D: The growth of the Internet threatens many brick-and-mortar companies with disintermediation."}, {"q": "Refer to the scenario below to answer the following question.<br><br>Giant Beanstalks is a company based in Maryland that processes and cans vegetables. It has contracts with several large farms in Riverdale, 80 miles away from the factory, that agree to sell their produce to Giant Beanstalks. The company's products are available to the public only through Greenleaf, a grocery chain with 38 stores in the country.<br><br>What distribution strategy does Giant Beanstalks use?", "options": {"A": "intensive distribution", "B": "inclusive distribution", "C": "exclusive distribution", "D": "selective distribution", "E": "extensive distribution"}, "answer": "C", "explain": "The correct answer is C: exclusive distribution"}, {"q": "Which of the following should be a manufacturer's first step when designing an effective marketing channel?", "options": {"A": "establish strategic alliances", "B": "analyze consumer needs", "C": "set channel objectives", "D": "evaluate channel alternatives", "E": "identify channel alternatives"}, "answer": "B", "explain": "The correct answer is B: analyze consumer needs"}, {"q": "Which of the following is an environmental factor that affects channel objectives and design?", "options": {"A": "factory staffing", "B": "individual motives", "C": "organizational objectives", "D": "interpersonal influences", "E": "economic conditions"}, "answer": "E", "explain": "The correct answer is E: economic conditions"}, {"q": "For which of the following products would the intensive distribution strategy most likely be used?", "options": {"A": "high-end cameras", "B": "luxury cars", "C": "furniture", "D": "lawn mowers", "E": "soft drinks"}, "answer": "E", "explain": "The correct answer is E: soft drinks"}, {"q": "Whitelight sells its toothpastes in many convenience stores across the country. This is an example of ________ distribution.", "options": {"A": "hybrid", "B": "exclusive", "C": "normal", "D": "intensive", "E": "selective"}, "answer": "D", "explain": "The correct answer is D: intensive"}, {"q": "For which product would a company use an exclusive distribution strategy?", "options": {"A": "luxury cars", "B": "soft drinks", "C": "chewing gum", "D": "dairy products", "E": "newspapers"}, "answer": "A", "explain": "The correct answer is A: luxury cars"}, {"q": "Which of the following is true of the exclusive distribution strategy?", "options": {"A": "It makes products available to everybody, everywhere.", "B": "It enlists all of the intermediaries willing to carry a company's products.", "C": "It is used primarily for convenience items.", "D": "It helps promote a brand's luxury image.", "E": "It gives producers no control over their products."}, "answer": "D", "explain": "The correct answer is D: It helps promote a brand's luxury image."}, {"q": "A strategy of exclusive dealing is most likely considered legal if ________.", "options": {"A": "competition is not substantially lessened", "B": "the dealer receives a steady source of supply and support", "C": "the dealer agrees to promote the competitor's products", "D": "both parties have large territories", "E": "the industry is newly developed"}, "answer": "A", "explain": "The correct answer is A: competition is not substantially lessened"}, {"q": "Smart Shoppers, an online store that delivers its products to homes in and around California, recently switched its entire fleet to biodiesel trucks that run on used cooking oil rather than gas. Smart Shoppers has most likely developed a(n) ________.", "options": {"A": "intermodal transportation system", "B": "green supply chain", "C": "vertical marketing channel", "D": "hybrid distribution system", "E": "multitiered marketing channel"}, "answer": "B", "explain": "The correct answer is B: green supply chain"}, {"q": "Which of the following is true of using trucks as a transportation mode?", "options": {"A": "Trucks are a specialized means of shipping petroleum, natural gas, and chemicals from sources to markets.", "B": "Trucks are highly flexible in their routing and time schedules.", "C": "Trucks provide in-transit services such as the diversion of shipped goods to other destinations en route.", "D": "Transportation via trucks is costlier than by rail or air.", "E": "Trucks are the slowest mode of transportation and most affected by the weather."}, "answer": "B", "explain": "The correct answer is B: Trucks are highly flexible in their routing and time schedules."}, {"q": "Which of the following is true of transporting goods via railroads?", "options": {"A": "Railroads are a cost-effective way to ship large amounts of bulk products over long distances.", "B": "Railroads are the most flexible mode of transportation in their routing and time schedules.", "C": "Railroads are a specialized means of shipping petroleum, natural gas, and chemicals from sources to markets.", "D": "Railroads are the slowest mode of transportation and are the most affected by the weather.", "E": "Railroads are ideal for the transportation of digital technology."}, "answer": "A", "explain": "The correct answer is A: Railroads are a cost-effective way to ship large amounts of bulk products over long distances."}, {"q": "Which of the following is true of shipping goods via water transportation?", "options": {"A": "Water transportation is ideal when time is short and speed is needed.", "B": "Water transportation is an efficient way to ship perishable merchandise over long distances.", "C": "Water transportation provides in-transit services, such as the processing of goods en route.", "D": "Water transportation is the slowest mode of transportation and the most affected by the weather.", "E": "Water carriers are highly flexible in their routing and time schedules."}, "answer": "D", "explain": "The correct answer is D: Water transportation is the slowest mode of transportation and the most affected by the weather."}, {"q": "Which of the following is true about using air carriers as a transportation mode when shipping products?", "options": {"A": "Air carriers are ideal when time is short and speed is needed.", "B": "Air carriers provide in-transit services such as the processing of goods en route.", "C": "Air carriers are the slowest and least reliable modes of transport.", "D": "Air carriers are the most cost-effective way to ship non-perishable goods over short distances.", "E": "Air carriers are a specialized means of shipping chemicals from sources to markets."}, "answer": "A", "explain": "The correct answer is A: Air carriers are ideal when time is short and speed is needed."}, {"q": "Heart of Midnight sells blue orchids to major florists around the world. Their key requirement is speed. Which of the following modes of transport will help them?", "options": {"A": "air carriers", "B": "water transport", "C": "piggybacks", "D": "rail transport", "E": "trucks"}, "answer": "A", "explain": "The correct answer is A: air carriers"}, {"q": "________ management is the logistics concept that emphasizes teamwork\u2014both inside the company and among all the marketing channel organizations\u2014to maximize the performance of the entire distribution system.", "options": {"A": "Group logistics", "B": "Logistics inventory", "C": "Integrated logistics", "D": "Independent logistics", "E": "Logistics information"}, "answer": "C", "explain": "The correct answer is C: Integrated logistics"}, {"q": "Refer to the scenario below to answer the following question.<br><br>Kimberly's Crown sells and designs jewelry. Despite the jewelry's popularity, products are available only through a few shopping stores across the country.<br><br>When one of the stores complains that the jewelry they're being given is inferior to the jewelry Kimberly sells to other stores, Kimberly experiences ________ conflict.", "options": {"A": "intensive", "B": "multitiered", "C": "subjective", "D": "horizontal", "E": "vertical"}, "answer": "E", "explain": "The correct answer is E: vertical"}], "flashcards": [{"section": "Value Delivery Networks", "term": "Supply Chain vs. Demand Chain", "def": "A supply chain view sees the business as a sequence of make-and-sell activities; a demand chain view starts with customer needs and plans backward, putting the customer at the center.", "example": "Asking \"what do our customers need?\" before deciding what to produce, rather than asking what the factory can make and then trying to sell it."}, {"section": "Value Delivery Networks", "term": "Value Delivery Network", "def": "The network made up of the company, suppliers, distributors, and ultimately customers who partner with each other to improve the performance of the entire system.", "example": "An automaker's network of parts suppliers, dealers, and service centers all working together to deliver value to car buyers."}, {"section": "Channel Basics", "term": "Marketing (Distribution) Channel", "def": "A set of interdependent organizations that help make a product or service available for use or consumption by the consumer or business user.", "example": "A clothing brand selling through department stores, its own stores, and an online shop."}, {"section": "Channel Basics", "term": "How Channel Members Add Value", "def": "Channel members add value through eight functions: information, promotion, contact, matching, negotiation, physical distribution, financing, and risk taking.", "example": "A wholesaler gathering market research (information) and extending credit to retailers (financing)."}, {"section": "Channel Basics", "term": "Channel Levels", "def": "The number of intermediary layers a product passes through from producer to consumer. A direct channel has no intermediaries; indirect channels include one or more.", "example": "A farmer selling at a farmers market (direct) versus through a distributor and supermarket (indirect)."}, {"section": "Channel Basics", "term": "Channel Flows", "def": "The forward and backward movement of physical product, ownership, payment, information, and promotion among channel members.", "example": "A retailer sends payment backward to the manufacturer while product and promotional material move forward."}, {"section": "Channel Behavior", "term": "Channel Conflict", "def": "Disagreement among channel members over goals, roles, and rewards; horizontal conflict occurs between firms at the same level, vertical conflict between different levels.", "example": "A manufacturer selling directly online competes with its own retail partners, creating vertical conflict."}, {"section": "Channel Organization", "term": "Vertical Marketing System (VMS)", "def": "A distribution structure where producers, wholesalers, and retailers act as a unified system, through ownership (corporate VMS), contracts (contractual VMS), or one member's power (administered VMS).", "example": "Sherwin-Williams owning its own paint stores is a corporate VMS."}, {"section": "Channel Organization", "term": "Franchise Organization", "def": "A contractual VMS in which a franchisor links several stages of production and distribution to franchisees, who pay fees for the right to operate units under its system.", "example": "McDonald's licensing its brand and operating system to independent franchise owners."}, {"section": "Channel Organization", "term": "Horizontal Marketing System", "def": "An arrangement where two or more companies at the same level join together to pursue a new marketing opportunity.", "example": "A coffee chain partnering with a grocery chain to sell co-branded products in-store."}, {"section": "Channel Organization", "term": "Multichannel Distribution System", "def": "A single firm setting up two or more marketing channels to reach one or more customer segments.", "example": "A retailer selling through physical stores, a website, and a mobile app at the same time."}, {"section": "Channel Trends", "term": "Disintermediation", "def": "Producers or service providers cutting out marketing channel intermediaries, or new types of intermediaries displacing traditional ones.", "example": "A mattress brand selling directly to consumers online instead of through furniture stores."}, {"section": "Channel Design", "term": "Channel Design Decision Steps", "def": "Designing a channel involves analyzing consumer needs, setting channel objectives, identifying major channel alternatives, and evaluating those alternatives.", "example": "A startup researching whether its customers prefer to shop online or in physical stores before choosing distribution partners."}, {"section": "Channel Design", "term": "Intensive, Exclusive, and Selective Distribution", "def": "Intensive distribution stocks products in as many outlets as possible; exclusive distribution gives a limited number of dealers exclusive rights; selective distribution uses more than one but fewer than all willing intermediaries.", "example": "Soft drinks use intensive distribution, luxury cars often use exclusive distribution, and major appliances often use selective distribution."}, {"section": "Public Policy & Logistics", "term": "Public Policy in Distribution", "def": "Legal issues include exclusive dealing, exclusive territorial agreements, and tying agreements, which can be challenged if they substantially lessen competition.", "example": "A manufacturer requiring a dealer to carry only its products (exclusive dealing) could face antitrust scrutiny."}, {"section": "Public Policy & Logistics", "term": "Marketing Logistics (Physical Distribution)", "def": "Planning, implementing, and controlling the physical flow of materials, goods, and information from origin to consumption to meet customer needs at a profit.", "example": "Amazon coordinating warehouses and delivery trucks to get a package to a customer's door within two days."}, {"section": "Public Policy & Logistics", "term": "Supply Chain Management", "def": "Managing upstream and downstream value-added flows of materials, final goods, and information among suppliers, the company, resellers, and final consumers.", "example": "A car maker coordinating with steel suppliers, parts makers, and dealerships to keep production running smoothly."}, {"section": "Public Policy & Logistics", "term": "Major Logistics Functions", "def": "Warehousing, inventory management, transportation, and logistics information management are the major functions of an integrated logistics system.", "example": "A retailer using software to track inventory levels in real time across all its warehouses."}]}, "ch13": {"title": "Chapter 13 \u2014 Retailing and Wholesaling", "questions": [{"q": "At Neiman Marcus, a first-class department store, customers shop for high-end products and they are assisted in every phase of the shopping process. Neiman Marcus is a ________.", "options": {"A": "limited-service retailer", "B": "superstore", "C": "self-service retailer", "D": "specialty store", "E": "full-service retailer"}, "answer": "E", "explain": "The correct answer is E: full-service retailer"}, {"q": "Specialty stores carry ________ with ________ within them.", "options": {"A": "narrow product lines; deep assortments", "B": "narrow product lines; shallow assortments", "C": "only convenience products; shallow assortments", "D": "wide product lines; deep assortments", "E": "wide product lines; shallow assortments"}, "answer": "A", "explain": "The correct answer is A: narrow product lines; deep assortments"}, {"q": "Which type of store carries a wide variety of product lines and has been squeezed in recent years between more focused and flexible specialty stores on the one hand and more efficient, lower-priced discounters on the other?", "options": {"A": "department store", "B": "category specialist", "C": "factory outlet", "D": "warehouse clubs", "E": "merchant wholesaler"}, "answer": "A", "explain": "The correct answer is A: department store"}, {"q": "Which type of store carries a deep assortment of a particular product line, has knowledgeable staff, and can be viewed as a giant specialty store?", "options": {"A": "category killer", "B": "convenience store", "C": "off-price retailer", "D": "warehouse club", "E": "factory outlet"}, "answer": "A", "explain": "The correct answer is A: category killer"}, {"q": "________ retailers in the United States are growing faster than product retailers.", "options": {"A": "Service", "B": "Specialty", "C": "Merchant", "D": "Off-price", "E": "Discount"}, "answer": "A", "explain": "The correct answer is A: Service"}, {"q": "Which of the following is NOT a type of off-price retailer?", "options": {"A": "wholesale club", "B": "factory outlet", "C": "independent", "D": "warehouse club", "E": "category killer"}, "answer": "E", "explain": "The correct answer is E: category killer"}, {"q": "Which of the following statements best represents a contractual association between a manufacturer, wholesaler, or service organization and independent businesspeople who buy the right to own and operate one or more units in the system represented by the contract?", "options": {"A": "franchise", "B": "corporate chain", "C": "voluntary chain", "D": "warehouse club", "E": "retailer cooperative"}, "answer": "A", "explain": "The correct answer is A: franchise"}, {"q": "Sears, Target, and Kroger are examples of ________.", "options": {"A": "retailer cooperatives", "B": "voluntary chains", "C": "corporate chains", "D": "warehouse clubs", "E": "franchise organizations"}, "answer": "C", "explain": "The correct answer is C: corporate chains"}, {"q": "Stop-N-Go , 7-Eleven, and Circle K are examples of ________.", "options": {"A": "category killers", "B": "department stores", "C": "supermarkets", "D": "convenience stores", "E": "specialty stores"}, "answer": "D", "explain": "The correct answer is D: convenience stores"}, {"q": "Overstock.com, a Web seller that buys furniture, clothing, electronics, and more from a variety of producers at less-than-regular wholesale prices and then charges customers less than retail, is a(n) ________.", "options": {"A": "off-price retailer", "B": "factory outlet", "C": "category killer", "D": "specialty store", "E": "wholesale club"}, "answer": "A", "explain": "The correct answer is A: off-price retailer"}, {"q": "Refer to the scenario below to answer the following question.<br><br>In the 1970s, Shipshewana was only a small town with a hardware store, a grain mill, a shoe store, a small restaurant, and a grocery store. Over the next two decades, the small town transformed into an international tourist attraction, attracting thousands of tourists who were intrigued by the lifestyle of Shipshewana's largest population\u2014the Amish. Ben and Mary Miller, having grown up within the Amish faith, decided to capitalize on their town's popularity and their woodworking skills. Their shop, Indiana Wood, began with a small display of handmade hickory rocking chairs, Ben Miller's specialty. But within a few months, the display at Indiana Wood included picnic tables, flower boxes, and small handmade novelty items. No other shop offers the same variety. Mary Miller decorated the shop's display room with authentic Amish d\u00e9cor and eventually hired three Amish friends to sew and embroider napkins and other textiles as customers had requested such items. In addition, two women from the Amish community sought permission from the Millers to display home-baked pastries and jellies on Tuesdays and Wednesdays, when Shipshewana attracts swarms of visitors to its flea market on the south edge of town. The Millers also hired four more people to help customers throughout the purchasing process and to provide the required product-related information to the customers. \"Shipshewana is full of specialty shops,\" Mary Miller stated. \"People don't come here to buy things made in China or Taiwan. They want real, Amish-made goods.\"<br><br>Indiana Wood can be best classified as a(n) ________.", "options": {"A": "industrial distributor", "B": "self-service retailer", "C": "warehouse club", "D": "full-service retailer", "E": "limited-service retailer"}, "answer": "D", "explain": "The correct answer is D: full-service retailer"}, {"q": "Refer to the scenario below to answer the following question.<br><br>In the 1970s, Shipshewana was only a small town with a hardware store, a grain mill, a shoe store, a small restaurant, and a grocery store. Over the next two decades, the small town transformed into an international tourist attraction, attracting thousands of tourists who were intrigued by the lifestyle of Shipshewana's largest population\u2014the Amish. Ben and Mary Miller, having grown up within the Amish faith, decided to capitalize on their town's popularity and their woodworking skills. Their shop, Indiana Wood, began with a small display of handmade hickory rocking chairs, Ben Miller's specialty. But within a few months, the display at Indiana Wood included picnic tables, flower boxes, and small handmade novelty items. No other shop offers the same variety. Mary Miller decorated the shop's display room with authentic Amish d\u00e9cor and eventually hired three Amish friends to sew and embroider napkins and other textiles as customers had requested such items. In addition, two women from the Amish community sought permission from the Millers to display home-baked pastries and jellies on Tuesdays and Wednesdays, when Shipshewana attracts swarms of visitors to its flea market on the south edge of town. The Millers also hired four more people to help customers throughout the purchasing process and to provide the required product-related information to the customers. \"Shipshewana is full of specialty shops,\" Mary Miller stated. \"People don't come here to buy things made in China or Taiwan. They want real, Amish-made goods.\"<br><br>Retailers can also be classified by the length and breadth of their product assortments. In terms of product line, what kind of retailer is Indiana Wood?", "options": {"A": "category killer", "B": "convenience store", "C": "department store", "D": "specialty store", "E": "supermarket"}, "answer": "D", "explain": "The correct answer is D: specialty store"}, {"q": "Daizy's is a shop that carries only plus-size clothing. According to this information, Daizy's differentiates itself from its competitors based on ________.", "options": {"A": "pricing", "B": "product assortment", "C": "distribution strategy", "D": "store atmosphere", "E": "service mix"}, "answer": "B", "explain": "The correct answer is B: product assortment"}, {"q": "A large retailer of home improvement and construction products offers \"how-to\" classes for do-it-yourselfers, featuring instructions on how to complete home improvement projects using products sold at its stores. This is an example of how the retailer has differentiated itself through its ________.", "options": {"A": "pricing", "B": "product assortment", "C": "segmentation", "D": "atmosphere", "E": "services mix"}, "answer": "E", "explain": "The correct answer is E: services mix"}, {"q": "An ideal price policy scenario for retailers would be to achieve ________ while charging ________.", "options": {"A": "high volume; zero markups", "B": "high volume; high markups", "C": "high volume; low markups", "D": "low volume; low markups", "E": "low volume; high markups"}, "answer": "C", "explain": "The correct answer is C: high volume; low markups"}, {"q": "Which of the following is most likely gained by stores that cluster together?", "options": {"A": "standardization of the service mix", "B": "decreased competition", "C": "increased customer pulling power", "D": "compliance with franchise agreements", "E": "creation of retailer cooperatives"}, "answer": "C", "explain": "The correct answer is C: increased customer pulling power"}, {"q": "Most shopping centers are ________.", "options": {"A": "lifestyle centers", "B": "community shopping centers", "C": "regional shopping malls", "D": "power centers", "E": "strip malls"}, "answer": "E", "explain": "The correct answer is E: strip malls"}, {"q": "Springfield, a convenience store, has recently begun to redesign and restock its stores to offer a more upscale environment with products such as house wines and fresh foods. This information indicates that Springfield has most likely changed its ________.", "options": {"A": "service level", "B": "price strategy", "C": "organizational structure", "D": "corporate identity", "E": "positioning"}, "answer": "E", "explain": "The correct answer is E: positioning"}, {"q": "Cabela's stores are as much natural history museums for outdoor enthusiasts as they are retail outlets. This information indicates that Cabela's is practicing ________.", "options": {"A": "showrooming", "B": "nonstore retailing", "C": "experiential retailing", "D": "wholesaling", "E": "shopper marketing"}, "answer": "C", "explain": "The correct answer is C: experiential retailing"}, {"q": "Big and Tall Men's Shop carries men's clothing in larger sizes; this allows the store to ________ other stores.", "options": {"A": "differentiate itself from", "B": "cluster with", "C": "affect the store atmosphere of", "D": "align itself with", "E": "converge with"}, "answer": "A", "explain": "The correct answer is A: differentiate itself from"}, {"q": "The lighting in Jake's Steak Restaurant is dim. The chairs are covered in leather and each table is covered with a white linen cloth. The colors are limited to earth tones with an occasional splash of red. Patrons cannot hear any kitchen noises, only a pleasant melody that seems familiar but unrecognizable. The smells are extraordinarily varied. This is a description of the restaurant's ________.", "options": {"A": "promotions", "B": "atmosphere", "C": "target", "D": "product assortment", "E": "services mix"}, "answer": "B", "explain": "The correct answer is B: atmosphere"}, {"q": "Which of the following best describes a similarity between Costco and Walmart?", "options": {"A": "Both are examples of merchant wholesalers.", "B": "Both are warehouse clubs.", "C": "Both are specialty stores.", "D": "Both use everyday low pricing.", "E": "Both target the same affluent market."}, "answer": "D", "explain": "The correct answer is D: Both use everyday low pricing."}, {"q": "Macy's department stores carry a wide range of product lines, including clothing, jewelry, kitchenware, and home furnishings. Macy's typically charges a relatively high markup, but also holds frequent sales and price promotions, in particular offering discounts to customers who use a Macy's credit card. Macy's uses ________.", "options": {"A": "self-service retailing", "B": "experiential retailing", "C": "high-low pricing", "D": "retail convergence", "E": "everyday low pricing"}, "answer": "C", "explain": "The correct answer is C: high-low pricing"}, {"q": "Which of the following is most likely true about shoppers who prefer to shop at \"lifestyle centers\"?", "options": {"A": "They prefer upscale stores.", "B": "They prefer indoor shopping locations.", "C": "They rarely dine out in expensive restaurants.", "D": "They are motivated by deals on last year's merchandise.", "E": "They use coupons."}, "answer": "A", "explain": "The correct answer is A: They prefer upscale stores."}, {"q": "With their size and buying power, ________ can offer better merchandise selections, good service, and strong price savings to consumers.", "options": {"A": "power centers", "B": "lifestyle centers", "C": "franchises", "D": "megaretailers", "E": "convenience stores"}, "answer": "D", "explain": "The correct answer is D: megaretailers"}, {"q": "Touchscreen kiosks, handheld shopping assistants, interactive dressing-room mirrors and virtual sales associates are all examples of how retailers use technology to ________.", "options": {"A": "interact with suppliers", "B": "send information between stores", "C": "produce more accurate forecasts", "D": "meet consumers' expectations", "E": "maintain inventory costs"}, "answer": "D", "explain": "The correct answer is D: meet consumers' expectations"}, {"q": "Today's retailers increasingly adopt environmentally sustainable practices. Which of the following is NOT one of these practices?", "options": {"A": "cutting back on recycling programs", "B": "promoting more environmentally responsible products", "C": "working with channel partners to reduce their environmental impact", "D": "launching programs to help customers be more responsible", "E": "greening up their stores and operations"}, "answer": "A", "explain": "The correct answer is A: cutting back on recycling programs"}, {"q": "Which of the following wholesaler's channel functions is demonstrated when a wholesaler's sales force helps a manufacturer to reach many small customers at a low cost?", "options": {"A": "risk bearing", "B": "bulk-breaking", "C": "rack jobbing", "D": "selling and promoting", "E": "buying and assortment building"}, "answer": "D", "explain": "The correct answer is D: selling and promoting"}, {"q": "Which of the following is NOT one of a wholesaler's channel functions?", "options": {"A": "risk bearing", "B": "transportation", "C": "financing", "D": "off-price retailing", "E": "bulk breaking"}, "answer": "D", "explain": "The correct answer is D: off-price retailing"}, {"q": "Which of the following wholesaler's channel functions is demonstrated when a wholesaler holds inventories and thereby reduces inventory holding costs and risks of suppliers and customers?", "options": {"A": "bulk breaking", "B": "transporting", "C": "financing", "D": "warehousing", "E": "buying and assortment building"}, "answer": "D", "explain": "The correct answer is D: warehousing"}, {"q": "What is the most common type of agent wholesaler?", "options": {"A": "truck jobber", "B": "industrial distributor", "C": "wholesale merchant", "D": "limited-service wholesaler", "E": "manufacturers' representative"}, "answer": "E", "explain": "The correct answer is E: manufacturers' representative"}, {"q": "________ and ________ do not take title to goods, and they perform only a few channel functions.", "options": {"A": "Cash-and-carry wholesalers; industrial distributors", "B": "Brokers; agents", "C": "Full-service wholesalers; limited-service wholesalers", "D": "Industrial distributors; cash-and-carry wholesalers", "E": "Rack jobbers; off-price retailers"}, "answer": "B", "explain": "The correct answer is B: Brokers; agents"}, {"q": "Which type of wholesaler sells to manufacturers rather than to retailers?", "options": {"A": "wholesale merchant", "B": "full-service wholesaler", "C": "industrial distributor", "D": "limited-service wholesaler", "E": "cash-and-carry wholesaler"}, "answer": "C", "explain": "The correct answer is C: industrial distributor"}, {"q": "________ are agents who take physical possession of products and negotiate sales. They deal mostly with agricultural marketing.", "options": {"A": "Industrial distributors", "B": "Cash-and-carry wholesalers", "C": "Rack jobbers", "D": "Commission merchants", "E": "Purchasing officers"}, "answer": "D", "explain": "The correct answer is D: Commission merchants"}, {"q": "Carey David's wholesale company helps retailers train salesclerks, improve store layouts and displays, and set up inventory control systems. According to this information, which of the following wholesaler's channel functions does Carey David provide?", "options": {"A": "risk bearing services", "B": "management services and advice", "C": "buying and assortment building", "D": "selling and promotion services", "E": "marketing information"}, "answer": "B", "explain": "The correct answer is B: management services and advice"}, {"q": "You own a small independent retail store in your neighborhood. You want to offer fresh seafood, milk, and bread in your store. In this case, which of the following types of wholesalers will serve you the best?", "options": {"A": "mail-order wholesaler", "B": "independent distributor", "C": "truck jobber", "D": "drop shipper", "E": "manufacturers' agent"}, "answer": "C", "explain": "The correct answer is C: truck jobber"}, {"q": "You own a neighborhood grocery store and would like to have non-food items delivered, priced, displayed and inventoried by a wholesaler. You do not want to purchase title to the goods. Which type of wholesaler best fits your needs?", "options": {"A": "rack jobber", "B": "mail-order wholesaler", "C": "drop shipper", "D": "agents and brokers", "E": "cash-and-carry wholesaler"}, "answer": "A", "explain": "The correct answer is A: rack jobber"}, {"q": "Tony Pool Chemical Co. purchased 144 buckets of chlorine tablets over the Internet from Chemical Inc. Then Chemical Inc. placed the order with the manufacturer, and the manufacturer then transported the tablets directly to the Tony Pool store. In this case, Chemical Inc. is an example of a ________.", "options": {"A": "rack jobber", "B": "truck jobber", "C": "cash-and-carry wholesaler", "D": "drop shipper", "E": "full-service wholesaler"}, "answer": "D", "explain": "The correct answer is D: drop shipper"}, {"q": "________ perform a role similar to that of brokers or agents but are part of the buyer's organization.", "options": {"A": "Rack jobbers", "B": "Truck jobbers", "C": "Purchasing officers", "D": "Cash-and-carry wholesalers", "E": "Merchant wholesalers"}, "answer": "C", "explain": "The correct answer is C: Purchasing officers"}], "flashcards": [{"section": "Retailing Basics", "term": "Retailing", "def": "All activities involved in selling goods or services directly to final consumers for their personal, nonbusiness use.", "example": "A shopper buying jeans at a mall clothing store is engaging with retailing."}, {"section": "Retailing Basics", "term": "Shopper Marketing & Omni-Channel Retailing", "def": "Shopper marketing uses store and online environments to turn shoppers into buyers; omni-channel retailing creates a seamless, integrated shopping experience across all channels and devices.", "example": "A customer checks inventory on an app, picks up in-store, and returns the item by mail through the same retailer."}, {"section": "Retailer Types", "term": "Retailers by Amount of Service", "def": "Self-service retailers offer the lowest cost and fewest services; limited-service retailers offer more sales assistance at higher prices; full-service retailers assist customers throughout the shopping process at the highest prices.", "example": "A discount warehouse is self-service; a department store with personal shoppers is full-service."}, {"section": "Retailer Types", "term": "Retailers by Product Line", "def": "Specialty stores carry a narrow line with deep assortment, department stores carry several lines, supermarkets are large low-cost high-volume stores, convenience stores are small with limited lines but long hours, and superstores are even larger than supermarkets.", "example": "A running shoe store is a specialty store; a 24-hour gas station mart is a convenience store."}, {"section": "Retailer Types", "term": "Retailers by Relative Price", "def": "Discount stores sell standard merchandise at lower prices and margins; off-price retailers buy below regular wholesale prices; factory outlets are manufacturer-owned off-price stores; warehouse clubs sell a limited selection at deep discounts to members.", "example": "Costco is a warehouse club; a brand's own outlet store selling past-season items is a factory outlet."}, {"section": "Retail Organization", "term": "Retail Organizational Forms", "def": "A corporate chain is commonly owned and controlled outlets; a voluntary chain is independent retailers sponsored by a wholesaler; a retailer cooperative is independent retailers banding together; a franchise links producers or service organizations with independent retailers through contracts.", "example": "Ace Hardware operates as a retailer cooperative of independently owned stores."}, {"section": "Retail Organization", "term": "Non-Store Direct Retailing", "def": "Retailing that reaches consumers outside of stores, through direct mail, catalogs, telemarketing, direct-response television, and infomercials.", "example": "A skincare brand selling through a late-night infomercial with a call-in number."}, {"section": "Retailer Decisions", "term": "Retailer Marketing Decisions", "def": "Retailers make segmentation, targeting, and positioning decisions, then set product (assortment, services, atmosphere), price, promotion, and place decisions.", "example": "A boutique positions itself as a high-end, full-service shop in an upscale shopping center."}, {"section": "Retailer Decisions", "term": "EDLP vs. High-Low Pricing", "def": "Every Day Low Pricing (EDLP) charges a constant low price with few discounts; high-low pricing charges higher everyday prices but runs frequent sales and promotions.", "example": "Walmart is known for EDLP; many department stores rely on high-low pricing with frequent sale events."}, {"section": "Retail Trends", "term": "Retailing Trends", "def": "Major trends include economic uncertainty and disruption, retail convergence (different retailer types selling similar products), the rise of megaretailers, retail technology, green retailing, and global expansion.", "example": "Grocery stores, drugstores, and discount stores now all sell similar electronics, an example of retail convergence."}, {"section": "Wholesaling Basics", "term": "Wholesaling", "def": "All activities involved in selling goods and services to those buying for resale or business use, rather than to final consumers.", "example": "A food distributor selling bulk produce to restaurants and grocery stores."}, {"section": "Wholesaling Basics", "term": "Wholesaler Functions", "def": "Wholesalers add value through selling/promoting, buying and assortment building, bulk breaking, warehousing, transportation, financing, risk bearing, market information, and management services.", "example": "A wholesaler breaking down a large shipment into smaller case quantities for small retailers is performing bulk breaking."}, {"section": "Wholesaling Basics", "term": "Types of Wholesalers", "def": "Merchant wholesalers take title to goods (full- or limited-service); brokers bring buyers and sellers together without taking title; agents represent buyers or sellers long-term; manufacturers'/retailers' branches and offices are wholesaling units run by sellers or buyers themselves.", "example": "A broker who connects a buyer and seller without ever owning the goods is acting as a merchandise broker."}, {"section": "Wholesaling Decisions", "term": "Wholesaler Marketing Decisions", "def": "Like retailers, wholesalers decide on segmentation, targeting, and positioning, then optimize their mix of product assortment, price, promotion, and place.", "example": "A wholesaler chooses to specialize in serving only independent hardware stores instead of all retailers."}, {"section": "Wholesaling Trends", "term": "Trends in Wholesaling", "def": "Wholesalers face pressure for greater efficiency, are adding value-added services, adopting technology, and facing competition from large retailers and manufacturers that bypass them.", "example": "A wholesaler investing in data analytics tools to give retailers better demand forecasting."}]}, "ch14": {"title": "Chapter 14 \u2014 Integrated Marketing Communications", "questions": [{"q": "Extel Inc., a home appliance manufacturer, uses sales representatives to sell its products to wholesalers and individual customers. This is an example of ________.", "options": {"A": "advertising", "B": "personal selling", "C": "direct marketing", "D": "sales promotion", "E": "public relations"}, "answer": "B", "explain": "The correct answer is B: personal selling"}, {"q": "Which of the following statements is true regarding today's marketing communications?", "options": {"A": "Network television, magazines, newspapers, and other traditional mass media continue to increase their dominance.", "B": "More marketers are shifting away from narrowly defined micromarkets and moving toward mass marketing.", "C": "Today's consumers are better informed about products and services.", "D": "More customers have started relying on marketer-supplied information rather than finding out information on their own.", "E": "Focused marketing programs, which are designed to build closer relationships with customers in more narrowly defined micromarkets, are no longer used by marketers."}, "answer": "C", "explain": "The correct answer is C: Today's consumers are better informed about products and services."}, {"q": "Which of the following is a specialized and highly targeted media selection that an advertiser might use to reach smaller customer segments?", "options": {"A": "network television", "B": "newspapers", "C": "magazines", "D": "radio", "E": "online social networks"}, "answer": "E", "explain": "The correct answer is E: online social networks"}, {"q": "Companies are doing less ________ and more ________ as a result of the explosive developments in communication technologies to better target smaller customer segments.", "options": {"A": "public relations activities; digital activities", "B": "viral marketing; word-of-mouth marketing", "C": "mass marketing; digital marketing", "D": "personal selling; digital activities", "E": "digital activities; mass marketing"}, "answer": "C", "explain": "The correct answer is C: mass marketing; digital marketing"}, {"q": "Companies often fail to integrate their various communications to consumers because ________.", "options": {"A": "personal selling and sales promotion are in direct conflict", "B": "advertising departments are reluctant to work with public relations professionals", "C": "firms have overemphasized the concept of brand contact", "D": "historically, consumers have been able to distinguish between message sources", "E": "communications often come from different parts of the company"}, "answer": "E", "explain": "The correct answer is E: communications often come from different parts of the company"}, {"q": "Consumers today receive commercial messages from a broad range of sources. However, consumers ________ the way marketers do.", "options": {"A": "never pay attention to sales promotions", "B": "block out all media messages", "C": "don't care about buzz marketing", "D": "are not able to block out messages", "E": "don't distinguish between message sources"}, "answer": "E", "explain": "The correct answer is E: don't distinguish between message sources"}, {"q": "Integrated marketing communications require a company's mass-market advertisements, Web site, e-mail, and personal selling communications to all ________.", "options": {"A": "use independent communications directors", "B": "develop separate marketing objectives", "C": "have equal portions of the advertising budget", "D": "deliver a clear, consistent, and compelling message", "E": "engage the same target audience"}, "answer": "D", "explain": "The correct answer is D: deliver a clear, consistent, and compelling message"}, {"q": "Delia's is a clothing retailer that targets teenage girls. The company runs coordinated promotions for its catalogs, Web site, and retail outlets. It uses the same models in its catalog, print ads, and Web site. Delia's works to make sure its public relations activities as well as its sales promotions harmonize with its advertising in all aspects. From this information, we can infer that Delia's is using ________.", "options": {"A": "experiential marketing", "B": "database marketing", "C": "integrated marketing communication", "D": "buzz marketing", "E": "word-of-mouth marketing"}, "answer": "C", "explain": "The correct answer is C: integrated marketing communication"}, {"q": "HP's advertising agency assembles words and illustrations into an advertisement that conveys the company's intended brand message. In the context of the communication process, HP is ________.", "options": {"A": "sending", "B": "encoding", "C": "decoding", "D": "responding", "E": "messaging"}, "answer": "B", "explain": "The correct answer is B: encoding"}, {"q": "The decision to use an NBA star player to communicate the desirability of Nike basketball shoes represents the ________ process of the communication model.", "options": {"A": "encoding", "B": "messaging", "C": "sourcing", "D": "acknowledging", "E": "decoding"}, "answer": "A", "explain": "The correct answer is A: encoding"}, {"q": "In the communication process, an actual HP printer/fax machine advertisement would be considered ________.", "options": {"A": "decoding", "B": "encoding", "C": "the product", "D": "the medium", "E": "the message"}, "answer": "E", "explain": "The correct answer is E: the message"}, {"q": "A consumer is reading a magazine with an advertisement, but due to a loud sound he is distracted from reading the advertisement and is not able to grasp its key points. In the context of the communication process, this unplanned static or distortion is called ________.", "options": {"A": "feedback", "B": "noise", "C": "decoding", "D": "encoding", "E": "response"}, "answer": "B", "explain": "The correct answer is B: noise"}, {"q": "An ad for Maybelline age-minimizing makeup in Ladies' Home Journal magazine featured actress Melina Kanakaredes and offered readers a $1-off coupon when they tried the new makeup. In terms of the communication model, the sender of this message is ________.", "options": {"A": "Ladies' Home Journal", "B": "readers who redeem the $1-off coupon", "C": "the target market to which Melina Kanakaredes appeals", "D": "Melina Kanakaredes", "E": "Maybelline"}, "answer": "E", "explain": "The correct answer is E: Maybelline"}, {"q": "An ad for Maybelline age-minimizing makeup in Ladies' Home Journal magazine featured actress Melina Kanakaredes and offered readers a $1-off coupon when they tried the new makeup. In terms of the communication model, the medium of this ad is ________.", "options": {"A": "Ladies' Home Journal", "B": "readers who redeem the $1-off coupon", "C": "Maybelline", "D": "Melina Kanakaredes", "E": "the target market to which Melina Kanakaredes appeals"}, "answer": "A", "explain": "The correct answer is A: Ladies' Home Journal"}, {"q": "An ad for Maybelline age-minimizing makeup in Ladies' Home Journal magazine featured actress Melina Kanakaredes and offered readers a $1-off coupon when they tried the new makeup. In the context of the communication model, measuring which of the following would be the best way for the source to measure feedback?", "options": {"A": "the number of people who redeem the coupon", "B": "the number of people to whom Melina Kanakaredes is an appealing spokesperson", "C": "the number of people who have purchased Maybelline products in the past", "D": "the number of people who make up the target market", "E": "the number of subscribers to Ladies' Home Journal"}, "answer": "A", "explain": "The correct answer is A: the number of people who redeem the coupon"}, {"q": "In the communication process, the more the sender's field of experience ________ that of the receiver, the more ________ the message is likely to be.", "options": {"A": "overlaps with; effective", "B": "connects with; ineffective", "C": "departs from; direct", "D": "coincides with; creative", "E": "varies from; distinguishable"}, "answer": "A", "explain": "The correct answer is A: overlaps with; effective"}, {"q": "To communicate effectively, a marketing communicator should most likely ________.", "options": {"A": "use familiar words and symbols", "B": "ensure that the encoding and decoding processes are different", "C": "understand the consumer's field of experience", "D": "foresee unplanned static or distortion", "E": "encode and decode the message personally and frequently"}, "answer": "C", "explain": "The correct answer is C: understand the consumer's field of experience"}, {"q": "Marketing communicators must be good at ________ messages that take into account how the target audience ________ them.", "options": {"A": "decoding; receives", "B": "encoding; decodes", "C": "retrieving; perceives", "D": "sending; encodes", "E": "delivering; encodes"}, "answer": "B", "explain": "The correct answer is B: encoding; decodes"}, {"q": "While developing an effective integrated communication, once the target audience has been defined, marketers must do all these steps EXCEPT ________.", "options": {"A": "design a message", "B": "determine the desired response", "C": "collect feedback", "D": "choose the media through which to send a message", "E": "identify potential distractions"}, "answer": "E", "explain": "The correct answer is E: identify potential distractions"}, {"q": "Boson Corp. is introducing consumers to its new car with the help of an advertisement campaign. This introductory campaign most likely aims to affect the ________ stage of buyer-readiness.", "options": {"A": "insistence", "B": "preference", "C": "awareness", "D": "conviction", "E": "liking"}, "answer": "C", "explain": "The correct answer is C: awareness"}, {"q": "A charitable trust's appeal which states, \"While you are trying to figure out what to get the man who has everything, don't forget the man who has nothing\" is an example of a(n) ________ appeal.", "options": {"A": "rational", "B": "awareness", "C": "standard", "D": "moral", "E": "structural"}, "answer": "D", "explain": "The correct answer is D: moral"}, {"q": "One of the message structure issues that a marketer must handle is whether to ________.", "options": {"A": "use mass marketing or niche marketing", "B": "make a moral appeal or not", "C": "diversify vertically or horizontally", "D": "present the strongest arguments first or last", "E": "use the pull strategy or push strategy"}, "answer": "D", "explain": "The correct answer is D: present the strongest arguments first or last"}, {"q": "A(n) ________ argument is most likely to be effective when the audience is highly educated or likely to hear opposing claims.", "options": {"A": "two-sided", "B": "moral", "C": "emotional", "D": "one-sided", "E": "structured"}, "answer": "A", "explain": "The correct answer is A: two-sided"}, {"q": "A marketer making decisions about the headline, copy, illustration, and colors for a print ad is determining the message ________.", "options": {"A": "format", "B": "structure", "C": "medium", "D": "channel", "E": "content"}, "answer": "A", "explain": "The correct answer is A: format"}, {"q": "Communication through a telephone call is considered a part of a(n) ________ communication channel.", "options": {"A": "online", "B": "nonverbal", "C": "personal", "D": "unidirectional", "E": "nonpersonal"}, "answer": "C", "explain": "The correct answer is C: personal"}, {"q": "A manufacturer of a variety of technological devices asked its marketing department to develop inexpensive methods of building and maintaining brand awareness and excitement. The marketing department then recruited consumers who were early adopters of technological devices to spread the word about the company's new products. This is an example of ________.", "options": {"A": "buzz marketing", "B": "direct marketing", "C": "nonpersonal marketing", "D": "sales promotion", "E": "a reverse marketing activity"}, "answer": "A", "explain": "The correct answer is A: buzz marketing"}, {"q": "Which of the following statements is true about personal communication channels?", "options": {"A": "All personal communication channels are directly controlled by a company.", "B": "Personal communication channels do not allow sending and receiving of feedback.", "C": "Word-of-mouth influence uses a personal communication channel.", "D": "A billboard message exemplifies the use of a personal communication channel.", "E": "A magazine advertisement exemplifies the use of a personal communication channel."}, "answer": "C", "explain": "The correct answer is C: Word-of-mouth influence uses a personal communication channel."}, {"q": "Display media includes ________.", "options": {"A": "billboards", "B": "newspapers", "C": "magazines", "D": "television", "E": "company Web sites"}, "answer": "A", "explain": "The correct answer is A: billboards"}, {"q": "To ________, a marketer would most likely ask target audience members whether they remember the message, how many times they saw it, and what points they remember.", "options": {"A": "collect feedback", "B": "select a message channel", "C": "select a message source", "D": "design a marketing appeal", "E": "plan a media purchase"}, "answer": "A", "explain": "The correct answer is A: collect feedback"}, {"q": "Refer to the scenario below to answer the following question.<br><br>John Mayes opened Sparkle Janitorial in 2005. John began his business by acquiring two contracts for office cleaning services from two local manufacturing facilities. For two years, John and his wife, Barb, performed the cleaning services alone. After acquiring three additional cleaning contracts in 2007, John hired two employees. \"Up to that point, we had room to grow but we really had no advertising plan,\" John stated. \"We were relying mostly on word-of-mouth.\" By 2010, Barb hired another two full-time employees to begin Sparkle's new endeavor: carpet cleaning in homes and offices. \"Competition was getting tough for both of our services at that point,\" Barb added. \"We ran a local radio spot three times each week. Then we had an advertiser print coupons on placemats. That gave us a little more exposure.\" John and Barb Mayes admit that they did not realize the value of a sound promotional plan earlier. \"We wish we would have put together something catchy with a jingle long before now,\" they said.<br><br>In a recent radio spot, John and Barb gave a quick explanation of Sparkle's cleaning process and a description of the value consumers receive for their money. This is an example of a(n) ________ appeal.", "options": {"A": "social", "B": "standard", "C": "emotional", "D": "moral", "E": "rational"}, "answer": "E", "explain": "The correct answer is E: rational"}, {"q": "Refer to the scenario below to answer the following question.<br><br>John Mayes opened Sparkle Janitorial in 2005. John began his business by acquiring two contracts for office cleaning services from two local manufacturing facilities. For two years, John and his wife, Barb, performed the cleaning services alone. After acquiring three additional cleaning contracts in 2007, John hired two employees. \"Up to that point, we had room to grow but we really had no advertising plan,\" John stated. \"We were relying mostly on word-of-mouth.\" By 2010, Barb hired another two full-time employees to begin Sparkle's new endeavor: carpet cleaning in homes and offices. \"Competition was getting tough for both of our services at that point,\" Barb added. \"We ran a local radio spot three times each week. Then we had an advertiser print coupons on placemats. That gave us a little more exposure.\" John and Barb Mayes admit that they did not realize the value of a sound promotional plan earlier. \"We wish we would have put together something catchy with a jingle long before now,\" they said.<br><br>John and Barb could have drawn attention to their services in several ways by using effective integrated marketing communications. Which of the following is NOT a part of an IMC strategy?", "options": {"A": "sales promotion", "B": "personal selling", "C": "public relations", "D": "direct marketing", "E": "strategic planning"}, "answer": "E", "explain": "The correct answer is E: strategic planning"}, {"q": "Which of the following statements is true regarding the affordable method for setting a promotion budget?", "options": {"A": "It leads to a certain annual promotion budget.", "B": "It completely ignores the effects of promotion on sales.", "C": "It is mostly used by large businesses.", "D": "It almost always results in overspending.", "E": "It tends to place promotion first among spending priorities."}, "answer": "B", "explain": "The correct answer is B: It completely ignores the effects of promotion on sales."}, {"q": "Though the ________ method of setting an advertising budget is simple to use and helps management think about the relationships among promotion spending, selling price, and profit per unit, it wrongly views sales as the cause of promotion rather than the result.", "options": {"A": "percentage-of-sales", "B": "integrated", "C": "objective-and-task", "D": "regression", "E": "competitive-parity"}, "answer": "A", "explain": "The correct answer is A: percentage-of-sales"}, {"q": "Sam, the owner of a small company, learned that a competitor was planning to spend $150,000 on promotion in the next financial year. As soon as he learned this, Sam called his finance manager and said, \"I want to spend $150,000 on promotion next year.\" In this case, which method of promotional budgeting does Sam use?", "options": {"A": "the percentage-of-sales method", "B": "the pull-push method", "C": "the objective-and-task method", "D": "the competitive-parity method", "E": "the affordable method"}, "answer": "D", "explain": "The correct answer is D: the competitive-parity method"}, {"q": "Which of the following statements is most likely true regarding the competitive-parity method?", "options": {"A": "In this method, promotion budgets are set to match competitors' outlays.", "B": "It is based on the availability of funds rather than on opportunities.", "C": "This method involves starting with total revenues, deducting operating expenses and capital outlays, and then devoting some portion of the remaining funds to advertising.", "D": "It wrongly views sales as the cause of promotion rather than as the result.", "E": "This method involves setting the promotion budget at a certain percentage of current or forecasted sales."}, "answer": "A", "explain": "The correct answer is A: In this method, promotion budgets are set to match competitors' outlays."}, {"q": "Which of the following is most likely a shortcoming of advertising?", "options": {"A": "It is impersonal and lacks the direct persuasiveness of company salespeople.", "B": "It cannot reach masses of geographically dispersed buyers.", "C": "It cannot be used to build up a long-term image for a product.", "D": "It is the most expensive promotion tool.", "E": "It cannot trigger quick sales."}, "answer": "A", "explain": "The correct answer is A: It is impersonal and lacks the direct persuasiveness of company salespeople."}, {"q": "Suppose Amazon.com has offered you free shipping on your next purchase of more than $35. This offer is an example of ________.", "options": {"A": "horizontal diversification", "B": "sales promotion", "C": "a public relations strategy", "D": "a pull strategy", "E": "personal selling"}, "answer": "B", "explain": "The correct answer is B: sales promotion"}, {"q": "The manufacturer of Crest toothpaste provides free samples of its toothpaste to dentists and encourages them to distribute these samples to their patients and to inform the patients about advantages of using Crest. The manufacturer of Crest toothpaste is using ________.", "options": {"A": "a push strategy", "B": "sales promotion", "C": "a vertical diversification strategy", "D": "direct marketing", "E": "a pull strategy"}, "answer": "A", "explain": "The correct answer is A: a push strategy"}, {"q": "Glasis is a type of paint made specifically for use on cars. An ad in Motor Trend magazine advising consumers to request their auto body shops to use Glasis paint is an example of how a company uses ________.", "options": {"A": "word-of-mouth influence", "B": "a push strategy", "C": "a pull strategy", "D": "public relations", "E": "buzz marketing"}, "answer": "C", "explain": "The correct answer is C: a pull strategy"}, {"q": "Business-to-consumer companies are more likely to emphasize a ________ promotion strategy, while business-to-business companies are more likely to emphasize a ________ promotion strategy.", "options": {"A": "pull; push", "B": "push; pull", "C": "pulse; pull", "D": "push; blitz", "E": "blitz; pull"}, "answer": "A", "explain": "The correct answer is A: pull; push"}, {"q": "John Deere does very little promoting of its lawn mowers and garden tractors to final consumers. Instead, John Deere's sales force works with Lowe's, Home Depot, independent dealers, and other channel members, who in turn sell John Deere products to final consumers. According to this information, which of the following promotion mix strategies is being used by John Deere?", "options": {"A": "public relations strategy", "B": "direct marketing strategy", "C": "pull strategy", "D": "push strategy", "E": "blitz strategy"}, "answer": "D", "explain": "The correct answer is D: push strategy"}, {"q": "Which of the following would be classified as bait-and-switch advertising?", "options": {"A": "advertising a cheaper brand but making only a more expensive one available to customers", "B": "providing free samples of a product", "C": "providing discount coupons with a product", "D": "advertising the advantages of a product by comparing it to its competitors", "E": "favoring certain customers over others through trade promotions"}, "answer": "A", "explain": "The correct answer is A: advertising a cheaper brand but making only a more expensive one available to customers"}, {"q": "Refer to the scenario below to answer the following question.<br><br>John Mayes opened Sparkle Janitorial in 2005. John began his business by acquiring two contracts for office cleaning services from two local manufacturing facilities. For two years, John and his wife, Barb, performed the cleaning services alone. After acquiring three additional cleaning contracts in 2007, John hired two employees. \"Up to that point, we had room to grow but we really had no advertising plan,\" John stated. \"We
