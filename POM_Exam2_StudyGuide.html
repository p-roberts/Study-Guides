were relying mostly on word-of-mouth.\" By 2010, Barb hired another two full-time employees to begin Sparkle's new endeavor: carpet cleaning in homes and offices. \"Competition was getting tough for both of our services at that point,\" Barb added. \"We ran a local radio spot three times each week. Then we had an advertiser print coupons on placemats. That gave us a little more exposure.\" John and Barb Mayes admit that they did not realize the value of a sound promotional plan earlier. \"We wish we would have put together something catchy with a jingle long before now,\" they said.<br><br>When starting their business, John and Barb would most likely have benefitted from understanding ________.", "options": {"A": "social media", "B": "public relations campaigns", "C": "network television advertising", "D": "buzz marketing", "E": "integrated marketing communications"}, "answer": "E", "explain": "The correct answer is E: integrated marketing communications"}], "flashcards": [{"section": "IMC Basics", "term": "Promotion Mix", "def": "The specific blend of promotion tools a company uses, including advertising, sales promotion, personal selling, and public relations, often coordinated with direct and digital marketing.", "example": "A product launch combining TV ads, in-store coupons, a sales team for retailers, and a press release."}, {"section": "IMC Basics", "term": "Integrated Marketing Communications (IMC)", "def": "Carefully integrating and coordinating a company's many communications channels to deliver a clear, consistent, and compelling message about the organization and its products.", "example": "A brand using the same tagline and visual style across its website, social media, ads, and packaging."}, {"section": "IMC Basics", "term": "Content Marketing & the New Comms Model", "def": "The new marketing communications model reflects a shift from traditional mass-media advertising toward engaging customers through content marketing across digital, mobile, and social channels.", "example": "A brand creating a YouTube series instead of relying solely on TV commercials."}, {"section": "Communication Process", "term": "Five A's of Customer Engagement", "def": "Marketers can target buyer-readiness stages of Awareness, Appeal, Ask, Act, and Advocacy when setting communication objectives.", "example": "A skincare brand runs awareness ads, retargeting ads (Appeal), shares reviews (Ask), offers a discount (Act), and rewards referrals (Advocacy)."}, {"section": "Communication Process", "term": "Steps in the Communication Process", "def": "Identify the target audience, determine communication objectives, design the message, choose channels, select a message source, and collect feedback.", "example": "A company picks a credible spokesperson its target audience will trust as its message source."}, {"section": "Communication Process", "term": "Message Appeals", "def": "Rational appeals relate to self-interest, emotional appeals try to stir up feelings, and moral appeals are directed at an audience's sense of what is right and proper.", "example": "A nonprofit ad about reducing waste appeals to viewers' sense of doing the right thing, a moral appeal."}, {"section": "Communication Process", "term": "Personal vs. Nonpersonal Channels", "def": "Personal channels involve direct communication between people; nonpersonal channels carry messages without personal contact or feedback, which includes word-of-mouth and buzz marketing.", "example": "A friend recommending a restaurant is personal communication; a billboard ad is nonpersonal."}, {"section": "Budgeting", "term": "Setting the Promotion Budget", "def": "Methods include the affordable method (spend whatever the company can spare), percentage-of-sales method, competitive-parity method (matching competitor spending), and objective-and-task method (build a budget from what objectives cost to achieve).", "example": "A company sets its ad budget at 5% of projected sales, an example of the percentage-of-sales method."}, {"section": "Strategy", "term": "Push vs. Pull Strategy", "def": "A push strategy uses the sales force and trade promotion to push a product through channels to consumers; a pull strategy uses advertising and consumer promotion to pull consumers into stores asking for the product.", "example": "A manufacturer offering retailers special discounts to stock its product is using a push strategy."}, {"section": "Strategy", "term": "Shaping the Promotion Mix", "def": "Companies weigh the nature of each tool, the type of product/market (consumer vs. business), and the product's stage in the buyer-readiness and life cycles to decide the mix.", "example": "B2B companies typically rely more on personal selling than consumer goods companies do."}, {"section": "Responsibility", "term": "Socially Responsible Marketing Communication", "def": "Advertising and promotion must avoid false or misleading claims, deceptive ads, and bait-and-switch tactics; personal selling must avoid deceptive or high-pressure practices.", "example": "A company avoiding bait-and-switch tactics, where an advertised cheap item is unavailable to push a pricier one."}]}, "ch15": {"title": "Chapter 15 \u2014 Advertising and Public Relations", "questions": [{"q": "Which of the following is most likely an objective of informative advertising?", "options": {"A": "build brand preference", "B": "suggest new uses for a product", "C": "keep the brand in customer minds during off-seasons", "D": "change customer perceptions of brand value", "E": "encourage customers to switch brands"}, "answer": "B", "explain": "The correct answer is B: suggest new uses for a product"}, {"q": "When P&G developed the Mr. Clean Magic Eraser, the company needed to explain how the product cleans grime from walls without removing paint. What type of campaign was most likely used by P&G for the Mr. Clean Magic Eraser?", "options": {"A": "persuasive advertising", "B": "developmental advertising", "C": "comparative advertising", "D": "informative advertising", "E": "reminder advertising"}, "answer": "D", "explain": "The correct answer is D: informative advertising"}, {"q": "Which of the following is an objective of persuasive advertising?", "options": {"A": "keep the brand in a customer's mind during off-seasons", "B": "engage customers and create customer brand community", "C": "correct false impressions", "D": "describe available services and support", "E": "communicate customer value"}, "answer": "B", "explain": "The correct answer is B: engage customers and create customer brand community"}, {"q": "When Verizon Wireless began offering the iPhone, it used its \"Can you hear me now?\" slogan to attack AT&T's rumored spotty service. This example best illustrates ________.", "options": {"A": "comparative advertising", "B": "covert advertising", "C": "informative advertising", "D": "reminder advertising", "E": "institutional advertising"}, "answer": "A", "explain": "The correct answer is A: comparative advertising"}, {"q": "Encouraging customers to switch brands is most likely the objective of ________ advertising.", "options": {"A": "reminder", "B": "persuasive", "C": "institutional", "D": "covert", "E": "informative"}, "answer": "B", "explain": "The correct answer is B: persuasive"}, {"q": "Which of the following types of advertising will most likely result in an advertising war?", "options": {"A": "reminder advertising", "B": "covert advertising", "C": "institutional advertising", "D": "comparative advertising", "E": "informative advertising"}, "answer": "D", "explain": "The correct answer is D: comparative advertising"}, {"q": "Which of the following is one of the primary goals of reminder advertising?", "options": {"A": "build brand preference", "B": "restore company image", "C": "maintain customer relationships", "D": "inform the market of a price change", "E": "correct false impressions"}, "answer": "C", "explain": "The correct answer is C: maintain customer relationships"}, {"q": "Which of the following most likely requires the smallest advertising budget?", "options": {"A": "new products", "B": "products in competitive markets", "C": "mature brands", "D": "low-share brands", "E": "undifferentiated brands"}, "answer": "C", "explain": "The correct answer is C: mature brands"}, {"q": "Which of the following brands most likely requires heavy advertising in order to be set apart from similar products?", "options": {"A": "undifferentiated brands", "B": "international brands", "C": "mature brands", "D": "specialty brands", "E": "high-share brands"}, "answer": "A", "explain": "The correct answer is A: undifferentiated brands"}, {"q": "Brands in a market with many competitors and high advertising clutter must ________.", "options": {"A": "be advertised only through print and social media", "B": "be advertised more heavily to be noticed in the marketplace", "C": "be advertised only during the mature stage of the product life cycle", "D": "never be advertised using informative advertising", "E": "have very high prices compared to competitors"}, "answer": "B", "explain": "The correct answer is B: be advertised more heavily to be noticed in the marketplace"}, {"q": "Which of the following would be the most likely result of slashing ad spending for a product?", "options": {"A": "reduced long-term market share", "B": "increased popularity", "C": "increased long-term market share", "D": "improved brand image", "E": "increased short-term sales"}, "answer": "A", "explain": "The correct answer is A: reduced long-term market share"}, {"q": "With the help of ________ systems, consumers can avoid watching ads.", "options": {"A": "HDMI", "B": "DVR", "C": "XBMC", "D": "CCTV", "E": "USB"}, "answer": "B", "explain": "The correct answer is B: DVR"}, {"q": "Product placement in television programs and movies is an example of ________.", "options": {"A": "buzz marketing", "B": "direct marketing", "C": "sales promotion", "D": "advertainment", "E": "branded entertainment"}, "answer": "E", "explain": "The correct answer is E: branded entertainment"}, {"q": "Coca-Cola cups prominently featured on episodes of American Idol are an example of ________.", "options": {"A": "personal selling", "B": "product placement", "C": "advertainment", "D": "buzz marketing", "E": "sales promotion"}, "answer": "B", "explain": "The correct answer is B: product placement"}, {"q": "In its advertisements, Timex promotes its affordable and sturdy watches. Fossil emphasizes style and fashion in its advertisements, and Rolex stresses luxury and status. These are all examples of ________ appeals.", "options": {"A": "believable", "B": "distinctive", "C": "reminder", "D": "entertainment", "E": "rational"}, "answer": "B", "explain": "The correct answer is B: distinctive"}, {"q": "An ad for a new convection oven shows a busy professional woman using the convection oven to cook dinner for her family. Which of the following message execution styles is illustrated in this example?", "options": {"A": "scientific evidence", "B": "fantasy", "C": "testimonial evidence", "D": "slice of life", "E": "mood or image"}, "answer": "D", "explain": "The correct answer is D: slice of life"}, {"q": "An ad for Athleta active wear shows a woman in a complex yoga pose and states: \"If your body is your temple, build it one piece at a time.\" This ad uses the ________ execution style.", "options": {"A": "scientific evidence", "B": "lifestyle", "C": "personality symbol", "D": "slice of life", "E": "fantasy"}, "answer": "B", "explain": "The correct answer is B: lifestyle"}, {"q": "A pharmaceutical ad features a world-renowned heart surgeon describing the benefits of a medication. Which of the following message execution styles is illustrated in this example?", "options": {"A": "musical", "B": "testimonial evidence", "C": "fantasy", "D": "personality symbol", "E": "mood or image"}, "answer": "B", "explain": "The correct answer is B: testimonial evidence"}, {"q": "Apple used an album by the band U2 to promote the Apple Watch announcement. Which of the following message execution styles is illustrated in this example?", "options": {"A": "personality symbol", "B": "musical", "C": "lifestyle", "D": "slice of life", "E": "fantasy"}, "answer": "B", "explain": "The correct answer is B: musical"}, {"q": "The advertisements that use the Aflac duck or the GEICO gecko are using the message execution style of ________.", "options": {"A": "technical expertise", "B": "testimonial evidence", "C": "slice of life", "D": "personality symbols", "E": "lifestyle"}, "answer": "D", "explain": "The correct answer is D: personality symbols"}, {"q": "Progressive Insurance uses Flo to represent its product. Which of the following message execution styles was used by Progressive Insurance?", "options": {"A": "personality symbol", "B": "mood or image", "C": "fantasy", "D": "technical expertise", "E": "musical"}, "answer": "A", "explain": "The correct answer is A: personality symbol"}, {"q": "Maybelline used Sarah Michelle Gellar, an actress, to endorse a new range of cosmetics. This message execution style is referred to as ________.", "options": {"A": "personality symbol", "B": "lifestyle", "C": "image", "D": "testimonial evidence", "E": "technical expertise"}, "answer": "D", "explain": "The correct answer is D: testimonial evidence"}, {"q": "Which of the following is illustrated by an amateur 30-second video, developed by a consumer, telling the story of the online crafts marketplace, Etsy.com?", "options": {"A": "consumer ethnocentrism", "B": "consumerism", "C": "sales promotion", "D": "consumer-generated messages", "E": "personal selling"}, "answer": "D", "explain": "The correct answer is D: consumer-generated messages"}, {"q": "Which of the following is a major step in selecting advertising media?", "options": {"A": "deciding on format elements", "B": "planning a message strategy", "C": "selecting message execution style", "D": "determining reach, frequency, and impact", "E": "developing a compelling creative concept"}, "answer": "D", "explain": "The correct answer is D: determining reach, frequency, and impact"}, {"q": "You receive a report that 68 percent of your target market has been exposed to your ad campaign during a given period of time. Which of the following aspects of media selection is represented by this information?", "options": {"A": "frequency", "B": "impact", "C": "reach", "D": "engagement", "E": "qualitative value"}, "answer": "C", "explain": "The correct answer is C: reach"}, {"q": "Television, as a medium of advertisement, is characterized by ________.", "options": {"A": "low absolute costs", "B": "high audience selectivity", "C": "high cost per exposure", "D": "fleeting exposure", "E": "poor mass-marketing coverage"}, "answer": "D", "explain": "The correct answer is D: fleeting exposure"}, {"q": "You want to advertise your new product. You want good mass marketing coverage and low cost per exposure. You also want to combine sight, sound, and motion and make the advertisement appealing to the senses. You should choose ________ as your advertising media.", "options": {"A": "television", "B": "radio", "C": "direct mail", "D": "newspaper", "E": "magazines"}, "answer": "A", "explain": "The correct answer is A: television"}, {"q": "Snappy Cameras is launching a new advertising campaign to demonstrate the high quality of its digital cameras. Which media option would give the audience the most control over exposure to the ads and interactive capabilities?", "options": {"A": "newspaper", "B": "the Internet", "C": "billboard", "D": "TV", "E": "radio"}, "answer": "B", "explain": "The correct answer is B: the Internet"}, {"q": "Which of the following is an advantage of using newspapers as an advertising medium?", "options": {"A": "no ad competition within the same medium", "B": "long life", "C": "good reproduction quality", "D": "large pass-along audience", "E": "broad acceptability"}, "answer": "E", "explain": "The correct answer is E: broad acceptability"}, {"q": "Which of the following statements about magazines as an advertising medium is true?", "options": {"A": "Magazines cannot offer high geographic selectivity.", "B": "Magazines provide better local coverage than newspapers.", "C": "Magazines lack credibility.", "D": "Magazines have long ad purchase lead times.", "E": "Magazines have poor reproduction of images."}, "answer": "D", "explain": "The correct answer is D: Magazines have long ad purchase lead times."}, {"q": "Which of the following is a disadvantage of using direct mail as an advertising medium?", "options": {"A": "low audience selectivity", "B": "lack of personalization", "C": "severe ad competition", "D": "relatively high cost per exposure", "E": "no flexibility"}, "answer": "D", "explain": "The correct answer is D: relatively high cost per exposure"}, {"q": "Franklin & Marshall College wishes to contact high school seniors at independent schools in Pennsylvania. Which of the following media would be most effective and efficient?", "options": {"A": "a Facebook page for the college", "B": "a direct mail piece sent to selected students", "C": "radio ads throughout the state", "D": "billboards throughout the state", "E": "local newspapers ads throughout the state"}, "answer": "B", "explain": "The correct answer is B: a direct mail piece sent to selected students"}, {"q": "Which of the following statements is most likely true about radio as an advertising medium?", "options": {"A": "Radio prohibits the use of segmentation strategies.", "B": "Radio offers very low audience selectivity.", "C": "Radio advertising is characterized by good local acceptance.", "D": "Radio ensures good attention from the target audience.", "E": "Radio advertising is typically quite expensive."}, "answer": "C", "explain": "The correct answer is C: Radio advertising is characterized by good local acceptance."}, {"q": "Which of the following statements about outdoor media is true?", "options": {"A": "It is characterized by higher costs per exposure.", "B": "It has very limited flexibility.", "C": "It has good positional selectivity.", "D": "It has no creative limitations.", "E": "It has high audience selectivity."}, "answer": "C", "explain": "The correct answer is C: It has good positional selectivity."}, {"q": "A Spanish-language channel runs its ads only in Hispanic neighborhoods. This is an example of ________.", "options": {"A": "media multitasking", "B": "narrowcasting", "C": "personal selling", "D": "broadcasting", "E": "buzz marketing"}, "answer": "B", "explain": "The correct answer is B: narrowcasting"}, {"q": "The term \"media multitaskers\" refers to ________.", "options": {"A": "competing brands which use the same media vehicle", "B": "people who absorb more than one medium at a time", "C": "media planners who also head the creative department", "D": "ad agencies whose clients are competitors of each other", "E": "media planners who use more than one advertising medium"}, "answer": "B", "explain": "The correct answer is B: people who absorb more than one medium at a time"}, {"q": "In the context of media timing, ________ means scheduling ads evenly within a given period.", "options": {"A": "sequencing", "B": "pulsing", "C": "narrowcasting", "D": "routing", "E": "continuity"}, "answer": "E", "explain": "The correct answer is E: continuity"}, {"q": "Which of the following is most likely true about using a pulsing schedule for an ad?", "options": {"A": "The costs of advertising would be low.", "B": "The ads would lack flexibility.", "C": "The ads would negatively affect the image of the brand.", "D": "The ads would achieve maximum awareness.", "E": "The only effective medium would be radio."}, "answer": "D", "explain": "The correct answer is D: The ads would achieve maximum awareness."}, {"q": "Which of the following characterizes standardized global advertising?", "options": {"A": "a more consistent worldwide image", "B": "higher advertising costs", "C": "no global advertising coordination", "D": "higher appeal to varying demographics", "E": "lower reach"}, "answer": "A", "explain": "The correct answer is A: a more consistent worldwide image"}, {"q": "Refer to the scenario below to answer the following question.<br><br>Most clients of Second Avenue have learned about the store through word-of-mouth communication. This small retailer of quality secondhand children's clothing thrives on the sale of a vast inventory of children's clothing placed on consignment. \"Because small children grow so quickly,\" Second Avenue's owner commented, \"they often outgrow many of their clothes before they've hardly been worn!\" Second Avenue provides a way for people to sell their children's clothing, earn a few dollars, and buy the next larger size. \"We're extremely picky about the condition of the clothing we stock,\" the owner stated, \"but we sell most items at a 60-percent discount.\"<br><br>Which of the following media options would be the LEAST costly for Second Avenue's promotional efforts?", "options": {"A": "a billboard placed in a supercenter", "B": "daily advertisements on a cable television station", "C": "periodic advertising in a local newspaper that follows a pulsing schedule", "D": "daily commercials during the local evening news", "E": "a billboard placed on the nearest interstate highway"}, "answer": "C", "explain": "The correct answer is C: periodic advertising in a local newspaper that follows a pulsing schedule"}, {"q": "Refer to the scenario below to answer the following question.<br><br>Most clients of Second Avenue have learned about the store through word-of-mouth communication. This small retailer of quality secondhand children's clothing thrives on the sale of a vast inventory of children's clothing placed on consignment. \"Because small children grow so quickly,\" Second Avenue's owner commented, \"they often outgrow many of their clothes before they've hardly been worn!\" Second Avenue provides a way for people to sell their children's clothing, earn a few dollars, and buy the next larger size. \"We're extremely picky about the condition of the clothing we stock,\" the owner stated, \"but we sell most items at a 60-percent discount.\"<br><br>Second Avenue has just developed a 30-second television ad that features three different shoppers enthusiastically shopping in the store and appreciating its products. This ad uses the ________ execution style.", "options": {"A": "slice of life", "B": "personality symbol", "C": "fantasy", "D": "image", "E": "technical expertise"}, "answer": "A", "explain": "The correct answer is A: slice of life"}, {"q": "Kathy Champe, a public relations specialist for a regional chain of pharmacies, regularly contacts members of the local and statewide media with information about community events and charity fundraisers sponsored by her company. This is an example of the ________ function of public relations.", "options": {"A": "press relations", "B": "lobbying", "C": "investor relations", "D": "product publicity", "E": "development"}, "answer": "A", "explain": "The correct answer is A: press relations"}, {"q": "The National Pork Board developed \"Pork. The Other White Meat\" campaign. The campaign provided nutritional information and pork recipes in an attempt to encourage people to view pork as a tasty alternative to poultry and fish. Which of the following functions was the goal of this public relations campaign?", "options": {"A": "influencing government regulations on pork", "B": "rebuilding consumer interest in pork", "C": "maintaining relationships with pork producers", "D": "gaining financial support for pork producers", "E": "creating newsworthy information about pork"}, "answer": "B", "explain": "The correct answer is B: rebuilding consumer interest in pork"}, {"q": "Which of the following statements is most likely true of public relations?", "options": {"A": "It can have the same impact on public awareness as advertising at much lower costs.", "B": "It forms a huge portion of the overall marketing budget of most large firms.", "C": "It requires participating companies to pay for media space or time.", "D": "It is always handled by a third-party agency hired by the firm.", "E": "It plays an insignificant role in brand building with the increasing popularity of advertising."}, "answer": "A", "explain": "The correct answer is A: It can have the same impact on public awareness as advertising at much lower costs."}, {"q": "Which of the following best explains why public relations is often overlooked as a tool for supporting product marketing objectives?", "options": {"A": "Public relations specialists lack the skills necessary to work with marketing experts.", "B": "The time and costs associated with public relations prohibit its extensive use.", "C": "The public relations department handles stockholders and legislators but not employees.", "D": "Public relations departments are typically large divisions within corporations.", "E": "Many public relations professionals see their jobs as communicating not brand building."}, "answer": "E", "explain": "The correct answer is E: Many public relations professionals see their jobs as communicating not brand building."}, {"q": "Which of the following is an example of audiovisual material used by PR professionals?", "options": {"A": "blogs", "B": "online videos", "C": "brochures", "D": "logos", "E": "vision statements"}, "answer": "B", "explain": "The correct answer is B: online videos"}, {"q": "In an attempt to set the company apart from its competitors, Central Parcel Service (CPS) has its employees wear brown uniforms and drive brown trucks. What type of public relations tool is being used by CPS?", "options": {"A": "buzz marketing", "B": "public service materials", "C": "corporate identity materials", "D": "product publicity", "E": "corporate logos"}, "answer": "C", "explain": "The correct answer is C: corporate identity materials"}], "flashcards": [{"section": "Advertising Basics", "term": "Advertising", "def": "Any paid form of nonpersonal presentation and promotion of ideas, goods, or services by an identified sponsor.", "example": "A 30-second commercial for a car brand during a televised event."}, {"section": "Advertising Basics", "term": "Advertising Objectives", "def": "Informative advertising builds awareness and informs about a new product or feature; persuasive advertising builds brand preference; reminder advertising keeps a product top of mind.", "example": "A new app's launch ads explaining what it does are informative; later ads reminding people to reopen it are reminder advertising."}, {"section": "Advertising Strategy", "term": "Setting the Advertising Budget", "def": "Factors include the product's life-cycle stage, market share and consumer base, level of competition and clutter, and how differentiated the product is.", "example": "A new entrant in a crowded market often needs a bigger ad budget to cut through competitor clutter."}, {"section": "Advertising Strategy", "term": "Native Advertising & Brand Integration", "def": "Native advertising blends seamlessly into a platform's normal content; brand integration (branded entertainment) weaves brands directly into entertainment content.", "example": "A sponsored article on a news site styled to match the site's normal articles is native advertising."}, {"section": "Advertising Strategy", "term": "Creative Concept & Execution Styles", "def": "The creative concept is the big idea behind an ad's message; execution styles include slice of life, lifestyle, fantasy, mood/image, musical, personality symbol, technical expertise, scientific evidence, and testimonial/endorsement.", "example": "An ad showing a family enjoying breakfast together is using a slice-of-life execution style."}, {"section": "Media Decisions", "term": "Reach, Frequency, and Impact", "def": "Reach is the percentage of the target market exposed to a campaign; frequency is how many times an average person is exposed; impact is the qualitative value of an exposure through a given medium.", "example": "A TV campaign might reach 80% of target households an average of four times each."}, {"section": "Media Decisions", "term": "Major Media Types", "def": "Media planners choose among television, digital/online/social, newspapers, direct mail, magazines, radio, and outdoor, weighing each medium's advantages and limitations.", "example": "A local business chooses radio ads for cost-effective, geographically targeted reach."}, {"section": "Media Decisions", "term": "Media Timing", "def": "Advertisers schedule ads over the year to account for seasonality, and may use real-time, always-on advertising tied to current events or trends.", "example": "A retailer increases ad spend in November and December ahead of the holiday season."}, {"section": "Evaluation", "term": "Evaluating Advertising Effectiveness", "def": "Marketers measure communication effects (whether the ad communicates well) and sales/profit effects (the actual impact on revenue and ROI).", "example": "A brand surveys consumers to see if more people recall its slogan after a campaign, a communication-effect test."}, {"section": "Public Relations", "term": "Public Relations (PR)", "def": "Building good relations with a company's various publics by obtaining favorable publicity, building a good corporate image, and handling unfavorable rumors, stories, and events.", "example": "A company issuing a statement and corrective action plan after a product recall."}, {"section": "Public Relations", "term": "Major PR Tools", "def": "PR tools include press relations, product publicity, public affairs, lobbying, investor relations, and development work with donors or members.", "example": "A company lobbying lawmakers about proposed regulations affecting its industry."}]}, "ch16": {"title": "Chapter 16 \u2014 Personal Selling and Sales Promotion", "questions": [{"q": "Which of the following is true about the sales force of a company?", "options": {"A": "Salespeople represent customers to the company and manage the buyer-seller relationship.", "B": "The sales force is responsible for product development and product strategy.", "C": "Salespeople represent workers' interests to upper management.", "D": "The primary responsibility of a sales force is to formulate operational strategies.", "E": "The sales force oversees the auditing process and recovers money from defaulting customers."}, "answer": "A", "explain": "The correct answer is A: Salespeople represent customers to the company and manage the buyer-seller relationship."}, {"q": "Which of the following would most likely improve coordination between marketing and sales?", "options": {"A": "Marketing managers should field test new promotion strategies before the sales team.", "B": "The sales force should strategize promotional strategies and be the primary decision makers about marketing.", "C": "The marketing and the sales departments should conduct annual job rotations.", "D": "Salespeople should participate in marketing planning sessions by sharing firsthand customer knowledge.", "E": "Salespeople should directly participate in the development of new products."}, "answer": "D", "explain": "The correct answer is D: Salespeople should participate in marketing planning sessions by sharing firsthand customer knowledge."}, {"q": "At Price & Wallace Inc., a pharmaceuticals company, members of the sales force and marketing department tend to have disagreements when things go wrong with a customer. The marketers blame the salespeople for poorly executing their strategies, while the salespeople blame the marketers for being out of touch with customers. Which of the following steps should upper management at Price & Wallace take to help bring the sales and marketing functions closer together?", "options": {"A": "establish a complex sales force structure", "B": "adopt a sales force automation system and implement team selling", "C": "emphasize traditional methods of selling", "D": "appoint a high-level marketing executive to oversee both marketing and sales", "E": "establish a customer sales force structure and make sure that sales quotas are easily achievable"}, "answer": "D", "explain": "The correct answer is D: appoint a high-level marketing executive to oversee both marketing and sales"}, {"q": "Which of the following is true about the territorial sales force structure?", "options": {"A": "The territorial sales force structure does not define each salesperson's job clearly.", "B": "In a territorial sales force structure, separate sales forces are set up for different industries.", "C": "In a territorial sales force structure, separate sales forces are often established to handle a single, large account in every territory.", "D": "Salespeople specialize in selling only a small portion of the company's products.", "E": "Travel expenses are relatively small as each salesperson travels within a limited geographic area."}, "answer": "E", "explain": "The correct answer is E: Travel expenses are relatively small as each salesperson travels within a limited geographic area."}, {"q": "Which of the following is true about the product sales force structure?", "options": {"A": "In a product sales force structure, specialization is highly discouraged.", "B": "In a product sales force structure, each salesperson is assigned to an exclusive geographic area and sells the company's full line of products or services to all customers in that territory.", "C": "In a product sales force structure, salespersons specialize in only a particular product line as the company produces numerous and complex products.", "D": "In a product sales force structure, a single salesperson can become an expert in all product categories.", "E": "A product sales force structure is most appropriate for a company that manufactures a small number of simple products."}, "answer": "C", "explain": "The correct answer is C: In a product sales force structure, salespersons specialize in only a particular product line as the company produces numerous and complex products."}, {"q": "In the ________, separate sales forces are set up for different industries.", "options": {"A": "product sales force structure", "B": "geographical operations system", "C": "territorial sales force structure", "D": "customer sales force structure", "E": "digital marketing system"}, "answer": "D", "explain": "The correct answer is D: customer sales force structure"}, {"q": "Which of the following is true about the customer sales force structure?", "options": {"A": "Salespersons specialize in only a particular product line as the company produces numerous and complex products.", "B": "Each salesperson is assigned to an exclusive geographic area and sells the company's full line of products or services to all customers in that territory.", "C": "Companies using customer sales force structure tend to ignore the importance of long-term relationship building with customers.", "D": "Separate sales forces are set up for different industries, serving current customers versus finding new ones.", "E": "The customer sales force structure is a combination of territorial sales force structure and product sales force structure."}, "answer": "D", "explain": "The correct answer is D: Separate sales forces are set up for different industries, serving current customers versus finding new ones."}, {"q": "Which of the following best explains why companies are adopting the team selling approach to service large, complex accounts?", "options": {"A": "Job rotation, an integral part of team selling, keeps workers motivated and boosts their morale.", "B": "Team selling facilitates the evaluation of individual contributions.", "C": "With team selling, companies are not required to train the outside sales force any longer.", "D": "Products have become too complicated for one salesperson to handle a large company's needs.", "E": "Customers prefer dealing with many salespeople rather than one sales representative."}, "answer": "D", "explain": "The correct answer is D: Products have become too complicated for one salesperson to handle a large company's needs."}, {"q": "All of the following are disadvantages of team selling EXCEPT ________.", "options": {"A": "team selling discourages individual contributors because the team receives credit for good performance", "B": "selling teams can be confusing and overwhelming for customers", "C": "individual contributions and compensations can be difficult to assess in team selling", "D": "salespeople who are used to having customers all to themselves may have trouble learning to work with and trust others on a team", "E": "team selling reduces the overall efficiency of the selling process"}, "answer": "E", "explain": "The correct answer is E: team selling reduces the overall efficiency of the selling process"}, {"q": "All of the following are problems associated with the poor selection of salespeople EXCEPT ________.", "options": {"A": "less productivity", "B": "costly turnover", "C": "fewer training expenses", "D": "disruptive customer relationships", "E": "lower sales"}, "answer": "C", "explain": "The correct answer is C: fewer training expenses"}, {"q": "Eric Brown is a human resource manager in a company selling and manufacturing personal computers. Who among the following is Eric most likely to hire as a salesperson if his objective is to minimize training costs post recruitment?", "options": {"A": "Melissa, a proven salesperson from a competing firm", "B": "Nancy, an experienced engineer with no prior experience in personal selling", "C": "Henry, a young salesperson with a few months' experience in a large MNC", "D": "Richard, a product developer from a competing firm", "E": "Samantha, a fresh college graduate"}, "answer": "A", "explain": "The correct answer is A: Melissa, a proven salesperson from a competing firm"}, {"q": "The purpose of a training program for salespeople is to teach them about all of the following EXCEPT ________.", "options": {"A": "customers' buying habits", "B": "customers' buying motives", "C": "company goals", "D": "industry history", "E": "competitor strategies"}, "answer": "D", "explain": "The correct answer is D: industry history"}, {"q": "Which of the following is a primary reason that companies use e-learning to conduct sales training programs?", "options": {"A": "E-learning eliminates employee attrition.", "B": "Customer needs and habits can be unambiguously conveyed through online training programs.", "C": "E-learning is the best way to simulate real-life sales calls.", "D": "Sales training programs that do not use e-learning are mostly ineffective.", "E": "E-learning cuts travel and training costs."}, "answer": "E", "explain": "The correct answer is E: E-learning cuts travel and training costs."}, {"q": "All of the following are basic types of compensation plans for salespeople EXCEPT ________.", "options": {"A": "straight salary", "B": "salary plus company shares", "C": "salary plus commission", "D": "salary plus bonus", "E": "straight commission"}, "answer": "B", "explain": "The correct answer is B: salary plus company shares"}, {"q": "Which of the following is most likely a true statement about sales compensation in economically tough circumstances?", "options": {"A": "Low performers are retained and top performers are dismissed to reduce commission payments.", "B": "Online selling is discontinued to improve customer relations.", "C": "Morale is boosted by distributing commissions equally among low and high sales performers.", "D": "Cutting sales force compensation is usually a last resort for firms that want to maintain positive customer relationships.", "E": "Compensation for the inside sales force is reduced to increase commissions for the outside sales force."}, "answer": "D", "explain": "The correct answer is D: Cutting sales force compensation is usually a last resort for firms that want to maintain positive customer relationships."}, {"q": "Which of the following is the best way for a company to increase selling time?", "options": {"A": "simplifying administrative duties", "B": "implementing mass customization", "C": "sharing less information with customers", "D": "reducing the number of customers", "E": "implementing high-commission plans"}, "answer": "A", "explain": "The correct answer is A: simplifying administrative duties"}, {"q": "Which of the following involves computerized, digitized sales force operations that let salespeople work more effectively anytime, anywhere?", "options": {"A": "digital marketing system", "B": "field service management system", "C": "BCG matrix", "D": "sales force automation system", "E": "SWOT analysis"}, "answer": "D", "explain": "The correct answer is D: sales force automation system"}, {"q": "Which of the following is an advantage of using a sales force automation system?", "options": {"A": "improves customer service", "B": "records major competitor's sales", "C": "eliminates the need for an inside sales force", "D": "lowers sales team training costs", "E": "eliminates employee attrition"}, "answer": "A", "explain": "The correct answer is A: improves customer service"}, {"q": "Which of the following is a potential drawback of using Web-based technologies for making sales presentations and servicing accounts?", "options": {"A": "Web-based technologies lower the overall efficiency of salespeople.", "B": "Salespeople who use web-based technologies tend to be less attentive to customer needs.", "C": "Web-based technologies can intimidate salespeople or clients who are unfamiliar with them.", "D": "The cost of the technology outweighs the advantages gained through eliminating travel.", "E": "Online selling usually takes more time than direct selling."}, "answer": "C", "explain": "The correct answer is C: Web-based technologies can intimidate salespeople or clients who are unfamiliar with them."}, {"q": "Ultra Tech Inc., a company manufacturing gardening tools, has decided to switch to a territorial sales force structure. Which of the following benefits is the company most likely to gain as a result of this decision?", "options": {"A": "The capacity for mass production of a wide range of products would significantly increase.", "B": "Each salesperson would be assigned to sell a single product in which he/she specializes.", "C": "An increased focus on short-term customer relationships would boost local sales of specialized products.", "D": "The cost of training new recruits would be eliminated.", "E": "As each salesperson travels within a limited geographic area, travel expenses would decline."}, "answer": "E", "explain": "The correct answer is E: As each salesperson travels within a limited geographic area, travel expenses would decline."}, {"q": "Johnson Business Solutions maintains one sales force for its copy machines and a separate sales force for its computer systems. Johnson Business Solutions utilizes a(n) ________.", "options": {"A": "geographical operations system", "B": "digital marketing system", "C": "product sales force structure", "D": "customer sales force structure", "E": "territorial sales force structure"}, "answer": "C", "explain": "The correct answer is C: product sales force structure"}, {"q": "Morrill Motors splits the United States of America into 10 sales regions. Within each of those regions, the company has separate sales personnel selling the company's full line of products. Morrill Motors uses a ________ sales force structure.", "options": {"A": "territorial", "B": "customer", "C": "complex", "D": "product", "E": "market"}, "answer": "A", "explain": "The correct answer is A: territorial"}, {"q": "Sigma Inc. has 2,000 Type-A accounts, each requiring 35 calls per year, and 1,000 Type-B accounts, each requiring 15 calls per year. What is the sales force's workload?", "options": {"A": "70,000 calls", "B": "95,000 calls", "C": "85,000 calls", "D": "35,000 calls", "E": "15,000 calls"}, "answer": "C", "explain": "The correct answer is C: 85,000 calls"}, {"q": "Stahl Inc. has 1,000 A-level accounts, each requiring 30 calls per year, and 3,000 B-level accounts, each requiring 10 calls per year. If each salesperson at Stahl Inc. can make 1,500 sales calls per year, how many salespeople would be needed to meet the total workload?", "options": {"A": "40", "B": "25", "C": "60", "D": "35", "E": "45"}, "answer": "A", "explain": "The correct answer is A: 40"}, {"q": "Mary Conti, a sales manager at National Computer Training, wants to evaluate the performance of her sales force in the New England territory. Which of the following would Mary most likely use?", "options": {"A": "breakeven analysis", "B": "call plan", "C": "SWOT analysis", "D": "expense reports", "E": "sales forecast"}, "answer": "D", "explain": "The correct answer is D: expense reports"}, {"q": "Travis Computing Systems earns most of its revenue from sales and in-person computer services. The sales force at Travis recently began telemarketing and Web selling. How would telemarketing and Web selling most likely benefit Travis?", "options": {"A": "The need for an outside sales force would be completely eliminated through telemarketing.", "B": "Travis sales reps would be able to service hard-to-reach customers more effectively.", "C": "Travis sales reps would be able to engage in more frequent face-to-face interaction with large, high-value customers.", "D": "The current liabilities of Travis would decrease.", "E": "The overhead costs of Travis would significantly decrease."}, "answer": "B", "explain": "The correct answer is B: Travis sales reps would be able to service hard-to-reach customers more effectively."}, {"q": "Cravenshaw Metalworks has witnessed a rise in the number of its industrial customers in recent years. The company uses different groups of people from the sales, marketing, technical support and finance departments for servicing large, complex accounts. In this instance, Cravenshaw Metalworks uses ________ in order to enhance the quality of its customers' buying experience.", "options": {"A": "satisficing", "B": "e-procurement", "C": "team selling", "D": "product differentiation", "E": "competitive marketing intelligence"}, "answer": "C", "explain": "The correct answer is C: team selling"}, {"q": "Refer to the scenario below to answer the following question.<br><br>Reliable Tools Company is a manufacturer of hubs and axles for the trailer and heavy truck industry. Although Reliable Tools only has 15 customers, the company is the sole supplier of hub and axle components to those customers. Monthly sales at Reliable Tools are approximately $1 million. \"You might say we have all our eggs in one basket,\" says owner Arthur Deetz. It is critical that a competent sales force be maintained in order to nurture those few but large accounts. Ninety-five percent of Reliable Tools' customers are located in Michigan, Ohio, and Indiana, which means that travel time to all customers is relatively short. However, given the nature of the industry, time spent with each customer is crucial.<br><br>How would a customer sales force structure benefit Reliable Tools?", "options": {"A": "It would enable the company's management to cut training costs substantially.", "B": "It would make telemarketing irrelevant.", "C": "It would enable the company's salespeople to build close relationships with customers.", "D": "It would eliminate the need for the company's salespeople to travel to meet customers.", "E": "It would help the company's salespeople become experts in the products they sell."}, "answer": "C", "explain": "The correct answer is C: It would enable the company's salespeople to build close relationships with customers."}, {"q": "Refer to the scenario below to answer the following question.<br><br>Reliable Tools Company is a manufacturer of hubs and axles for the trailer and heavy truck industry. Although Reliable Tools only has 15 customers, the company is the sole supplier of hub and axle components to those customers. Monthly sales at Reliable Tools are approximately $1 million. \"You might say we have all our eggs in one basket,\" says owner Arthur Deetz. It is critical that a competent sales force be maintained in order to nurture those few but large accounts. Ninety-five percent of Reliable Tools' customers are located in Michigan, Ohio, and Indiana, which means that travel time to all customers is relatively short. However, given the nature of the industry, time spent with each customer is crucial.<br><br>For sales managers to understand how the members of the Reliable Tools sales force spend their time, the salespeople must submit a(n) ________.", "options": {"A": "incentive plan", "B": "time-and-duty analysis", "C": "expense report", "D": "sales forecast", "E": "mobile conferencing schedule"}, "answer": "B", "explain": "The correct answer is B: time-and-duty analysis"}, {"q": "Refer to the scenario below to answer the following question.<br><br>Reliable Tools Company is a manufacturer of hubs and axles for the trailer and heavy truck industry. Although Reliable Tools only has 15 customers, the company is the sole supplier of hub and axle components to those customers. Monthly sales at Reliable Tools are approximately $1 million. \"You might say we have all our eggs in one basket,\" says owner Arthur Deetz. It is critical that a competent sales force be maintained in order to nurture those few but large accounts. Ninety-five percent of Reliable Tools' customers are located in Michigan, Ohio, and Indiana, which means that travel time to all customers is relatively short. However, given the nature of the industry, time spent with each customer is crucial.<br><br>Several compensation plans are available to reward and motive Reliable Tool's sales people. Since generating new leads and new business can be a goal for the sales force, which compensation plan approach is MOST likely to motivate and direct the salespeople in that direction?", "options": {"A": "salary, commission, and bonus", "B": "straight commission", "C": "salary plus bonus", "D": "straight salary", "E": "salary plus commission"}, "answer": "E", "explain": "The correct answer is E: salary plus commission"}, {"q": "Which of the following refers to a closing technique used by salespeople?", "options": {"A": "developing solutions to customers' problems", "B": "taking objections as opportunities to provide more information", "C": "seeking out hidden objections", "D": "asking customers for referrals", "E": "reviewing points of agreement"}, "answer": "E", "explain": "The correct answer is E: reviewing points of agreement"}, {"q": "Which of the following is true with regard to value selling?", "options": {"A": "Value selling refers to delivering superior customer value and capturing a fair return on that value.", "B": "Value selling refers to earning business from customers by cutting down prices of value products.", "C": "Value selling tarnishes the brand image of a product in the long run.", "D": "Value selling refers to the mass production of inferior-quality goods for sale.", "E": "Value selling dilutes customer loyalty in the long run."}, "answer": "A", "explain": "The correct answer is A: Value selling refers to delivering superior customer value and capturing a fair return on that value."}, {"q": "A sales person of a manufacturing company has qualified a number of leads. Which of the following is most likely the next step in the selling process?", "options": {"A": "handling all objections raised by the prospects", "B": "closing the deal with the most promising prospect", "C": "calling on all the prospects one by one", "D": "narrating the \"value story\" to the buyer", "E": "learning as much as possible about the qualified prospects"}, "answer": "E", "explain": "The correct answer is E: learning as much as possible about the qualified prospects"}, {"q": "Which of the following is true with regard to prospecting?", "options": {"A": "Salespersons tell the \"value story\" to the buyer, showing how the company's offer solves the customer's problems.", "B": "Salespersons learn as much as possible about the organization.", "C": "Salespersons identify qualified potential customers.", "D": "Salespersons ask for the order, review points of agreement, and offer to write up the order.", "E": "Salespersons meet and greet the buyer."}, "answer": "C", "explain": "The correct answer is C: Salespersons identify qualified potential customers."}, {"q": "Jason has been recently hired as a salesperson by Matrix Inc., a company selling consumer durables. He is currently working on his first sales assignment. After identifying a good prospect, Jason is now learning everything about his prospect via online sources and common acquaintances. Which of the following stages of the selling process is Jason in?", "options": {"A": "prospecting", "B": "follow-up", "C": "preapproach", "D": "handling objections", "E": "presentation"}, "answer": "C", "explain": "The correct answer is C: preapproach"}, {"q": "Richard, a salesperson, works for Wellington Steelworks. After researching a qualified lead, Richard is preparing opening lines for meeting the customer for the first time. Which step of the selling process is he about to enter?", "options": {"A": "preapproach", "B": "follow-up", "C": "presentation", "D": "approach", "E": "handling objections"}, "answer": "D", "explain": "The correct answer is D: approach"}, {"q": "Right after closing, Joshua, a senior sales manager at Halcyon Technologies called up the customer to ensure that she was satisfied with Halcyon's products. By calling the customer, Joshua also wanted to ensure repeat business. In this instance, Joshua is in the ________ stage of the selling process.", "options": {"A": "follow-up", "B": "preapproach", "C": "handling objections", "D": "closing", "E": "prospecting"}, "answer": "A", "explain": "The correct answer is A: follow-up"}, {"q": "Which of the following factors has most likely contributed to the rapid growth of sales promotion, particularly in consumer markets?", "options": {"A": "declining interest in quality", "B": "increasing number of international firms", "C": "declining advertising efficiency", "D": "increasing popularity of e-procurement", "E": "rising hostility toward large firms"}, "answer": "C", "explain": "The correct answer is C: declining advertising efficiency"}, {"q": "A manufacturer that offers cash or gifts to dealers for encouraging the purchase of its products is using ________.", "options": {"A": "bonuses", "B": "coupons", "C": "premiums", "D": "promotional products", "E": "push money"}, "answer": "E", "explain": "The correct answer is E: push money"}, {"q": "Trade shows most likely help companies to ________.", "options": {"A": "reduce the inside sales force", "B": "trim overhead costs", "C": "maximize productivity", "D": "find new sales leads", "E": "shorten the selling process"}, "answer": "D", "explain": "The correct answer is D: find new sales leads"}, {"q": "Bose offers $50 cash back to customers who purchase a new speaker and send in a proof of purchase. This is an example of a ________.", "options": {"A": "POP promotion", "B": "sample", "C": "rebate", "D": "premium", "E": "price pack"}, "answer": "C", "explain": "The correct answer is C: rebate"}, {"q": "Monty Boyd, an account manager, travels frequently on West Coast Airlines. Monty earns points for every mile he flies, and he will soon have enough points to receive a free airline ticket. West Coast Airlines is attempting to build a strong customer relationship with Monty through a ________.", "options": {"A": "rebate offer", "B": "promotional product", "C": "point-of-purchase promotion", "D": "trade promotion", "E": "frequency marketing program"}, "answer": "E", "explain": "The correct answer is E: frequency marketing program"}, {"q": "Renee's, a company selling winter clothing in Chicago, ran a preseason promotion on some of its fur jackets, offering cash refunds if the snowfall in the customer's market area turned out to be below average. This exemplifies ________.", "options": {"A": "a price pack", "B": "satisficing", "C": "a rebate", "D": "puffery", "E": "prospecting"}, "answer": "C", "explain": "The correct answer is C: a rebate"}, {"q": "A five-foot high cardboard display of Terry the polar bear, mascot of Terry's protein shake, next to the shelf containing Terry's products in a supermarket is an example of a(n) ________.", "options": {"A": "point-of-purchase promotion", "B": "rebate", "C": "advertising specialty", "D": "business promotion", "E": "sample"}, "answer": "A", "explain": "The correct answer is A: point-of-purchase promotion"}, {"q": "Kirk Wilkins renewed his cell phone contract with Zip Wireless Services and purchased a new cell phone through the Zip Web site. If Kirk mails Zip Wireless Services his transaction receipt, he would be eligible to receive $50 as cash refund. Which of the following types of sales promotion is evident here?", "options": {"A": "rebate", "B": "point-of-purchase promotion", "C": "price pack", "D": "advertising specialty", "E": "premium"}, "answer": "A", "explain": "The correct answer is A: rebate"}, {"q": "Happy Pet is a large pet food company that has convinced the retailers and the wholesalers of the New England area to resell its products. Happy Pet promises to reimburse the advertising costs to its retailers and wholesalers for advertising its products. This is an example of a ________.", "options": {"A": "sweepstake", "B": "advertising specialty", "C": "price pack", "D": "trade promotion", "E": "point-of-purchase promotion"}, "answer": "D", "explain": "The correct answer is D: trade promotion"}, {"q": "Orion is planning to give away free mouse pads imprinted with the company logo and name to anyone who enters their store on the day they launch their new laser mouse. What kind of sales promotion is Orion planning?", "options": {"A": "promotional products", "B": "sweepstakes", "C": "premiums", "D": "rebate", "E": "price packs"}, "answer": "A", "explain": "The correct answer is A: promotional products"}, {"q": "Waldo Stores will reward an all-expense-paid trip to Hawaii to anyone who correctly guesses the date on which Waldo Stores was first established in the Boston area. Which type of sales promotion is evident here?", "options": {"A": "contest", "B": "sample", "C": "premium", "D": "point-of-purchase promotion", "E": "trade promotion"}, "answer": "A", "explain": "The correct answer is A: contest"}, {"q": "Blue Fizz Inc. sponsors every race that takes place at the Sears Racing Track in Orange County, California. The high-octane racing at Sears is perfect for Blue Fizz to sell its energy drinks and to establish the desired brand image of the company. Which type of promotion is evident here?", "options": {"A": "solution selling", "B": "point-of-purchase promotion", "C": "event marketing", "D": "advertising specialties", "E": "mass marketing"}, "answer": "C", "explain": "The correct answer is C: event marketing"}], "flashcards": [{"section": "Personal Selling Basics", "term": "Personal Selling", "def": "Interpersonal communication by a company's sales force to engage customers, make sales, and build relationships, through face-to-face, phone, or video communication.", "example": "A pharmaceutical rep meeting with doctors to explain a new drug's benefits."}, {"section": "Sales Force Management", "term": "Sales Force Management", "def": "The analysis, planning, implementation, and control of sales force activities, covering strategy/structure, recruiting, training, compensating, supervising, and evaluating salespeople.", "example": "A company deciding whether to organize its sales team by territory, product, or customer type."}, {"section": "Sales Force Management", "term": "Sales Force Structures", "def": "Territorial structure assigns each salesperson an exclusive geographic area; product structure has salespeople sell along product lines; customer structure has salespeople sell along customer or industry lines.", "example": "A company with a dedicated team that serves only one major retail account uses a customer sales force structure."}, {"section": "Sales Force Management", "term": "Outside, Inside, and Team Selling", "def": "Outside (field) salespeople travel to call on customers; inside salespeople work from the office via phone or in-person visits from buyers; team selling uses people from multiple departments to service large accounts.", "example": "A complex enterprise software sale involving reps from sales, engineering, and finance is team selling."}, {"section": "Sales Force Management", "term": "Recruiting, Training & Compensating", "def": "Careful recruiting and selection improve sales performance; training builds customer, product, and selling-process knowledge; compensation includes fixed pay, variable pay, expenses, and fringe benefits.", "example": "A company pays a base salary plus commission to motivate and reward its sales reps."}, {"section": "Sales Force Management", "term": "Sales Force Automation & Social Selling", "def": "Sales force automation uses computerized systems like CRM software and mobile devices to help salespeople work efficiently anywhere; social selling uses online and social media tools to engage customers and build relationships.", "example": "A sales rep using LinkedIn to research and connect with prospective business clients."}, {"section": "The Selling Process", "term": "Steps in the Personal Selling Process", "def": "Prospecting, preapproach, approach, presentation, handling objections, closing, and follow-up.", "example": "A car salesperson researching a lead's needs before the visit is doing the preapproach step."}, {"section": "The Selling Process", "term": "Transaction vs. Relationship Selling", "def": "Personal selling closes specific transactions in the short term, but the long-term goal is to build mutually profitable, value-based customer relationships.", "example": "A salesperson who checks in with a client after the sale, rather than disappearing once the deal closes, is building a relationship."}, {"section": "Sales Promotion", "term": "Sales Promotion", "def": "Short-term incentives that encourage the purchase or sale of a product or service, including consumer, trade, business, and sales force promotions.", "example": "A \"buy one get one free\" grocery store deal is a consumer sales promotion."}, {"section": "Sales Promotion", "term": "Major Consumer Promotion Tools", "def": "Samples, coupons, rebates, price packs, premiums, advertising specialties, point-of-purchase displays, and contests, sweepstakes, and games.", "example": "A cereal brand including a small toy inside the box as a premium."}, {"section": "Sales Promotion", "term": "Trade & Business Promotion Tools", "def": "Trade promotions (discounts, allowances, free goods, specialty advertising) target retailers and wholesalers; business promotions (conventions, trade shows, sales contests) target business buyers or the sales force.", "example": "A manufacturer offering retailers a temporary discount to stock extra inventory is a trade promotion."}, {"section": "Sales Promotion", "term": "Developing the Sales Promotion Program", "def": "Marketers decide the size of the incentive, conditions for participation, how to promote and distribute it, the length of the program, and how to evaluate results.", "example": "A company tests whether a two-week discount period generates enough sales lift to justify the cost."}]}, "ch17": {"title": "Chapter 17 \u2014 Digital Marketing", "questions": [{"q": "Which of the following statements is true of direct marketing?", "options": {"A": "Direct marketing offers sellers a low-cost alternative for reaching their markets.", "B": "Direct marketing is also referred to as referral marketing.", "C": "In direct marketing, consumers earn a commission every time they buy a product.", "D": "Salespersons are compensated for other salespeople they recruit.", "E": "Direct marketing involves two or more intermediaries."}, "answer": "A", "explain": "The correct answer is A: Direct marketing offers sellers a low-cost alternative for reaching their markets."}, {"q": "Which of the following is true about online direct marketing?", "options": {"A": "Online direct marketing is also referred to as multi-level marketing.", "B": "In online direct marketing, outside and inside sales forces coordinate to provide value products to customers.", "C": "Online direct marketing allows sellers to create immediate, timely, and personal offers.", "D": "Salespersons are compensated for other salespeople they recruit.", "E": "Online direct marketing involves two or more intermediaries."}, "answer": "C", "explain": "The correct answer is C: Online direct marketing allows sellers to create immediate, timely, and personal offers."}, {"q": "Gant Hardware is a huge chain of hardware stores. GantHardware.com helps customers conduct product research and also lets them order directly online or redirects them to the nearest Gant retail store. Which of the following best describes GantHardware.com?", "options": {"A": "digital catalog", "B": "social network", "C": "marketing Web site", "D": "blog", "E": "podcast"}, "answer": "C", "explain": "The correct answer is C: marketing Web site"}, {"q": "Oscarz Aviation's Web site, GoOscarzAv.com, informs customers about a wide variety of services offered by the firm. It also has a guestbook where customers can provide feedback on their experiences with Oscarz Aviation. They can also view videos Oscarz Aviation posts, as well as read and respond to blogs and ask questions. GoOscarzAv.com is an example of a(n) ________.", "options": {"A": "digital catalog", "B": "blog", "C": "kiosk", "D": "online social network", "E": "branded community Web site"}, "answer": "E", "explain": "The correct answer is E: branded community Web site"}, {"q": "Runner Sprintz, a particular brand of shoes, has its own Web site, myrunnersprintz.com that welcomes consumers to \"the Runner Sprintz Century,\" invites readers to post their Runner Sprintz stories, and offers a wide variety of shoes for direct purchase. The site even allows customers to individually design their own shoes and share them among their circles on the Web site. Which of the following best describes myrunnersprintz.com?", "options": {"A": "branded community", "B": "Web directory", "C": "corporate Web site", "D": "blog", "E": "digital catalog"}, "answer": "A", "explain": "The correct answer is A: branded community"}, {"q": "Spartan Sportsgear is a company that sells sports equipment for adventure sports. It recently launched ExtremeSpartan.com to showcase products and provide testimonials of famous adventure sports athletes who use Spartan's products. It also includes videos and blogs. Which of the following best describes ExtremeSpartan.com?", "options": {"A": "podcast", "B": "branded community Web site", "C": "social network", "D": "digital catalog", "E": "blog"}, "answer": "B", "explain": "The correct answer is B: branded community Web site"}, {"q": "While comparing hotel rates on Google's search engine, Brenda came across text-based ads and links alongside the search results. This form of advertising is known as ________.", "options": {"A": "rich media ads", "B": "content sponsorship", "C": "catalog advertising", "D": "social media advertising", "E": "contextual advertising"}, "answer": "E", "explain": "The correct answer is E: contextual advertising"}, {"q": "AskKarl.com is a local search engine Web site that exclusively caters to people in New England. When users search for information, text-based ads related to the search appear alongside the search results. Which of the following is illustrated from this example?", "options": {"A": "contextual advertising", "B": "podcasts", "C": "pixel advertising", "D": "kiosk marketing", "E": "digital catalog"}, "answer": "A", "explain": "The correct answer is A: contextual advertising"}, {"q": "Which of the following is true about e-mail marketing messages?", "options": {"A": "E-mail marketing messages are effective in reaching the desired target market and result in low costs.", "B": "E-mail marketing messages cost more per thousand people reached than mass media such as television or magazines.", "C": "E-mail marketing messages create a stronger emotional connection with the customers compared to traditional direct mail.", "D": "E-mail marketing messages involve connecting directly with carefully targeted consumers, exclusively on a one-to-one, interactive basis.", "E": "E-mail marketing messages involve sending an offer, announcement, reminder, or sample to a person living at a particular address."}, "answer": "A", "explain": "The correct answer is A: E-mail marketing messages are effective in reaching the desired target market and result in low costs."}, {"q": "Which of the following best describes permission-based e-mail marketing?", "options": {"A": "offering free promotional materials to new customers", "B": "sending unsolicited, unwanted commercial e-mail messages", "C": "sending requests to users to join online social networking communities", "D": "sending e-mail pitches only to customers who \"opt-in\"", "E": "gathering demographic details for customer databases"}, "answer": "D", "explain": "The correct answer is D: sending e-mail pitches only to customers who \"opt-in\""}, {"q": "After selecting a sweater on the Land's End Web site, Kelly was asked to fill in details for the customer database. Kelly was given a form that required her to fill in her name, date of birth, and e-mail address. Kelly then checked a box that was next to the following statement: \"Yes, I would like to receive weekly promotional information from Land's End online.\" Which of the following practices is evident from this scenario?", "options": {"A": "catalog marketing", "B": "e-mail hosting service", "C": "e-mail spoofing", "D": "permission-based e-mail marketing", "E": "contextual advertising"}, "answer": "D", "explain": "The correct answer is D: permission-based e-mail marketing"}, {"q": "Randy keeps getting unwanted and annoying e-mails from several marketing firms unknown to him. The number of these e-mails is alarmingly high in his inbox. Which of the following best describes these e-mails?", "options": {"A": "adware", "B": "firewall", "C": "malware", "D": "spam", "E": "Trojan"}, "answer": "D", "explain": "The correct answer is D: spam"}, {"q": "Uptown-Clean Crew is a company that provides house-cleaning services in major urban and suburban areas. Marketers at Uptown-Clean Crew developed a short, humorous video promoting the company's services and posted it online. Soon the video was a rage as customers who saw the video found it hilarious and they passed it on to their friends and colleagues calling it the \"Uptown comedy.\" Which form of marketing is illustrated from this scenario?", "options": {"A": "integrated marketing", "B": "multichannel marketing", "C": "viral marketing", "D": "telemarketing", "E": "kiosk marketing"}, "answer": "C", "explain": "The correct answer is C: viral marketing"}, {"q": "Which of the following statements is true of viral marketing?", "options": {"A": "Viral marketing gives consumers online places to congregate, socialize, and exchange views.", "B": "Because customers find and pass along the message, viral marketing can be very inexpensive.", "C": "Marketers have significant control over where their viral messages end up.", "D": "In viral marketing, links appear alongside search engine results on sites such as Google and Bing.", "E": "Viral marketing messages are blocked by most search engines, security software, and social networking sites."}, "answer": "B", "explain": "The correct answer is B: Because customers find and pass along the message, viral marketing can be very inexpensive."}, {"q": "Which of the following is most likely a disadvantage of viral marketing?", "options": {"A": "Viral marketing messages are offensive to the audiences who are not a part of the targeted market.", "B": "Viral marketing usually takes time to make an impact.", "C": "Viral marketing is very expensive.", "D": "Marketers have little control over who receives the viral message.", "E": "Viral marketing messages are blocked by most search engines."}, "answer": "D", "explain": "The correct answer is D: Marketers have little control over who receives the viral message."}, {"q": "Which of the following is a benefit of using blogs as marketing tools for companies?", "options": {"A": "Blogs help reach a wider audience compared to other online direct marketing tools.", "B": "Blogs can offer a fresh, original, personal, and cheap way to enter into consumer conversations.", "C": "Blogs are online selling platforms for people located in hard-to-reach places.", "D": "Blogs provide companies with a platform to help portray wider merchandise.", "E": "Demographic information about customers can be easily discovered."}, "answer": "B", "explain": "The correct answer is B: Blogs can offer a fresh, original, personal, and cheap way to enter into consumer conversations."}, {"q": "Which of the following is a disadvantage of using blogs as a marketing tool?", "options": {"A": "Blogs, when used as a marketing tool, have a low rank in web directories and search engines.", "B": "Blogs do not provide the kind of personalized approach that today's marketers are looking for.", "C": "The blogosphere is cluttered and difficult to control.", "D": "Advertising on a blog is typically expensive and time consuming.", "E": "Using blogs as a marketing tool offers minimum reach to a target audience."}, "answer": "C", "explain": "The correct answer is C: The blogosphere is cluttered and difficult to control."}, {"q": "Which kind of social media networks are smaller communities likely to join or create?", "options": {"A": "blog", "B": "video", "C": "Internet", "D": "commercial", "E": "niche"}, "answer": "E", "explain": "The correct answer is E: niche"}, {"q": "Runners can compare performances, set up profiles, meet new people, and share information on Nike's Nike+ Web site. Nike+ is an example of a(n) ________.", "options": {"A": "blog", "B": "online community", "C": "kiosk", "D": "content sponsorship program", "E": "podcast"}, "answer": "B", "explain": "The correct answer is B: online community"}, {"q": "Which of the following is NOT a reason that companies use social media?", "options": {"A": "ease of creating content", "B": "immediacy and timeliness", "C": "engagement and social sharing capabilities", "D": "cost effectiveness", "E": "interactiveness"}, "answer": "A", "explain": "The correct answer is A: ease of creating content"}, {"q": "Joanna uses her smartphone to accomplish many tasks everyday. She is also an avid shopper. Which online marketing tool will benefit Joanna the most to help her shop?", "options": {"A": "banking app for her bank", "B": "instant deals and digital coupons", "C": "Facebook friends", "D": "YouTube video", "E": "e-mail messages from sites to which she subscribes"}, "answer": "B", "explain": "The correct answer is B: instant deals and digital coupons"}, {"q": "Which of the following is a challenge of marketing through online social networks?", "options": {"A": "Users seldom have control over the online social networks.", "B": "Marketing via online social networks is expensive and time-consuming.", "C": "Results are hard to measure.", "D": "Most existing networks are already controlled by major corporations and therefore do not favor competitors.", "E": "It is difficult to get the approval of the online advisory board to post an ad in a social network."}, "answer": "C", "explain": "The correct answer is C: Results are hard to measure."}, {"q": "Why does direct-mail marketing most likely remain a popular promotional tool for marketers?", "options": {"A": "It does not disturb consumers enrolled in the Do Not Call Registry.", "B": "It builds long-term customer relationships.", "C": "It reaches the consumer very quickly.", "D": "It provides something tangible for people to keep.", "E": "It involves very low marketing costs."}, "answer": "D", "explain": "The correct answer is D: It provides something tangible for people to keep."}, {"q": "Florian Fasteners recently introduced a new line of products. In order to promote its product, it sent samples to the addresses of a few select customers. Which of the following types of marketing is evident from this example?", "options": {"A": "mobile marketing", "B": "direct-mail marketing", "C": "kiosk marketing", "D": "telephone marketing", "E": "direct-response TV marketing"}, "answer": "B", "explain": "The correct answer is B: direct-mail marketing"}, {"q": "SparkClean is a company that specializes in producing cleaning products for automobiles. In order to promote its products, SparkClean sends a complimentary sample of its products to auto enthusiasts. Which form of marketing is SparkClean involved in?", "options": {"A": "viral marketing", "B": "direct-mail marketing", "C": "kiosk marketing", "D": "telemarketing", "E": "online marketing"}, "answer": "B", "explain": "The correct answer is B: direct-mail marketing"}, {"q": "Fiona Lambrech is the marketing director of a newly established detergent company. In order to introduce her product effectively into the market, Fiona sends samples of the detergent to a select group of individuals. Which of the following forms of marketing was most likely used by Fiona?", "options": {"A": "kiosk marketing", "B": "direct-mail marketing", "C": "direct-response television marketing", "D": "catalog marketing", "E": "telephone marketing"}, "answer": "B", "explain": "The correct answer is B: direct-mail marketing"}, {"q": "Renkel Cosmetics sends a sample of the newest cosmetics line to all premium members' addresses. Which of the following best describes Renkel's form of marketing?", "options": {"A": "kiosk marketing", "B": "direct-response television marketing", "C": "catalog marketing", "D": "social media marketing", "E": "direct-mail marketing"}, "answer": "E", "explain": "The correct answer is E: direct-mail marketing"}, {"q": "While shopping at KelfanDesigns.com, Shelly came across a checkbox beside which a statement said, \"I want to receive promotional offers from KelfanDesigns.com.\" Which of the following types of marketing is illustrated in this example?", "options": {"A": "permission-based e-mail marketing", "B": "direct response television marketing", "C": "viral marketing", "D": "contextual advertising", "E": "telemarketing"}, "answer": "A", "explain": "The correct answer is A: permission-based e-mail marketing"}, {"q": "Which of the following is an advantage of using digital catalogs?", "options": {"A": "coordinates with direct-response television ads", "B": "lists the phone numbers of interested prospects", "C": "points customers to the nearest kiosk", "D": "creates emotional contact with customers", "E": "eliminates printing and mailing costs"}, "answer": "E", "explain": "The correct answer is E: eliminates printing and mailing costs"}, {"q": "What is the primary advantage of printed catalogs?", "options": {"A": "building emotional connections with customers", "B": "reaching consumers in a quick and inexpensive manner", "C": "offering immediate rebates and coupons", "D": "filtering out interested prospects", "E": "offering unlimited space for merchandise details"}, "answer": "A", "explain": "The correct answer is A: building emotional connections with customers"}, {"q": "Digital catalogs offer all of the following benefits EXCEPT ________.", "options": {"A": "adding and removing products as needed", "B": "adjusting prices instantly to meet demand", "C": "touching the product", "D": "offering a broad assortment of presentation formats, including search
