ns": {"A": "the right to add additional taxes if necessary", "B": "the right to introduce any product in any size and style", "C": "the right to acquire competitors to prevent competition", "D": "the right to create a monopoly in the market", "E": "the right to promote any product to any audience"}, "answer": "B", "explain": "The correct answer is B: the right to introduce any product in any size and style"}, {"q": "Which of the following is a traditional buyers' right?", "options": {"A": "the right to demand a discount on the product", "B": "the right not to buy a product that is offered for sale", "C": "the right to resell the product", "D": "the right to exchange the product if it is of the wrong size or style", "E": "the right not to pay any taxes included in the final price"}, "answer": "B", "explain": "The correct answer is B: the right not to buy a product that is offered for sale"}, {"q": "Consumer advocates call for additional consumer rights, including ________.", "options": {"A": "the right to exchange the product if it is of the wrong size or style", "B": "the right to be protected from unwanted marketing messages", "C": "the right to be well informed about important product aspects", "D": "the right not to pay any taxes included in the final price", "E": "the right to resell the product"}, "answer": "C", "explain": "The correct answer is C: the right to be well informed about important product aspects"}, {"q": "Setting prices below cost, threatening to cut off business with suppliers, and discouraging the purchase of a competitor's products are all examples of ________.", "options": {"A": "acquisitions", "B": "cultural pollution", "C": "social costs", "D": "oligopolistic competition", "E": "predatory competition"}, "answer": "E", "explain": "The correct answer is E: predatory competition"}, {"q": "The proposed right to ________ includes the right to know the unit pricing, the ingredients in a product, the nutritional value of foods, product freshness, and the true benefits of a product.", "options": {"A": "be protected against questionable products", "B": "charge any price for the product", "C": "influence products and marketing practices in ways that will improve \"quality of life\"", "D": "be well informed about a product", "E": "expect the product to perform as claimed"}, "answer": "D", "explain": "The correct answer is D: be well informed about a product"}, {"q": "Proposals related to ________ include controlling the ingredients that go into certain products and packaging as well as reducing the level of advertising \"noise.\"", "options": {"A": "the right to charge any price for the product", "B": "the right to be informed", "C": "consumer protection", "D": "preserving the world for future consumption", "E": "quality of life"}, "answer": "E", "explain": "The correct answer is E: quality of life"}, {"q": "Proposals related to ________ include promoting the use of sustainable ingredients, recycling and reducing solid wastes, and managing energy consumption.", "options": {"A": "quality of life", "B": "consumer protection", "C": "the right to be informed", "D": "preserving the world for future consumption", "E": "the right to charge any price for the product"}, "answer": "D", "explain": "The correct answer is D: preserving the world for future consumption"}, {"q": "Companies emphasizing pollution prevention have responded with ________.", "options": {"A": "internal green marketing programs", "B": "superficial green marketing activities", "C": "external beyond greening activities", "D": "internal beyond greening programs", "E": "external green marketing activities"}, "answer": "A", "explain": "The correct answer is A: internal green marketing programs"}, {"q": "Nike produces shoes out of \"environmentally preferred materials,\" recycles old sneakers, and educates young people about conserving, reusing, and recycling. Nike is practicing ________.", "options": {"A": "design for environment", "B": "new clean technology", "C": "pollution prevention", "D": "product stewardship", "E": "sustainability vision"}, "answer": "D", "explain": "The correct answer is D: product stewardship"}, {"q": "Which of the following is part of an internal green marketing program?", "options": {"A": "biodegradable packaging", "B": "design for environment practices", "C": "product stewardship", "D": "new clean technology", "E": "cradle-to-cradle practices"}, "answer": "B", "explain": "The correct answer is B: design for environment practices"}, {"q": "Electrola Inc. is currently designing a new product line with the goal of making each product easy to recover, reuse, or recycle. Electrola Inc. hopes to recover many of these products when they reach the end of their life cycle and reuse their components in new products. Electrola Inc. is in the ________ stage of environmental sustainability.", "options": {"A": "sustainability vision", "B": "beyond greening", "C": "new clean technology", "D": "product stewardship", "E": "pollution prevention"}, "answer": "D", "explain": "The correct answer is D: product stewardship"}, {"q": "Xerox Corporation's Equipment Remanufacture and Parts Reuse Program converts end-of-life office equipment into new products and parts. This not only helps sustain the environment, but it is also highly profitable for the company. This practice is an example of a ________.", "options": {"A": "cradle-to-cradle practice", "B": "pollution prevention practice", "C": "green marketing practice", "D": "beyond greening practice", "E": "new environmental technology"}, "answer": "A", "explain": "The correct answer is A: cradle-to-cradle practice"}, {"q": "Companies that plan to implement ________ develop innovative sets of environmental skills and capabilities.", "options": {"A": "a DFE practice", "B": "a sustainability vision", "C": "product stewardship", "D": "a new clean technology", "E": "pollution prevention"}, "answer": "D", "explain": "The correct answer is D: a new clean technology"}, {"q": "Critics charge that a company's marketing practices can harm other companies and reduce competition. One of the problems critics identified is ________.", "options": {"A": "pollution", "B": "barriers to entry", "C": "fair packaging and labeling", "D": "unfair discrimination", "E": "bait-and-switch advertising"}, "answer": "B", "explain": "The correct answer is B: barriers to entry"}, {"q": "Jacob Engineering Group views and organizes its marketing activities from the viewpoint of its buyers. Management works hard to sense, serve, and satisfy the needs of its well-defined group of buyers. What does Jacob Engineering Group practice?", "options": {"A": "sense-of-mission marketing", "B": "consumer-oriented marketing", "C": "innovative marketing", "D": "customer-value marketing", "E": "societal marketing"}, "answer": "B", "explain": "The correct answer is B: consumer-oriented marketing"}, {"q": "The principle of ________ requires that the company continuously seek real product and marketing improvements.", "options": {"A": "consumer-oriented marketing", "B": "ambush marketing", "C": "customer-value marketing", "D": "sense-of-mission customer-value marketing", "E": "innovative marketing"}, "answer": "E", "explain": "The correct answer is E: innovative marketing"}, {"q": "The Wii system, developed by Nintendo, with its intuitive motion-sensitive controller and interactive games, appealed not only to teen boys but also to their sisters, moms, dads, and even grandparents. This is a successful example of ________ marketing.", "options": {"A": "consumer-oriented", "B": "sense-of-mission", "C": "innovative", "D": "customer-value", "E": "societal"}, "answer": "C", "explain": "The correct answer is C: innovative"}, {"q": "One look at a Pedigree ad or a visit to the Pedigree.com Web site confirms that the people behind the Pedigree Brand really do believe the \"We're for dogs\" mission. Associates are even encouraged to take their dogs to work. To further fulfill the \"We're for dogs\" brand promise, the company created the Pedigree Foundation, which along with the Pedigree Adoption Drive campaign, has raised millions of dollars for helping \"shelter dogs\" find good homes. This information indicates that Pedigree is practicing ________.", "options": {"A": "innovative marketing", "B": "environmental sustainability", "C": "consumerism", "D": "sense-of-mission marketing", "E": "a sustainability vision"}, "answer": "D", "explain": "The correct answer is D: sense-of-mission marketing"}, {"q": "Dove wanted to do more than just sell its beauty care products. The company was on a quest to discover \"real beauty\" and help women be happy just the way they are. As a result, the Dove Campaign for Real Beauty was successfully launched in 2004. Which of the following types of marketing did Dove use?", "options": {"A": "consumer-oriented marketing", "B": "innovative marketing", "C": "customer-value marketing", "D": "sense-of-mission marketing", "E": "social marketing"}, "answer": "D", "explain": "The correct answer is D: sense-of-mission marketing"}, {"q": "Dale's Drugstore sells cough medicine that is sour and ineffective. This is an example of a ________ product.", "options": {"A": "salutary", "B": "deficient", "C": "pleasing", "D": "desirable", "E": "societal"}, "answer": "B", "explain": "The correct answer is B: deficient"}, {"q": "Examples of pleasing products include ________.", "options": {"A": "fruits and vegetables", "B": "cigarettes and junk food", "C": "seat belts and air bags", "D": "bicycle helmets and elbow pads", "E": "dental services and medications"}, "answer": "B", "explain": "The correct answer is B: cigarettes and junk food"}, {"q": "Which of the following is the best example of a desirable product?", "options": {"A": "junk food", "B": "effective but foul-tasting medicine", "C": "cigarettes", "D": "breakfast cereal", "E": "dental insurance"}, "answer": "D", "explain": "The correct answer is D: breakfast cereal"}, {"q": "Maytag's front-loading Neptune washer provides superior cleaning and energy efficiency. The Neptune washer is an example of a ________ product.", "options": {"A": "pleasing", "B": "nondurable", "C": "desirable", "D": "deficient", "E": "salutary"}, "answer": "C", "explain": "The correct answer is C: desirable"}, {"q": "The challenge for makers of which type of product is to add long-run benefits without reducing the product's desirable qualities?", "options": {"A": "deficient product", "B": "salutary product", "C": "desirable product", "D": "durable product", "E": "pleasing product"}, "answer": "E", "explain": "The correct answer is E: pleasing product"}, {"q": "Bicycle helmets have low immediate appeal, but they tend to benefit consumers in the long run. This indicates that a bicycle helmet is an example of a ________ product.", "options": {"A": "durable", "B": "desirable", "C": "aesthetic", "D": "salutary", "E": "pleasing"}, "answer": "D", "explain": "The correct answer is D: salutary"}, {"q": "Monica Carey is a conscientious marketing manager. Sometimes it is unclear what decisions to make when she and her staff are faced with moral dilemmas. To help them handle such situations, Monica and other managers should create broad guidelines that everyone in the organization must follow. Which of the following terms best describes these guidelines?", "options": {"A": "company mission statement", "B": "company vision statement", "C": "corporate value statements", "D": "company financial statement", "E": "corporate marketing ethics policies"}, "answer": "E", "explain": "The correct answer is E: corporate marketing ethics policies"}, {"q": "Which of the following is being followed as a guiding principle by a company that produces and heavily markets cigarettes, with many promotions aimed at young (although legal age) nonsmokers?", "options": {"A": "the philosophy that companies can do in good conscience whatever the market and legal systems allow", "B": "the philosophy of consumerism", "C": "the philosophy of environmentalism", "D": "the philosophy that companies should have a social conscience and be morally responsible for current and future populations", "E": "the philosophy of consumer-oriented marketing"}, "answer": "A", "explain": "The correct answer is A: the philosophy that companies can do in good conscience whatever the market and legal systems allow"}, {"q": "Envirosax reusable shopping bags are stylish and affordable, and they eliminate the need for plastic store bags. Envirosax reusable shopping bags most likely fall in the category of ________ products.", "options": {"A": "pleasing", "B": "unpleasing", "C": "mature", "D": "desirable", "E": "deficient"}, "answer": "D", "explain": "The correct answer is D: desirable"}]}};

const chapterLabels = {
  ch12: "Chapter 12", ch13: "Chapter 13", ch14: "Chapter 14",
  ch15: "Chapter 15", ch16: "Chapter 16", ch17: "Chapter 17",
  ch18: "Chapter 18", ch19: "Chapter 19", ch20: "Chapter 20"
};

let currentChapter = "ch12";
let viewMode = "quiz";
let order = [];
let answered = [];
let flippedCards = new Set();

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildChapterBar() {
  const bar = document.getElementById("chapterBar");
  bar.innerHTML = "";
  Object.keys(chapterLabels).forEach(key => {
    const chip = document.createElement("div");
    const has = !!studyData[key];
    chip.className = "chip" + (key === currentChapter ? " active" : "") + (!has ? " disabled" : "");
    chip.textContent = chapterLabels[key];
    if (has) {
      chip.onclick = () => { currentChapter = key; startChapter(); };
    }
    bar.appendChild(chip);
  });
}

function buildModeBar() {
  const bar = document.getElementById("modeBar");
  bar.innerHTML = "";
  const data = studyData[currentChapter];
  const modes = [["quiz", "Quiz"], ["flashcards", "Flashcards"]];
  modes.forEach(([key, label]) => {
    const chip = document.createElement("div");
    const disabled = !data || (key === "quiz" && (!data.questions || data.questions.length === 0)) || (key === "flashcards" && (!data.flashcards || data.flashcards.length === 0));
    chip.className = "chip mode" + (viewMode === key ? " active" : "") + (disabled ? " disabled" : "");
    chip.textContent = label;
    if (!disabled) {
      chip.onclick = () => { viewMode = key; render(); };
    }
    bar.appendChild(chip);
  });
}

function startChapter() {
  const data = studyData[currentChapter];
  if (data && data.questions && data.questions.length > 0) {
    viewMode = "quiz";
    order = data.questions.map((_, i) => i);
  } else {
    viewMode = "flashcards";
    order = [];
  }
  answered = [];
  flippedCards = new Set();
  render();
}

function render() {
  buildChapterBar();
  buildModeBar();
  const app = document.getElementById("app");
  const data = studyData[currentChapter];
  if (!data) {
    app.innerHTML = '<div class="card placeholder">Content for this chapter hasn\'t been added yet.</div>';
    return;
  }
  if (viewMode === "flashcards") {
    renderFlashcards();
  } else {
    renderQuiz();
  }
}

function renderQuiz() {
  const app = document.getElementById("app");
  const data = studyData[currentChapter];
  const total = data.questions.length;
  const answeredCount = answered.filter(a => a).length;
  const correctCount = answered.filter(a => a && a.correct).length;
  const pct = total ? Math.round((answeredCount / total) * 100) : 0;

  let html = '<div class="card sticky">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">';
  html += '<strong>' + data.title + '</strong>';
  html += '<span class="score-pill">Score: ' + correctCount + '/' + total + '</span>';
  html += '</div>';
  html += '<div class="progress-row"><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;"></div></div><span style="font-size:0.8rem;color:var(--muted);">' + answeredCount + '/' + total + '</span></div>';
  html += '<div class="nav-row">';
  html += '<button class="nav" id="restartBtn">Restart (same order)</button>';
  html += '<button class="nav primary" id="shuffleBtn">Shuffle &amp; restart</button>';
  html += '</div></div>';

  order.forEach((qIndex, pos) => {
    const q = data.questions[qIndex];
    const a = answered[qIndex];
    html += '<div class="card">';
    html += '<div class="qtext"><span class="qnum">' + (pos + 1) + '.</span>' + q.q + '</div>';
    html += '<div class="options">';
    Object.keys(q.options).forEach(letter => {
      let cls = "opt";
      if (a) {
        if (letter === q.answer) cls += " correct";
        else if (letter === a.chosen) cls += " incorrect";
      }
      html += '<button class="' + cls + '" data-qindex="' + qIndex + '" data-letter="' + letter + '"' + (a ? " disabled" : "") + '>' + letter + ') ' + q.options[letter] + '</button>';
    });
    html += '</div>';
    if (a) {
      const cls = a.correct ? "right" : "wrong";
      html += '<div class="explain show ' + cls + '"><strong>' + (a.correct ? "Correct! " : "Not quite. Correct answer: " + q.answer + ". ") + '</strong>' + q.explain + '</div>';
    }
    html += '</div>';
  });

  if (answeredCount === total && total > 0) {
    const missed = order.filter(qIndex => answered[qIndex] && !answered[qIndex].correct);
    html += '<div class="card"><strong>Missed Questions</strong><div class="review-list" style="margin-top:10px;">';
    if (missed.length === 0) {
      html += '<div class="review-item">Nice work — you got all of them right!</div>';
    } else {
      missed.forEach(qIndex => {
        const pos = order.indexOf(qIndex) + 1;
        html += '<div class="review-item"><span class="q">Q' + pos + ':</span> <span class="a">' + data.questions[qIndex].q.slice(0, 80) + '...</span></div>';
      });
    }
    html += '</div></div>';
  }

  app.innerHTML = html;

  app.querySelectorAll(".opt").forEach(btn => {
    btn.addEventListener("click", () => {
      const qIndex = parseInt(btn.dataset.qindex);
      const letter = btn.dataset.letter;
      const q = data.questions[qIndex];
      answered[qIndex] = { chosen: letter, correct: letter === q.answer };
      renderQuiz();
    });
  });
  document.getElementById("restartBtn").onclick = () => {
    order = data.questions.map((_, i) => i);
    answered = [];
    renderQuiz();
  };
  document.getElementById("shuffleBtn").onclick = () => {
    order = shuffle(data.questions.map((_, i) => i));
    answered = [];
    renderQuiz();
  };
}

function renderFlashcards() {
  const app = document.getElementById("app");
  const data = studyData[currentChapter];
  const cards = data.flashcards || [];

  let html = '<div class="card">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">';
  html += '<strong>' + data.title + ' — Flashcards</strong>';
  html += '<span class="score-pill">' + cards.length + ' cards</span>';
  html += '</div>';
  html += '<div class="flash-toolbar">';
  html += '<button class="nav" id="flipAllBtn">Flip all</button>';
  html += '<button class="nav" id="resetAllBtn">Reset all</button>';
  html += '</div></div>';

  html += '<div class="flash-grid">';
  cards.forEach((c, i) => {
    const flipped = flippedCards.has(i) ? " flipped" : "";
    html += '<div class="flash-card' + flipped + '" data-index="' + i + '">';
    html += '<div class="flash-inner">';
    html += '<div class="flash-face flash-front"><div><div class="flash-section">' + c.section + '</div><div class="flash-term">' + c.term + '</div><div class="flash-hint">Tap to flip</div></div></div>';
    html += '<div class="flash-face flash-back"><div class="flash-section">' + c.section + '</div><div class="flash-def">' + c.def + '</div>' + (c.example ? '<div class="flash-example">' + c.example + '</div>' : '') + '</div>';
    html += '</div></div>';
  });
  html += '</div>';

  app.innerHTML = html;

  app.querySelectorAll(".flash-card").forEach(el => {
    el.addEventListener("click", () => {
      const i = parseInt(el.dataset.index);
      if (flippedCards.has(i)) { flippedCards.delete(i); el.classList.remove("flipped"); }
      else { flippedCards.add(i); el.classList.add("flipped"); }
    });
  });
  document.getElementById("flipAllBtn").onclick = () => {
    cards.forEach((_, i) => flippedCards.add(i));
    renderFlashcards();
  };
  document.getElementById("resetAllBtn").onclick = () => {
    flippedCards.clear();
    renderFlashcards();
  };
}

startChapter();
</script>

<script>
if (localStorage.getItem("study_access") === "granted") {
  showContent();
} else {
  askPassword();
}

function askPassword() {
  const password = prompt("Enter the course password:");
  if (password === "knicksrule") {
    localStorage.setItem("study_access", "granted");
    showContent();
  } else {
    alert("Incorrect password. Refresh the page to try again.");
  }
}

function showContent() {
  document.getElementById("study-content").classList.remove("hidden");
}
</script>
</body>
</html>
